<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理3級 用語学習</title>
<link rel="stylesheet" href="../../css/common.css">
</head>

<body>

<header>
  <div class="header-left">
    <h1>情報処理3級 用語学習</h1>
  </div>
</header>

<div id="loadingScreen">
  <div class="loaderBox">
    <div class="spinner"></div>
    <p>読み込み中...</p>
  </div>
</div>

<div class="card" id="menuScreen">
  <h2>モード選択</h2>
  <div class="grid-2">
    <button onclick="setMode('normal')">通常モード</button>
    <button onclick="setMode('review')">復習モード</button>
    <button onclick="setMode('challenge')">チャレンジモード</button>
    <button onclick="startStudyMode()">学習モード</button>
  </div>
</div>

<div class="card hidden" id="quizScreen">
  <div id="timerBox">残り10秒</div>
  <h3 id="questionText"></h3>
  <div id="choices"></div>
  <p id="resultMessage"></p>
  <button onclick="nextQuestion()">次へ</button>
</div>

<div class="card hidden" id="studyScreen">
  <h3 id="studyTerm"></h3>
  <p id="studyMeaning"></p>
  <button onclick="nextStudy()">次へ</button>
</div>

<a href="../../index.html">
  <button class="portal-btn">ポータルへ戻る</button>
</a>

<footer>
© 鎮西学院高等学校 商業科
</footer>

<script>

let questions = [];
let currentIndex = 0;
let score = 0;
let mode = "";
let timer;
let timeLeft;
let totalTime = 0;
let studyStep = 0; // 0=用語表示 1=説明表示

async function loadCSV(){
    try{
        const response = await fetch("data3.csv");
        if(!response.ok){
            throw new Error("CSVが見つかりません");
        }

        let text = await response.text();

        // BOM除去
        text = text.replace(/^\uFEFF/, "");

        const lines = text.split(/\r?\n/);

        for(let i=1;i<lines.length;i++){
            const cols = lines[i].split(",");
            if(cols.length >= 2){
                const term = cols[0].trim();
                const meaning = cols.slice(1).join(",").trim();
                questions.push({term, meaning});
            }
        }

        if(questions.length === 0){
            throw new Error("問題が読み込まれていません");
        }

        document.getElementById("loadingScreen").style.display="none";

    }catch(error){
        alert("CSV読み込みエラー：" + error.message);
    }
}
window.addEventListener("load", loadCSV);

function setMode(selectedMode){
    mode = selectedMode;
    startQuiz();
}

function startQuiz(){
    shuffle(questions);
    currentIndex = 0;
    score = 0;
    totalTime = 0;

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");

    showQuestion();
}

function showQuestion(){
    clearInterval(timer);
    timeLeft = 10;

    document.getElementById("resultMessage").innerText="";
    document.getElementById("timerBox").innerText="残り10秒";

    const q = questions[currentIndex];
    document.getElementById("questionText").innerText=q.term;

    let choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML="";

    let choices = [q.meaning];
    while(choices.length<4){
        let rand = questions[Math.floor(Math.random()*questions.length)].meaning;
        if(!choices.includes(rand)){
            choices.push(rand);
        }
    }

    shuffle(choices);

    choices.forEach(choice=>{
        let btn = document.createElement("button");
        btn.innerText=choice;
        btn.onclick=function(){
            checkAnswer(choice);
        };
        choicesDiv.appendChild(btn);
    });

    timer = setInterval(()=>{
        timeLeft--;
        totalTime++;
        document.getElementById("timerBox").innerText="残り"+timeLeft+"秒";
        if(timeLeft<=0){
            clearInterval(timer);
            nextQuestion();
        }
    },1000);
}

function checkAnswer(choice){
    clearInterval(timer);
    const correct = questions[currentIndex].meaning;

    if(choice===correct){
        score++;
        document.getElementById("resultMessage").innerText="正解です！";
    }else{
        document.getElementById("resultMessage").innerText="不正解です";
        if(mode==="challenge"){
            endQuiz();
            return;
        }
    }
}

function nextQuestion(){
    currentIndex++;
    if(currentIndex>=10 || currentIndex>=questions.length){
        endQuiz();
    }else{
        showQuestion();
    }
}

function endQuiz(){
    alert("終了！ 正解数："+score+" / 10\n合計時間："+totalTime+"秒");
    location.reload();
}

function startStudyMode(){
    currentIndex=0;
    shuffle(questions);
    studyStep = 0;

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("studyScreen").classList.remove("hidden");

    showStudy();
}

function showStudy(){
    const q = questions[currentIndex];

    if(studyStep === 0){
        document.getElementById("studyTerm").innerText = q.term;
        document.getElementById("studyMeaning").innerText = "";
    }else{
        document.getElementById("studyMeaning").innerText = q.meaning;
    }
}

function nextStudy(){

    if(studyStep === 0){
        studyStep = 1;
        showStudy();
    }else{
        studyStep = 0;
        currentIndex++;

        if(currentIndex >= questions.length){
            location.reload();
        }else{
            showStudy();
        }
    }
    document.querySelector("#studyScreen button").innerText =
        studyStep===0 ? "答えを見る" : "次へ";
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

</script>

</body>
</html>
