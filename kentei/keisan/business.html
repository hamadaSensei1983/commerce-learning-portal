<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../css/common.css">
<title>ビジネス計算検定</title>

<style>

    /* ===========================================================
    ▼ 動画カード（既存＋調整）
    =========================================================== */
    .video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:16px;
    margin-top:15px;
    }
    .video-card{
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.25s;
    position:relative;
    }
    .video-card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 22px rgba(0,0,0,0.18);
    }
    .video-card img{ width:100%; }
    .video-title{
    padding:12px;
    font-size:14px;
    line-height:1.4;
    text-align:center;
    }

    .grade-title{
    margin-top:30px;
    font-size:20px;
    font-weight:bold;
    }

    details{ margin-top:15px; }
    summary{
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    padding:4px 0;
    }

    /* ===========================================================
    ▼ 単位プルダウンを大きく（calc-input と揃える）
    =========================================================== */
    .biz-unit-select{
    width:140px;
    padding:10px;
    font-size:20px;
    border:3px solid #444;
    border-radius:6px;
    background:white;
    }

    /* ===========================================================
    ▼ タブ切り替えボタン（既存 mode-btn を流用）
    =========================================================== */
    .biz-tab-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:10px 0 20px;
    }

    /* active 時（反転表示）は common.css の .mode-btn.active を使用 */

    /* ===========================================================
    ▼ 分野チェックボックス（練習問題用）
    =========================================================== */
    #bizFieldArea{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    max-width:300px;
    margin:12px auto;
    }
    .two-btn-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    max-width:300px;
    margin:10px auto 15px auto;
    }

    <!-- 追加CSS部分（business.html の <style> 内へ追記） -->

    /* ===========================================================
    ▼ タブ（解説動画／練習）アクティブ強調
    =========================================================== */
    .mode-btn.active {
    background: var(--main-green) !important;
    color: white !important;
    border: 3px solid var(--main-green);
    box-shadow: 0 0 8px rgba(46,139,87,0.5);
    transform: translateY(-2px);
    }

    /* ホバーとの差別化（非アクティブタブのみホバー反応） */
    .mode-btn:not(.active):hover {
    background: #f0fff4;
    border: 2px solid var(--main-green);
    }

    /* ===========================================================
    ▼ 練習問題：級セレクトを大きく
    =========================================================== */
    #bizLevelSelect {
    font-size: 20px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 2px solid var(--main-green);
    }

    /* ===========================================================
    ▼ 第○問・正解数表示
    =========================================================== */
    #bizStatusBar {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 18px;
    color: var(--dark-green);
    }

    /* ▼ 2カラム配置 */
    #bizSelectGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-top: 15px;
    }

    /* ▼ 分野チェックはすでに2列 */
    #bizFieldArea {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    /* ▼ 小さめボタン */
    .small-btn {
      font-size: 14px;
      padding: 6px 8px;
    }
    .small-btn-grid button {
      font-size: 14px;
      padding: 6px 8px;
    }

    /* ▼ 級セレクトを美しく */
    .biz-level-select {
      font-size: 20px;
      padding: 5px 8px;
      width: 120px;
      border: 2px solid var(--main-green);
      border-radius: 6px;
    }

    /* ▼ 正解アニメーション */
    .correct-anim {
      animation: popScale 0.45s ease-out;
    }

    @keyframes popScale {
      0%   { transform: scale(1);   }
      40%  { transform: scale(1.25); }
      100% { transform: scale(1);   }
    }

</style>
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">ビジネス計算検定</h1>
      <div class="exam-title">解説動画 ＆ 練習問題</div>
    </div>
  </div>
</header>

<div class="card">

  <!-- ▼ 学習ガイド -->
  <div class="study-guide">
    <h3>ビジネス計算部門</h3>
    <ul>
      <li>20問出題されます</li>
      <li>各5点 × 20問＝100点満点・70点以上で合格</li>
      <li>まずは3級から順に攻略するのがおすすめです</li>
    </ul>
  </div>

  <!-- ▼ タブ切り替えボタン -->
  <div class="biz-tab-buttons">
    <button type="button" id="btnBizTabVideo" class="mode-btn active"
            onclick="showBizTab('video')">解説動画</button>
    <button type="button" id="btnBizTabQuiz" class="mode-btn"
            onclick="showBizTab('quiz')">練習問題</button>
  </div>

  <!-- ▼ ▼ ▼ 解説動画タブ ▼ ▼ ▼ -->
  <div id="bizVideoTab">

    <!-- ★ 解説文 ★ -->
    <div style="text-align:center;margin-bottom:15px;color:#444;">
      ▶ をクリックすると、その級の解説動画が表示されます。<br>
      見たい動画を選んで学習しましょう。
    </div>

    <div id="videoArea"></div>
  </div>

  <!-- ▼ ▼ ▼ 練習問題タブ ▼ ▼ ▼ -->
  <div id="bizQuizTab" class="hidden">

    <hr>

    <h3>練習問題にチャレンジ</h3>

    <!-- ▼ 級選択 -->
    <div id="quizSetup" style="text-align:center;">
      <label>
        級：
        <select id="bizLevelSelect">
          <option value="3">3級</option>
          <option value="2">2級</option>
          <option value="1">1級</option>
        </select>
      </label>
      <button class="main-btn" onclick="setupBizFields()">分野選択へ</button>
    </div>

    <div id="bizFieldSelectArea" class="hidden">

      <div id="bizSelectGrid">
        <!-- 左：級選択 -->
        <div>
          <h4>級を選択</h4>
          <select id="bizLevelSelect" class="biz-level-select">
            <option value="3">3級</option>
            <option value="2">2級</option>
            <option value="1">1級</option>
          </select>
          <br>
          <button class="main-btn small-btn" onclick="setupBizFields()">分野表示</button>
        </div>

        <!-- 右：分野選択 -->
        <div>
          <h4>分野を選択</h4>
          <div id="bizFieldArea"></div>

          <div class="two-btn-grid small-btn-grid">
            <button class="control-btn small-btn" onclick="bizSelectAllFields()">全選択</button>
            <button class="control-btn small-btn" onclick="bizClearAllFields()">全解除</button>
          </div>
        </div>
      </div>

      <div style="text-align:center;margin-top:10px;">
        <button class="main-btn" onclick="startBusinessQuiz()">この条件で開始</button>
      </div>

    </div>

    <!-- ▼ 問題表示エリア -->
    <div id="bizQuizArea" class="hidden" style="margin-top:15px;">

      <!-- ▼ 進捗ステータス表示 -->
      <div id="bizStatusBar"></div>

      <div id="bizQuestion" style="margin-bottom:10px;font-weight:bold;"></div>

      <div id="bizInputRow"
           style="display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:8px;">
        <select id="bizUnitSelect" class="biz-unit-select"></select>
        <input id="bizAnswerNumber" class="calc-input" inputmode="decimal">
      </div>

      <div style="text-align:center;margin-bottom:8px;">
        <button class="main-btn" onclick="checkBusinessAnswer()">答え合わせ</button>
        <button class="control-btn hidden" id="bizNextBtn" onclick="nextBusinessQuestion()">次の問題</button>
      </div>

      <div id="bizResult" style="min-height:40px;"></div>
    </div>

  </div> <!-- /#bizQuizTab -->

  <!-- ▼ ポータル -->
  <a href="index.html" class="portal-btn exam-btn">部門選択へ戻る</a>
  <a href="../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

</div>

<script>

/* ▼ 練習問題用 進捗管理 */
let bizCorrectCount = 0;     // 正解数（累計）
let bizStreak = 0;           // 連続正解

/* ===========================================================
   ▼ 動画エリア（既存）
=========================================================== */
fetch("url.csv")
  .then(res => res.text())
  .then(data => {
    const lines = data.trim().split("\n").slice(1);
    const videos = lines.map(line=>{
      const parts = line.split("\t");
      return {
        grade:parts[0],
        title:parts[1],
        url  :parts[2]
      };
    });
    createVideoCards(videos);
  });

function createVideoCards(videos){
  const area = document.getElementById("videoArea");
  const grades = ["3","2","1"];
  grades.forEach(g=>{
    const list = videos.filter(v=>v.grade===g);

    const block = document.createElement("details");
    const summary = document.createElement("summary");
    summary.className = "grade-title";
    summary.innerText = g + "級";
    block.appendChild(summary);

    const grid = document.createElement("div");
    grid.className = "video-grid";

    list.forEach(v=>{
      const id = getYoutubeID(v.url);
      const card = document.createElement("div");
      card.className = "video-card";
      card.innerHTML = `
        <a href="${v.url}" target="_blank">
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
          <div class="video-title">${v.title}</div>
        </a>
      `;
      grid.appendChild(card);
    });

    block.appendChild(grid);
    area.appendChild(block);
  });
}

function getYoutubeID(url){
  if(url.includes("youtu.be")){
    return url.split("/").pop();
  }
  if(url.includes("watch?v=")){
    return url.split("v=")[1].split("&")[0];
  }
  return "";
}

/* ===========================================================
   ▼ タブ切り替え（解説動画／練習問題）
=========================================================== */
function showBizTab(tab){
  const videoTab=document.getElementById("bizVideoTab");
  const quizTab =document.getElementById("bizQuizTab");
  const btnV=document.getElementById("btnBizTabVideo");
  const btnQ=document.getElementById("btnBizTabQuiz");

  if(tab==="video"){
    videoTab.classList.remove("hidden");
    quizTab.classList.add("hidden");
    btnV.classList.add("active");
    btnQ.classList.remove("active");
  }else{
    videoTab.classList.add("hidden");
    quizTab.classList.remove("hidden");
    btnV.classList.remove("active");
    btnQ.classList.add("active");
  }
}

/* ===========================================================
   ▼ CSVパース（" で囲まれたカンマも安全）
=========================================================== */
function parseBusinessCSV(text){
  text=text.replace(/^\uFEFF/,"");
  const rows=text.trim().split(/\r?\n/);
  const out=[];

  for(let i=1;i<rows.length;i++){
    const line=rows[i].trim();
    if(!line) continue;

    let cols=[], cur="", inQ=false;
    for(let c of line){
      if(c==='"'){ inQ=!inQ; continue; }
      if(c==="," && !inQ){ cols.push(cur); cur=""; }
      else cur+=c;
    }
    cols.push(cur);

    out.push({
      level:(cols[0]||"").trim(),
      field:(cols[1]||"").trim(),
      text :(cols[2]||"").trim(),
      pos  :(cols[3]||"").trim(),
      units:(cols[4]||"").trim(),
      correctUnit:(cols[5]||"").trim(),
      answer:Number((cols[6]||"").trim()),
      desc :(cols[7]||"").trim().replace(/\|/g,"\n")  // ← |を改行に
    });
  }
  return out;
}

/* ===========================================================
   ▼ 全角→半角（数値正規化）
=========================================================== */
function normalizeNumber(str){
  return String(str)
    .replace(/[\uFF10-\uFF19]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/\uFF0D/g,"-").replace(/\uFF0B/g,"+")
    .replace(/\uFF0E/g,".").replace(/\uFF0C/g,",")
    .replace(/\s+/g,"").trim();
}

/* ===========================================================
   ▼ 問題データ
=========================================================== */
let bizQuestions=[];
fetch("data/business.csv")
  .then(res=>res.text())
  .then(text=>{ bizQuestions=parseBusinessCSV(text); });

/* ===========================================================
   ▼ 分野抽出 → チェックボックス生成
=========================================================== */
function setupBizFields(){
  const level=document.getElementById("bizLevelSelect").value;
  const list=bizQuestions.filter(q=>q.level===level);

  if(list.length===0){
    alert(level+"級の問題がありません。");
    return;
  }

  // ▼ 分野の重複除去
  const fields=[...new Set(list.map(q=>q.field))];

  const area=document.getElementById("bizFieldArea");
  area.innerHTML="";

  fields.forEach(f=>{
    const label=document.createElement("label");
    label.innerHTML=`<input type="checkbox" value="${f}"> ${f}`;
    area.appendChild(label);
  });

  document.getElementById("bizFieldSelectArea").classList.remove("hidden");
}

/* 全選択 / 全解除 */
function bizSelectAllFields(){
  document.querySelectorAll("#bizFieldArea input")
    .forEach(c=>c.checked=true);
}
function bizClearAllFields(){
  document.querySelectorAll("#bizFieldArea input")
    .forEach(c=>c.checked=false);
}

/* 選択された分野取得 */
function getBizSelectedFields(){
  return [...document.querySelectorAll("#bizFieldArea input:checked")]
          .map(c=>c.value);
}

/* ===========================================================
   ▼ クイズ開始
=========================================================== */
let bizCurrentList=[], bizCurrentIndex=0, bizCurrentQ=null;
const keyStreak = `biz_bestStreak_${level}`;
let bestStreak = Number(localStorage.getItem(keyStreak) || 0);

function startBusinessQuiz(){
  const level=document.getElementById("bizLevelSelect").value;
  const selectedFields=getBizSelectedFields();

  if(selectedFields.length===0){
    alert("分野を選択してください。");
    return;
  }

  const list=bizQuestions.filter(
    q=>q.level===level && selectedFields.includes(q.field)
  );
  if(list.length===0){
    alert("その条件の問題がありません。");
    return;
  }

  bizCorrectCount = 0;
  bizStreak = 0;

  bizCurrentList=shuffle([...list]);
  bizCurrentIndex=0;

  document.getElementById("bizQuizArea").classList.remove("hidden");
  document.getElementById("bizResult").innerText="";

  nextBusinessQuestion();
}

/* ===========================================================
   ▼ ステータスバー（第○問 / 正解数 / 連続正解）
=========================================================== */
function updateBizStatus(){
  const keyCorrect = `biz_totalCorrect_${bizCurrentQ.level}`;
  const keyAnswered = `biz_totalAnswered_${bizCurrentQ.level}`;
  const keyBestStreak = `biz_bestStreak_${bizCurrentQ.level}`;

  const totalCorrect = Number(localStorage.getItem(keyCorrect) || 0);
  const totalAnswered = Number(localStorage.getItem(keyAnswered) || 0);
  const bestStreak = Number(localStorage.getItem(keyBestStreak) || 0);

  document.getElementById("bizStatusBar").innerHTML =
    `第 ${now} 問 / 全 ${total} 問 |
    正解：${bizCorrectCount} |
    連続：${bizStreak}（最高 ${bestStreak}） |
    通算：${totalCorrect}/${totalAnswered}`;
  }

/* ===========================================================
   ▼ 次の問題
=========================================================== */
function nextBusinessQuestion(){
  if(bizCurrentIndex>=bizCurrentList.length){
    document.getElementById("bizResult").innerText="以上です。";
    document.getElementById("bizNextBtn").classList.add("hidden");
    return;
  }
  bizCurrentQ=bizCurrentList[bizCurrentIndex++];
  showBusinessQuestion(bizCurrentQ);
}

/* ===========================================================
   ▼ 問題表示
=========================================================== */
function showBusinessQuestion(q){
  document.getElementById("bizQuestion").innerText=q.text;

  const num=document.getElementById("bizAnswerNumber");
  const unit=document.getElementById("bizUnitSelect");
  const row=document.getElementById("bizInputRow");
  const result=document.getElementById("bizResult");

  num.value="";
  result.innerText="";
  document.getElementById("bizNextBtn").classList.add("hidden");

  /* ▼ 単位プルダウン生成 */
  unit.innerHTML="";
  q.units.split("|").map(u=>u.trim()).filter(u=>u).forEach(u=>{
    const opt=document.createElement("option");
    opt.value=u;
    opt.textContent=u;
    unit.appendChild(opt);
  });

  /* ▼ 前後フラグで並び替え */
  row.innerHTML="";
  if(q.pos==="1"){
    row.appendChild(unit);
    row.appendChild(num);
  }else{
    row.appendChild(num);
    row.appendChild(unit);
  }

  /* ▼ カンマ補助 */
  num.oninput=()=>{
    let v=num.value.replace(/,/g,"");
    if(!isNaN(v)&&v!==""){
      num.value=Number(v).toLocaleString();
    }
  };
  updateBizStatus();
}

/* ===========================================================
   ▼ 答え合わせ
=========================================================== */
function checkBusinessAnswer(){
  if(!bizCurrentQ) return;

  const raw=document.getElementById("bizAnswerNumber").value;
  const unit=document.getElementById("bizUnitSelect").value;
  const result=document.getElementById("bizResult");

  if(!raw){
    alert("答えを入力してください。");
    return;
  }

  const normalized=normalizeNumber(raw);

  if(!/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(normalized)){
    result.innerText="コンマで3桁区切りにしてください。";
    return;
  }

  const userValue=normalized.replace(/,/g,"");
  const correctValue=String(bizCurrentQ.answer);
  const correctUnit=bizCurrentQ.correctUnit;

  const ok=(userValue===correctValue)&&(unit===correctUnit);

  const descHtml=(bizCurrentQ.desc||"").replace(/\n/g,"<br>");

  if(ok){
    result.innerHTML="〇 正解！<br><br>"+descHtml;
    /* 正解時のアニメーション */
    const qElem = document.getElementById("bizQuestion");
    qElem.classList.remove("correct-anim");
    void qElem.offsetWidth; // ← アニメ再生のためリセット
    qElem.classList.add("correct-anim");

    // ▼ ベスト連続記録の更新
    if(bizStreak > bestStreak){
      bestStreak = bizStreak;
      localStorage.setItem(`biz_bestStreak_${bizCurrentQ.level}`, bestStreak);
    }

    // ▼ 累積成績（総正解数・総回答数）
    const keyCorrect = `biz_totalCorrect_${bizCurrentQ.level}`;
    const keyAnswered = `biz_totalAnswered_${bizCurrentQ.level}`;

    const totalCorrect = Number(localStorage.getItem(keyCorrect) || 0) + 1;
    const totalAnswered = Number(localStorage.getItem(keyAnswered) || 0) + 1;

    localStorage.setItem(keyCorrect, totalCorrect);
    localStorage.setItem(keyAnswered, totalAnswered);

  }else{
    const formatted=Number(bizCurrentQ.answer).toLocaleString();
    const correctStr=(bizCurrentQ.pos==="1")
      ? correctUnit+formatted : formatted+correctUnit;

    // ▼ 不正解のとき（回答数のみ+1）
    const keyAnswered = `biz_totalAnswered_${bizCurrentQ.level}`;
    const totalAnswered = Number(localStorage.getItem(keyAnswered) || 0) + 1;
    localStorage.setItem(keyAnswered, totalAnswered);

    // ストリークはリセット
    bizStreak = 0;

    result.innerHTML=
      "× 不正解<br>正解："+correctStr+
      "<br><br>解説："+descHtml;
  }

  if(ok){
    bizCorrectCount++;
    bizStreak++;
  } else {
    bizStreak = 0; // 連続記録リセット
  }
  updateBizStatus();

  document.getElementById("bizNextBtn").classList.remove("hidden");
}

/* ===========================================================
   ▼ シャッフル
=========================================================== */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

</script>

</body>
</html>
