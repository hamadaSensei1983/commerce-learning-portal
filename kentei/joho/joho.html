```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理検定 用語問題</title>

<link rel="stylesheet" href="../../css/common.css">

</head>

<body>

<header class="app-header">
<div class="header-left">
<img src="../../images/logo.png" class="header-icon">
<div>
<h1 class="site-title">検定対策システム</h1>
<div class="exam-title" id="examLevel"></div>
</div>
</div>
</header>

<div id="loadingScreen">

<div style="text-align:center">

<img src="../../images/logo.png" style="width:90px;margin-bottom:20px">

<div class="spinner"></div>

<p style="margin-top:15px;font-weight:bold">
問題を読み込み中...
</p>

</div>

</div>

<div class="card hidden" id="setupArea">

<h3>分野選択</h3>

<div id="fieldArea" class="field-grid"></div>

<button class="control-btn" onclick="selectAll()">全選択</button>
<button class="control-btn" onclick="clearAll()">全解除</button>

<h3>モード選択</h3>

<button class="mode-btn" onclick="selectMode('normal')">
通常モード
</button>
<div style="font-size:13px;margin-bottom:10px">
5問出題されます
</div>

<button class="mode-btn" onclick="selectMode('challenge')">
チャレンジモード
</button>
<div style="font-size:13px;margin-bottom:10px">
全問題出題。1問でも間違えると終了
</div>

<button class="mode-btn" onclick="selectMode('review')">
復習モード
</button>
<div style="font-size:13px;margin-bottom:10px">
全問題出題。間違えた問題を再度出題
</div>

<button class="mode-btn" onclick="selectMode('study')">
学習モード
</button>
<div style="font-size:13px;margin-bottom:15px">
カード形式で用語を学習
</div>

<button class="main-btn" onclick="startQuiz()">開始</button>

</div>

<div class="card hidden" id="quizArea">

<div class="progress-wrapper">

<div class="progress-text" id="progressText"></div>

<div class="progress-bar">
<div class="progress-bar-fill" id="progressBar"></div>
</div>

</div>

<h3 id="question"></h3>

<div id="choices"></div>

<p id="result"></p>

<button id="nextBtn" class="main-btn hidden" onclick="nextQuestion()">次へ</button>

</div>

<div class="card hidden" id="studyArea">

<div class="study-row">

<button class="nav-square" onclick="prevCard()">◀</button>

<div class="study-center">

<h2 id="studyTerm"></h2>
<div class="study-position" id="cardPosition"></div>

</div>

<button class="nav-square" onclick="nextCard()">▶</button>

</div>

<div class="study-meaning-box slide-area" id="studyMeaning"></div>

</div>

<a href="../../index.html" class="portal-btn">ポータル</a>

<script>

let questions=[]
let filtered=[]
let wrong=[]
let current=0
let score=0
let mode=""

const params=new URLSearchParams(location.search)
const level=params.get("level")

if(level==="3"){
document.getElementById("examLevel").innerText="情報処理検定 3級"
loadCSV("data/data3.csv")
}

if(level==="2"){
document.getElementById("examLevel").innerText="情報処理検定 2級"
loadCSV("data/data2.csv")
}

function selectMode(m){

mode=m

document.querySelectorAll(".mode-btn")
.forEach(b=>b.style.background="white")

event.target.style.background="#e8f5e9"

}

async function loadCSV(path){

try{

let res=await fetch(path)

let text=await res.text()

text=text.replace(/^\uFEFF/,"")

questions=parseCSV(text)

createFieldList()

setTimeout(()=>{

document.getElementById("loadingScreen").style.display="none"
document.getElementById("setupArea").classList.remove("hidden")

},600)

}catch{

alert("CSV読み込みエラー")

}

}

function parseCSV(text){

let rows=[]
let currentRow=[]
let current=""
let inQuotes=false

for(let char of text){

if(char=='"'){
inQuotes=!inQuotes
continue
}

if(char=="," && !inQuotes){
currentRow.push(current)
current=""
continue
}

if(char=="\n" && !inQuotes){
currentRow.push(current)
rows.push(currentRow)
currentRow=[]
current=""
continue
}

current+=char

}

currentRow.push(current)
rows.push(currentRow)

let result=[]

for(let i=1;i<rows.length;i++){

let r=rows[i]

result.push({
field:r[0],
term:r[1],
meaning:r[2],
index:i-1
})

}

return result

}

function createFieldList(){

let fields=[...new Set(questions.map(q=>q.field))]

let area=document.getElementById("fieldArea")

fields.forEach(f=>{

let label=document.createElement("label")

label.innerHTML='<input type="checkbox" value="'+f+'"> '+f

area.appendChild(label)

})

}

function selectAll(){
document.querySelectorAll("#fieldArea input")
.forEach(c=>c.checked=true)
}

function clearAll(){
document.querySelectorAll("#fieldArea input")
.forEach(c=>c.checked=false)
}

function startQuiz(){

let selected=[...document.querySelectorAll("#fieldArea input:checked")]
.map(c=>c.value)

filtered=questions.filter(q=>selected.includes(q.field))

shuffle(filtered)

current=0
score=0
wrong=[]

if(mode==="study"){

document.getElementById("setupArea").classList.add("hidden")
document.getElementById("studyArea").classList.remove("hidden")

showCard()

return

}

if(mode==="normal"){
filtered=filtered.slice(0,5)
}

document.getElementById("setupArea").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

nextQuestion()

}

function nextQuestion(){

document.getElementById("result").innerText=""
document.getElementById("nextBtn").classList.add("hidden")

if(current>=filtered.length){

if(mode==="review" && wrong.length>0){

filtered=[...wrong]
wrong=[]
current=0

alert("間違えた問題を復習します")

}else{

document.getElementById("question").innerText=
"終了！ "+score+" / "+filtered.length

document.getElementById("choices").innerHTML=""

return

}

}

updateProgress()

let q=filtered[current]

document.getElementById("question").innerText=q.meaning

let choices=generateChoices(q)

let area=document.getElementById("choices")

area.innerHTML=""

choices.forEach(c=>{

let btn=document.createElement("button")

btn.className="quiz-btn"

btn.innerText=c.term

btn.onclick=function(){
checkAnswer(c.term,q.term,btn)
}

area.appendChild(btn)

})

}

function updateProgress(){

let text="問題 "+(current+1)+" / "+filtered.length

document.getElementById("progressText").innerText=text

let percent=((current)/filtered.length)*100

document.getElementById("progressBar").style.width=percent+"%"

}

function generateChoices(q){

let arr=[q]

let i=q.index

if(questions[i-1]) arr.push(questions[i-1])
if(questions[i+1]) arr.push(questions[i+1])

while(arr.length<4){

let r=questions[Math.floor(Math.random()*questions.length)]

if(!arr.includes(r)) arr.push(r)

}

shuffle(arr)

return arr

}

function checkAnswer(answer,correct,btn){

let buttons=document.querySelectorAll(".quiz-btn")

buttons.forEach(b=>b.disabled=true)

if(answer===correct){

btn.classList.add("correct")

score++

}else{

btn.classList.add("incorrect")

wrong.push(filtered[current])

buttons.forEach(b=>{
if(b.innerText===correct){
b.classList.add("correct")
}
})

if(mode==="challenge"){
alert("不正解！チャレンジ終了")
location.reload()
return
}

}

current++

document.getElementById("nextBtn").classList.remove("hidden")

}

function showCard(){

let q=filtered[current]

document.getElementById("studyTerm").innerText=q.term
document.getElementById("studyMeaning").innerText=q.meaning
document.getElementById("cardPosition").innerText=(current+1)+" / "+filtered.length

}

function nextCard(){

current++

if(current>=filtered.length){
current=0
}

showCard()

}

function prevCard(){

current--

if(current<0){
current=filtered.length-1
}

showCard()

}

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>80) prevCard()
if(startX-endX>80) nextCard()

})

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=a[i]
a[i]=a[j]
a[j]=t

}

}

</script>

</body>
</html>
```
