<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理検定 用語学習</title>
<link rel="stylesheet" href="../../css/common.css">
</head>
<body>

<header>
<h1 id="pageTitle"></h1>
</header>

<!-- ローディング -->
<div id="loadingScreen">
  <div class="loaderBox">
    <div class="spinner"></div>
    <p>読み込み中...</p>
  </div>
</div>

<!-- 分野選択 -->
<div class="card hidden" id="fieldScreen">
<h2>分野選択</h2>
<div id="fieldCheckboxes" class="field-grid"></div>
<button onclick="selectAllFields()">全選択</button>
<button onclick="goModeSelect()">次へ</button>
</div>

<!-- モード選択 -->
<div class="card hidden" id="menuScreen">
<h2>モード選択</h2>
<button onclick="setMode('normal')">通常モード</button>
<button onclick="setMode('review')">復習モード</button>
<button onclick="setMode('challenge')">チャレンジ</button>
<button onclick="startStudyMode()">学習モード</button>
</div>

<!-- モード説明 -->
<div class="card hidden" id="modeInfoScreen">
<h2 id="modeTitle"></h2>
<p id="modeDescription"></p>
<button onclick="startQuiz()">開始する</button>
<button onclick="backToMenu()">戻る</button>
</div>

<!-- クイズ画面 -->
<div class="card hidden" id="quizScreen">
<div id="timerBox">残り10秒</div>
<div id="progressText"></div>
<h3 id="questionText"></h3>
<div id="choices"></div>
<p id="resultMessage"></p>
<button onclick="nextQuestion()">次へ</button>
</div>

<!-- ✅ 結果画面（新規追加） -->
<div class="card hidden" id="resultScreen">
<h2>結果発表</h2>
<p id="resultSummary"></p>
<p id="resultDetail"></p>
<button onclick="restartSameMode()">もう一度挑戦する</button>
<button onclick="returnToFieldSelect()">分野選択へ戻る</button>
</div>

<script>

/* ===============================
   グローバル変数
================================= */

let allQuestions=[];
let filteredQuestions=[];
let quizQuestions=[];
let wrongQuestions=[];

let selectedFields=[];
let currentIndex=0;
let score=0;
let totalTime=0;
let mode="";
let answered=false;
let timer;
let timeLeft;

/* ===============================
   初期設定
================================= */

const params=new URLSearchParams(window.location.search);
const level=params.get("level");

document.getElementById("pageTitle").innerText=
"情報処理検定 "+level+"級";

window.addEventListener("load",loadCSV);

/* ===============================
   CSV読み込み
================================= */

async function loadCSV(){
    const res=await fetch("data"+level+".csv");
    let text=await res.text();
    text=text.replace(/^\uFEFF/,"");
    const lines=text.split(/\r?\n/);

    for(let i=1;i<lines.length;i++){
        const cols=lines[i].split(",");
        if(cols.length>=3){
            allQuestions.push({
                field:cols[0].trim(),
                term:cols[1].trim(),
                meaning:cols.slice(2).join(",").trim()
            });
        }
    }

    createFieldSelection();
    showScreen("fieldScreen");
}

/* ===============================
   画面切替
================================= */

function showScreen(id){
    document.querySelectorAll(".card")
        .forEach(c=>c.classList.add("hidden"));
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById(id).classList.remove("hidden");
}

/* ===============================
   分野選択
================================= */

function createFieldSelection(){
    const fields=[...new Set(allQuestions.map(q=>q.field))];
    const box=document.getElementById("fieldCheckboxes");
    box.innerHTML="";
    fields.forEach(f=>{
        const label=document.createElement("label");
        const cb=document.createElement("input");
        cb.type="checkbox";
        cb.value=f;
        label.appendChild(cb);
        label.append(" "+f);
        box.appendChild(label);
    });
}

function selectAllFields(){
    document.querySelectorAll("#fieldCheckboxes input")
    .forEach(cb=>cb.checked=true);
}

function goModeSelect(){
    selectedFields=[];
    document.querySelectorAll("#fieldCheckboxes input:checked")
    .forEach(cb=>selectedFields.push(cb.value));

    if(selectedFields.length===0){
        alert("分野を選択してください");
        return;
    }

    filteredQuestions=allQuestions
        .filter(q=>selectedFields.includes(q.field));

    showScreen("menuScreen");
}

/* ===============================
   モード設定
================================= */

function setMode(m){
    mode=m;

    let title="",desc="";

    if(mode==="normal"){
        title="通常モード";
        desc="5問のミニテストです。";
    }
    if(mode==="review"){
        title="復習モード";
        desc="全用語を出題。間違いは全て正解するまで続きます。";
    }
    if(mode==="challenge"){
        title="チャレンジモード";
        desc="全用語出題。1問でも間違えると終了です。";
    }

    document.getElementById("modeTitle").innerText=title;
    document.getElementById("modeDescription").innerText=desc;

    showScreen("modeInfoScreen");
}

/* ===============================
   クイズ開始
================================= */

function startQuiz(){

    shuffle(filteredQuestions);

    currentIndex=0;
    score=0;
    totalTime=0;
    wrongQuestions=[];

    if(mode==="normal"){
        quizQuestions=filteredQuestions.slice(0,5);
    }else{
        quizQuestions=[...filteredQuestions];
    }

    showScreen("quizScreen");
    showQuestion();
}

/* ===============================
   問題表示
================================= */

function showQuestion(){

    clearInterval(timer);
    answered=false;
    timeLeft=10;

    const q=quizQuestions[currentIndex];

    document.getElementById("questionText").innerText=q.term;
    document.getElementById("progressText").innerText=
    (currentIndex+1)+" / "+quizQuestions.length+" 問";

    createChoices(q);

    timer=setInterval(()=>{
        timeLeft--;
        totalTime++;
        document.getElementById("timerBox").innerText=
        "残り"+timeLeft+"秒";

        if(timeLeft<=0){
            clearInterval(timer);
            checkAnswer(null);
        }
    },1000);
}

/* ===============================
   回答処理
================================= */

function checkAnswer(choice){

    if(answered) return;
    answered=true;
    clearInterval(timer);

    const correct=quizQuestions[currentIndex].meaning;

    if(choice===correct){
        score++;
        document.getElementById("resultMessage").innerText="正解！";
    }else{
        document.getElementById("resultMessage").innerText="不正解";

        if(mode==="challenge"){
            endQuiz(false);
            return;
        }

        if(mode==="review"){
            wrongQuestions.push(quizQuestions[currentIndex]);
        }
    }
}

function nextQuestion(){

    if(!answered){
        alert("答えを選択してください");
        return;
    }

    currentIndex++;

    if(currentIndex>=quizQuestions.length){

        if(mode==="review" && wrongQuestions.length>0){
            quizQuestions=[...wrongQuestions];
            wrongQuestions=[];
            currentIndex=0;
            shuffle(quizQuestions);
            showQuestion();
            return;
        }

        endQuiz(true);
    }else{
        showQuestion();
    }
}

/* ===============================
   ✅ 結果表示
================================= */

function endQuiz(completed){

    showScreen("resultScreen");

    const total=quizQuestions.length;
    const percent=Math.round((score/total)*100);

    let summary="";
    let detail="";

    if(mode==="challenge"){
        summary=completed && score===total ?
            "🎉 チャレンジ成功！" :
            "チャレンジ失敗";
    }else{
        summary="テスト終了";
    }

    detail=
    "正解数："+score+" / "+total+
    "<br>正答率："+percent+"％"+
    "<br>合計時間："+totalTime+"秒";

    document.getElementById("resultSummary").innerHTML=summary;
    document.getElementById("resultDetail").innerHTML=detail;
}

/* ===============================
   結果画面ボタン
================================= */

function restartSameMode(){
    startQuiz();
}

function returnToFieldSelect(){
    location.reload();
}

/* ===============================
   共通ユーティリティ
================================= */

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function backToMenu(){
    showScreen("menuScreen");
}

</script>
</body>
</html>
