<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 精算表（8桁）トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
  .card{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
  }
  .hidden{ display:none !important; }

  /* 上部タブ（今回は精算表＋PLだけ） */
  .tab-row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .tab-btn{
    border:none;
    border-radius:999px;
    padding:8px 16px;
    font-size:14px;
    background:#e2f5ea;
    color:#2e7d32;
    cursor:pointer;
    min-width:140px;
  }
  .tab-btn.active{
    background:#72b48a;
    color:#fff;
  }

  /* 操作バー */
  #controlBar{
    text-align:center;
    margin-bottom:10px;
  }
  #problemSelect{
    padding:8px;
    font-size:16px;
    border-radius:8px;
    border:2px solid var(--main-green);
  }

  /* 見出し */
  .section-title{
    margin-top:12px;
    margin-bottom:6px;
    padding-left:8px;
    border-left:4px solid #e53935;
    font-size:15px;
    font-weight:bold;
  }

  /* 決算整理事項（付記事項） */
  #notesArea{
    margin:6px 0 10px;
    padding:10px;
    background:#f7f7f7;
    border-left:4px solid #66bb6a;
    white-space:pre-line;
    font-size:14px;
    line-height:1.4;
  }

  /* 決算整理仕訳入力エリア */
  .adj-wrap{
    border:2px solid #d8ead8;
    background:#f9fdf9;
    border-radius:10px;
    padding:10px;
  }
  .note-block{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin:10px 0;
  }
  .note-q{
    font-weight:bold;
    margin-bottom:8px;
    white-space:pre-line;
  }
  .adj-grid{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .adj-row{
    display:grid;
    grid-template-columns: 70px 1fr 140px 90px;
    gap:8px;
    align-items:center;
  }
  .adj-row select, .adj-row input{
    padding:6px;
    font-size:14px;
  }
  .adj-row input{
    text-align:right;
  }
  .mini-btns{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:6px;
  }
  .mini-btn{
    width:auto;
    padding:6px 10px;
    font-size:13px;
    border-radius:8px;
    cursor:pointer;
  }

  /* 精算表（8桁：TB/整理/PL/BS の借貸＝8列） */
  table.seisan8{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:14px;
  }
  table.seisan8 th, table.seisan8 td{
    border:1px solid #e53935;
    padding:6px;
    vertical-align:middle;
  }
  table.seisan8 th{
    background:#ffebee;
    text-align:center;
  }
  table.seisan8 td{
    text-align:right;
  }
  table.seisan8 td:first-child{
    text-align:left;
    width:18%;
  }
  .money{
    width:100%;
    box-sizing:border-box;
    padding:4px;
    text-align:right;
    font-size:14px;
  }

  /* 新規追加行（TBに無い科目） */
  tr.added-row td:first-child{
    background:#f3f8ff;
    font-weight:bold;
  }

  /* 当期純利益・合計行 */
  tr.profit-row td, tr.total-row td{
    font-weight:bold;
    background:#fff7f7;
  }

  /* 画面下の結果 */
  #result{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-line;
    text-align:center;
  }

  /* PL（元帳残高形式：今回は表示だけの器） */
  .pl-wrap{
    max-width:760px;
    margin:0 auto;
    border:2px solid #e53935;
    border-radius:10px;
    padding:12px;
    background:#fffdfd;
  }
  .pl-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
  }
  .pl-item{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px dotted #ccc;
  }

  /* スマホ */
  @media (max-width: 720px){
    .adj-row{ grid-template-columns: 60px 1fr 110px 80px; }
    table.seisan8{ font-size:13px; }
  }
</style>
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記2級 精算表（8桁）トレーニング</div>
    </div>
  </div>
</header>

<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">読み込み中...</p>
  </div>
</div>

<div class="card hidden" id="mainCard">

  <div class="tab-row">
    <button class="tab-btn active" id="tabSeisan" onclick="showTab('seisan')">精算表</button>
    <button class="tab-btn" id="tabPL" onclick="showTab('pl')">損益計算書</button>
  </div>

  <div id="controlBar">
    <select id="problemSelect"></select>
    <button class="main-btn" style="width:auto" onclick="start()">開始</button>
  </div>

  <div class="section-title">決算整理事項</div>
  <div id="notesArea"></div>

  <div class="section-title">決算整理仕訳（入力）</div>
  <div class="adj-wrap" id="adjInputArea">
    <!-- JSで付記事項ごとの入力欄を生成 -->
  </div>

  <div class="section-title">精算表（8桁）</div>
  <div id="area_seisan">
    <table class="seisan8">
      <thead>
        <tr>
          <th rowspan="2">勘定科目</th>
          <th colspan="2">残高試算表</th>
          <th colspan="2">整理記入</th>
          <th colspan="2">損益計算書</th>
          <th colspan="2">貸借対照表</th>
        </tr>
        <tr>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
        </tr>
      </thead>
      <tbody id="seisanBody"></tbody>
    </table>

    <div style="text-align:center;margin-top:10px;">
      <button class="control-btn" style="width:auto" onclick="applyAdjustments()">精算表に反映</button>
      <button class="control-btn" style="width:auto" onclick="checkStub()">答え合わせ（準備中）</button>
    </div>

    <p id="result"></p>
  </div>

  <div id="area_pl" class="hidden">
    <div class="pl-wrap">
      <div class="pl-title">損益計算書（元帳残高形式）</div>
      <div id="plBody"></div>
      <div style="text-align:center;margin-top:8px;color:#666;font-size:13px;">
        ※このサンプルではPLは表示のみ（次段階で自動計算に発展します）
      </div>
    </div>
  </div>

</div>

<script>
/* =========================================================
  seisan2.html（安定版：TBに借方残高／貸方残高を持たせる設計）
  CSV:
   - ../data/seisan2_TB.csv
     問題ID,勘定科目,分類,借方残高,貸方残高
   - ../data/seisan2_seiri.csv
     問題ID,問題,勘定科目,正解仕訳

  実装範囲：
   ✅ 決算整理事項表示（|改行対応）
   ✅ 決算整理仕訳入力（付記事項ごと）
   ✅ 精算表（8桁：TB/整理/PL/BS 借貸）
   ✅ TBに無い科目を自動追加
   ✅ 当期純利益行・合計行を自動追加（行のみ）
   ✅ PL表示（分類＝費用/収益、仕入→売上原価）

  ※ 金額の最終計算・採点は次段階
========================================================= */

let TB = [];      // {id, acct, cls, debit, credit}
let SEIRI = [];   // {id, q, candidates[], answerRaw}
let problemIds = [];
let currentId = null;

let baseAccounts = [];
let extraAccounts = new Set();

/* ---------- CSVパーサ（簡易・安定版） ---------- */
function parseCSV(text){
  text = text.replace(/^\uFEFF/,"");
  const lines = text.split(/\r?\n/);
  const data = [];
  for(const line of lines){
    if(!line.trim()) continue;
    let cols=[], cur="", q=false;
    for(const c of line){
      if(c === '"'){ q=!q; continue; }
      if(c === "," && !q){ cols.push(cur); cur=""; }
      else cur += c;
    }
    cols.push(cur);
    data.push(cols);
  }
  return data;
}

function num(v){
  const s = String(v||"").replace(/,/g,"").trim();
  if(s==="") return 0;
  const n = Number(s);
  return isNaN(n)?0:n;
}
function fmt(n){ return n ? n.toLocaleString() : ""; }

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* ---------- 文字整形 ---------- */
function normalizeText(s){
  return String(s||"")
    .replace(/\|/g,"\n")
    .replace(/\r?\n/g,"\n")
    .trim();
}
function splitCandidates(s){
  return String(s||"")
    .replace(/\|/g,"\n")
    .replace(/\r?\n/g,"\n")
    .split("\n")
    .map(x=>x.trim())
    .filter(Boolean);
}

/* ---------- タブ切替 ---------- */
function showTab(t){
  document.getElementById("area_seisan").classList.add("hidden");
  document.getElementById("area_pl").classList.add("hidden");
  document.getElementById("tabSeisan").classList.remove("active");
  document.getElementById("tabPL").classList.remove("active");

  document.getElementById("area_"+t).classList.remove("hidden");
  if(t==="seisan") document.getElementById("tabSeisan").classList.add("active");
  if(t==="pl") document.getElementById("tabPL").classList.add("active");
}

/* ---------- 問題選択 ---------- */
function setupProblemSelect(){
  const sel = document.getElementById("problemSelect");
  sel.innerHTML = "";
  problemIds.forEach(id=>{
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = "問題 " + id;
    sel.appendChild(opt);
  });
  sel.onchange = ()=>{ currentId = sel.value; };
  currentId = problemIds[0] || null;
}

/* ---------- 開始 ---------- */
function start(){
  if(!currentId) return;

  const tbRows = TB.filter(x=>x.id===currentId);
  baseAccounts = tbRows.map(x=>x.acct);
  extraAccounts = new Set();

  renderNotes();
  renderAdjInputs();
  renderSeisanTable();
  renderPL();

  document.getElementById("result").textContent = "";
}

/* ---------- 決算整理事項 ---------- */
function renderNotes(){
  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc="abcdefghijklmnopqrstuvwxyz";
  const text = notes.map((n,i)=>`${abc[i]}. ${normalizeText(n.q)}`).join("\n\n");
  document.getElementById("notesArea").textContent = text || "（付記事項なし）";
}

/* ---------- 決算整理仕訳入力 ---------- */
function renderAdjInputs(){
  const area = document.getElementById("adjInputArea");
  area.innerHTML = "";

  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc="abcdefghijklmnopqrstuvwxyz";

  notes.forEach((n, idx)=>{
    const block = document.createElement("div");
    block.className="note-block";

    const q = document.createElement("div");
    q.className="note-q";
    q.textContent = `${abc[idx]}. ${normalizeText(n.q)}`;
    block.appendChild(q);

    const grid = document.createElement("div");
    grid.className="adj-grid";
    grid.id=`adjGrid_${idx}`;
    block.appendChild(grid);

    addAdjRow(idx, n.candidates);
    addAdjRow(idx, n.candidates);

    const btns = document.createElement("div");
    btns.className="mini-btns";
    btns.innerHTML = `
      <button class="control-btn mini-btn" onclick="addAdjRow(${idx})">＋行</button>
      <button class="control-btn mini-btn" onclick="removeAdjRow(${idx})">－行</button>
    `;
    block.appendChild(btns);

    area.appendChild(block);
  });
}

function addAdjRow(noteIndex, candidatesOpt){
  const note = SEIRI.filter(x=>x.id===currentId)[noteIndex];
  const candidates = candidatesOpt || (note ? note.candidates : []);
  const grid = document.getElementById(`adjGrid_${noteIndex}`);
  const rowCount = grid.querySelectorAll(".adj-row").length;

  const row = document.createElement("div");
  row.className="adj-row";
  row.innerHTML = `
    <select id="side_${noteIndex}_${rowCount}">
      <option value="D">借方</option>
      <option value="C">貸方</option>
    </select>
    <select id="acct_${noteIndex}_${rowCount}">
      <option value=""></option>
      ${candidates.map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("")}
    </select>
    <input id="amt_${noteIndex}_${rowCount}" class="money">
    <span style="font-size:12px;color:#666;">（行）</span>
  `;
  grid.appendChild(row);

  const amt = row.querySelector("input");
  amt.addEventListener("input",()=>{
    let v = amt.value.replace(/,/g,"");
    if(!isNaN(v) && v!=="") amt.value = Number(v).toLocaleString();
  });
}

function removeAdjRow(noteIndex){
  const grid = document.getElementById(`adjGrid_${noteIndex}`);
  const rows = grid.querySelectorAll(".adj-row");
  if(rows.length<=1) return;
  rows[rows.length-1].remove();
}

/* ---------- 精算表 ---------- */
function renderSeisanTable(){
  const tbody = document.getElementById("seisanBody");
  tbody.innerHTML="";

  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    tbody.appendChild(makeSeisanRow(acct, r.debit, r.credit, false));
  });
}

function makeSeisanRow(acct, tbD, tbC, added){
  const tr = document.createElement("tr");
  if(added) tr.classList.add("added-row");
  tr.dataset.acct = acct;

  tr.innerHTML = `
    <td>${escapeHtml(acct)}</td>
    <td>${fmt(tbD)}</td>
    <td>${fmt(tbC)}</td>
    <td class="adjD"></td>
    <td class="adjC"></td>
    <td class="plD"></td>
    <td class="plC"></td>
    <td class="bsD"></td>
    <td class="bsC"></td>
  `;
  return tr;
}

/* ---------- 整理仕訳を精算表へ反映 ---------- */
function applyAdjustments(){
  if(!currentId) return;

  const adjMap = {};
  const ensure = a=>{ if(!adjMap[a]) adjMap[a]={d:0,c:0}; };

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const grid = document.getElementById(`adjGrid_${idx}`);
    grid.querySelectorAll(".adj-row").forEach((r,rIdx)=>{
      const side = document.getElementById(`side_${idx}_${rIdx}`).value;
      const acct = document.getElementById(`acct_${idx}_${rIdx}`).value.trim();
      const amt  = num(document.getElementById(`amt_${idx}_${rIdx}`).value);
      if(!acct || amt<=0) return;
      ensure(acct);
      if(!baseAccounts.includes(acct)) extraAccounts.add(acct);
      if(side==="D") adjMap[acct].d += amt;
      else adjMap[acct].c += amt;
    });
  });

  const tbody = document.getElementById("seisanBody");
  tbody.innerHTML="";

  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    const tr = makeSeisanRow(acct, r.debit, r.credit, false);
    const adj = adjMap[acct] || {d:0,c:0};
    tr.querySelector(".adjD").textContent = fmt(adj.d);
    tr.querySelector(".adjC").textContent = fmt(adj.c);
    tbody.appendChild(tr);
  });

  [...extraAccounts].forEach(acct=>{
    const tr = makeSeisanRow(acct, 0, 0, true);
    const adj = adjMap[acct] || {d:0,c:0};
    tr.querySelector(".adjD").textContent = fmt(adj.d);
    tr.querySelector(".adjC").textContent = fmt(adj.c);
    tbody.appendChild(tr);
  });

  const trProfit=document.createElement("tr");
  trProfit.className="profit-row";
  trProfit.innerHTML=`
    <td>当期純利益</td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
  `;
  tbody.appendChild(trProfit);

  const trTotal=document.createElement("tr");
  trTotal.className="total-row";
  trTotal.innerHTML=`
    <td style="text-align:right;">合計</td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
  `;
  tbody.appendChild(trTotal);

  document.getElementById("result").textContent="整理記入を精算表に反映しました。";
}

/* ---------- PL（元帳残高形式） ---------- */
function renderPL(){
  const pl=document.getElementById("plBody");
  pl.innerHTML="";

  TB.filter(r=>r.id===currentId)
    .filter(r=>r.cls==="費用"||r.cls==="収益")
    .forEach(r=>{
      const name=(r.acct==="仕入")?"売上原価":r.acct;
      const amt=(r.cls==="費用")?r.debit:r.credit;
      if(amt===0) return;
      pl.innerHTML+=`
        <div class="pl-item">
          <span>${escapeHtml(name)}</span>
          <span>${fmt(amt)}</span>
        </div>
      `;
    });
}

/* ---------- CSV読込 ---------- */
(async function initAll(){
  try{
    const [tbText, seiriText] = await Promise.all([
      fetch("../data/seisan2_TB.csv").then(r=>r.text()),
      fetch("../data/seisan2_seiri.csv").then(r=>r.text())
    ]);

    TB = parseCSV(tbText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]||"").trim(),
        acct:(c[1]||"").trim(),
        cls:(c[2]||"").trim(),
        debit:num(c[3]),
        credit:num(c[4])
      }));

    SEIRI = parseCSV(seiriText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]||"").trim(),
        q:(c[1]||"").trim(),
        candidates:splitCandidates(c[2]||""),
        answerRaw:(c[3]||"").trim()
      }));

    problemIds=[...new Set(TB.map(x=>x.id))];
    setupProblemSelect();
    start();

  }catch(e){
    console.error(e);
    alert("CSV読み込みエラー："+e.message);
  }finally{
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("mainCard").classList.remove("hidden");
  }
})();
</script>

</body>
</html>
