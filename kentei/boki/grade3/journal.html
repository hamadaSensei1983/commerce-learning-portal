<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>簿記3級 仕訳トレーニング</title>
  <link rel="stylesheet" href="../../../css/common.css">
  <style>
    /* 問題文 */
    #question{
      text-align:center;
      font-size:26px;
      margin-bottom:25px;
    }
    /* 分野選択チェックボックス */
    .field-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      max-width:400px;
      margin:10px auto;
      text-align:left;
    }
    /* 分野ボタン */
    .field-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:400px;
      margin:10px auto;
    }
    /* 仕訳カード全体 */
    .journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
      margin-top:20px;
      padding:15px;
      background:#f9fdf9;
      border-radius:10px;
      border:2px solid #d8ead8;
    }
    /* 左右エリア（借方・貸方） */
    .side{
      background:white;
      padding:15px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
      text-align:center;
    }
    .side-title{
      font-weight:bold;
      margin-bottom:10px;
      padding-bottom:6px;
      border-bottom:2px solid #eee;
    }
    /* 入力行 */
    .entry{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin:8px 0;
    }
    /* プルダウン */
    select{
      width:130px;
      padding:5px;
      font-size:16px;
    }
    /* 金額入力欄 */
    .money{
      width:90px;
      padding:5px;
      font-size:16px;
      text-align:right;
    }
    /* 結果表示 */
    .answer-box{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
      min-height:60px;
    }
    /* 正解仕訳表示 */
    .answer-journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
      margin-top:10px;
    }
    .answer-side{
      background:#f7fff7;
      padding:10px;
      border-radius:6px;
      text-align:left;
    }
    /* ヒント用 枠線色（分類ごと） */
    .entry.hint-asset{
      border:3px solid #a9c9ff; /* 資産 */
    }
    .entry.hint-liability{
      border:3px solid #ffb3b3; /* 負債 */
    }
    .entry.hint-capital{
      border:3px solid #e3c6ff; /* 資本 */
    }
    .entry.hint-expense{
      border:3px solid #ffd8a8; /* 費用 */
    }
    .entry.hint-revenue{
      border:3px solid #b9f6ca; /* 収益 */
    }
    .entry.hint-asset,
    .entry.hint-liability,
    .entry.hint-capital,
    .entry.hint-expense,
    .entry.hint-revenue{
      border-radius:8px;
      padding:4px;
    }
    /* 分類名（optgroupラベル）の色分け */
    select optgroup[label="資産"]{
      color:#1e4fa8; /* 落ち着いた青 */
      font-weight:bold;
    }
    select optgroup[label="負債"]{
      color:#c0392b; /* 落ち着いた赤 */
      font-weight:bold;
    }
    select optgroup[label="資本"]{
      color:#8e44ad; /* 紫 */
      font-weight:bold;
    }
    select optgroup[label="費用"]{
      color:#e67e22; /* オレンジ */
      font-weight:bold;
    }
    select optgroup[label="収益"]{
      color:#2e7d32; /* 緑 */
      font-weight:bold;
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 仕訳トレーニング</div>
    </div>
  </div>
</header>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold">
      問題を読み込み中...
    </p>
  </div>
</div>

<!-- メインカード（最初は非表示） -->
<div class="card hidden" id="mainCard">

  <!-- モード選択 -->
  <div style="text-align:center;margin-top:10px;">
    <label><input type="radio" name="modeRadio" value="practice" checked onclick="setMode('practice')"> 練習モード</label>
    <label style="margin-left:10px;"><input type="radio" name="modeRadio" value="review" onclick="setMode('review')"> 復習モード</label>
    <label style="margin-left:10px;"><input type="radio" name="modeRadio" value="exam" onclick="setMode('exam')"> 検定モード</label>
  </div>

  <div id="fieldArea">
    <!-- 分野選択 -->
    <div style="text-align:center">
      <div id="fieldList" class="field-grid"></div>
      <div class="field-controls">
        <button class="control-btn" onclick="selectAll()">全選択</button>
        <button class="control-btn" onclick="clearAll()">全解除</button>
      </div>
      <div style="text-align:center;margin-top:10px">
        <button class="main-btn" onclick="start()">開始</button>
      </div>
    </div>

    <!-- ストリーク表示 -->
    <div id="stats" style="text-align:center;margin:10px 0;font-weight:bold;">
      連続正解：0（最高：0）
    </div>

    <div id="instruction" style="text-align:center;font-size:18px;margin-bottom:8px">
      次の取引の仕訳を示しなさい。
    </div>

    <h2 id="question"></h2>

    <!-- 仕訳入力エリア -->
    <div id="journalArea" style="display:none">
      <div class="journal">
        <!-- 借方 -->
        <div class="side">
          <div class="side-title">借方</div>
          <div class="entry">
            <select id="d1"></select>
            <input id="dm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="d2"></select>
            <input id="dm2" class="money" inputmode="numeric">
          </div>
        </div>
        <!-- 貸方 -->
        <div class="side">
          <div class="side-title">貸方</div>
          <div class="entry">
            <select id="c1"></select>
            <input id="cm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="c2"></select>
            <input id="cm2" class="money" inputmode="numeric">
          </div>
        </div>
      </div>

      <p id="result" class="answer-box"></p>

      <div style="text-align:center">
        <button class="main-btn" id="checkBtn" onclick="check()">答え合わせ</button>
        <button class="control-btn" type="button" id="hintBtn" onclick="showHint()">ヒント</button>
        <button class="main-btn hidden" id="nextBtn" onclick="next()">次の問題</button>
      </div>
    </div>
  </div>
</div>

<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

<script>
/* =====================
   グローバル変数
===================== */
let allData = [];       // journal3.csv から読み込んだ仕訳問題
let data = [];          // 練習・復習モードの出題対象
let current;            // 現在の問題
let accountMaster = {}; // boki3.csv から読み込んだ勘定科目マスタ
let streak = 0;
let bestStreak = 0;
let autoNextTimer = null;
let fieldStats = {};
let quizOrder = [];
let quizIndex = 0;
const loadStartTime = Date.now();
const typeOrder = ["資産","負債","資本","費用","収益"];

/* 新規追加：モード・復習・検定用 */
let mode = "practice";      // 'practice' | 'review' | 'exam'
let wrongPool = [];         // 間違えた問題のプール（復習用）
let examQuestions = [];     // 検定モード用4問
let examIndex = 0;          // 検定モードのインデックス
let examResults = [];       // 検定モードの結果 {question, correct}

/* =====================
   CSVパーサー（クォート対応）
===================== */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  let rows = text.trim().split(/\r?\n/);
  let result = [];
  for(let line of rows){
    let cols = [];
    let current = "";
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
      let c = line[i];
      if(c === '"'){
        inQuotes = !inQuotes;
        continue;
      }
      if(c === "," && !inQuotes){
        cols.push(current);
        current = "";
      }else{
        current += c;
      }
    }
    cols.push(current);
    result.push(cols);
  }
  return result;
}

/* 文字列 → 数値（カンマ削除＆空欄は0） */
function toNumber(v){
  if(!v) return 0;
  const s = String(v).replace(/,/g,"").trim();
  if(s === "") return 0;
  const num = Number(s);
  return isNaN(num) ? 0 : num;
}

/* =====================
   CSV読み込み（journal3 + boki3）
===================== */
Promise.all([
  fetch("../data/journal3.csv").then(res =>{
    if(!res.ok) throw new Error("journal3.csv が見つかりません");
    return res.text();
  }),
  fetch("../data/boki3.csv").then(res =>{
    if(!res.ok) throw new Error("boki3.csv が見つかりません");
    return res.text();
  })
])
.then(([journalText, bokiText])=>{
  // 仕訳問題
  const jRows = parseCSV(journalText);
  const jBody = jRows.slice(1).filter(r => r.length && r.join("").trim() !== "");
  allData = jBody.map(c =>{
    return{
      field : (c[0] || "").trim(),
      q     : (c[1] || "").trim(),
      d1    : (c[2] || "").trim(),
      dm1   : toNumber(c[3]),
      d2    : (c[4] || "").trim(),
      dm2   : toNumber(c[5]),
      c1    : (c[6] || "").trim(),
      cm1   : toNumber(c[7]),
      c2    : (c[8] || "").trim(),
      cm2   : toNumber(c[9]),
      desc  : (c[10]|| "").trim()
    };
  });

  // 勘定科目マスタ
  const bRows = parseCSV(bokiText);
  const bBody = bRows.slice(1).filter(r => r.length && r.join("").trim() !== "");
  accountMaster = {};
  bBody.forEach(cols =>{
    const name = (cols[0] || "").trim();
    const type = (cols[1] || "").trim();
    if(!name || !type) return;
    if(!accountMaster[type]) accountMaster[type] = [];
    if(!accountMaster[type].includes(name)){
      accountMaster[type].push(name);
    }
  });

  init();

  // ローディング1秒ルール
  const elapsed     = Date.now() - loadStartTime;
  const minDuration = 1000;
  const showMain = () =>{
    const loading = document.getElementById("loadingScreen");
    const card    = document.getElementById("mainCard");
    if(loading) loading.style.display = "none";
    if(card) card.classList.remove("hidden");
    loadBestStreak();
    updateStreakDisplay();
  };
  if(elapsed >= minDuration){
    showMain();
  }else{
    setTimeout(showMain, minDuration - elapsed);
  }
})
.catch(err =>{
  console.error("CSV読み込み失敗", err);
  const loading = document.getElementById("loadingScreen");
  const card    = document.getElementById("mainCard");
  if(loading) loading.style.display = "none";
  if(card) card.classList.remove("hidden");
  document.getElementById("question").innerText = "CSV読み込みエラー";
  document.getElementById("result").innerText   = err.message || err;
});

/* =====================
   モード切り替え
===================== */
function setMode(m){
  mode = m;
  clearHintClasses();
  const hintBtn = document.getElementById("hintBtn");
  if(hintBtn){
    if(mode === "exam"){
      hintBtn.style.display = "none";   // 検定モードではヒント非表示
    }else{
      hintBtn.style.display = "";
    }
  }
  // 検定モードに入るときはストリーク表示などはそのまま（練習用の目安として残す）
}

/* =====================
   初期化
===================== */
function init(){
  // 分野リスト作成
  let fields = [...new Set(allData.map(x => x.field))];
  let area   = document.getElementById("fieldList");
  fields.forEach(f =>{
    let label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${f}"> ${f}`;
    area.appendChild(label);
  });

  // 勘定科目プルダウン
  fillAccountsGrouped();

  // 金額入力カンマフォーマット
  document.querySelectorAll(".money").forEach(el =>{
    el.addEventListener("input", () =>{
      let v = el.value.replace(/,/g,"");
      if(!isNaN(v) && v !== ""){
        el.value = Number(v).toLocaleString();
      }
    });
  });

  loadBestStreak();
  updateStreakDisplay();
}

/* 勘定科目プルダウン（分類グループ付き） */
function fillAccountsGrouped(){
  ["d1","d2","c1","c2"].forEach(id =>{
    const s = document.getElementById(id);
    s.innerHTML = "";

    const blank = document.createElement("option");
    blank.value = "";
    blank.text  = "";
    s.appendChild(blank);

    typeOrder.forEach(type =>{
      const list = accountMaster[type] || [];
      if(list.length === 0) return;
      const og = document.createElement("optgroup");
      og.label = type;
      list.forEach(name =>{
        const opt = document.createElement("option");
        opt.value = name;
        opt.text  = name;
        og.appendChild(opt);
      });
      s.appendChild(og);
    });
  });
}

/* 最高連続正解数 読込・保存 */
function loadBestStreak(){
  const key = "journal3_bestStreak";
  const v   = localStorage.getItem(key);
  bestStreak = v ? parseInt(v,10) : 0;
}
function saveBestStreak(){
  const key = "journal3_bestStreak";
  localStorage.setItem(key, String(bestStreak));
}

/* ストリーク表示更新 */
function updateStreakDisplay(){
  const statsDiv = document.getElementById("stats");
  if(!statsDiv) return;
  statsDiv.innerText = "連続正解：" + streak + "（最高：" + bestStreak + "）";
}

/* 全選択 / 全解除 */
function selectAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = true);
}
function clearAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = false);
}

/* 配列シャッフル */
function shuffle(a){
  for(let i=a.length-1; i>0; i--){
    let j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* =====================
   検定モード用：4問ピックアップ
===================== */
function pickExamQuestions(){
  const byField = {};
  allData.forEach(q =>{
    if(!byField[q.field]) byField[q.field] = [];
    byField[q.field].push(q);
  });

  const fields = Object.keys(byField);
  shuffle(fields);

  examQuestions = [];
  for(let f of fields){
    const list = byField[f];
    shuffle(list);
    examQuestions.push(list[0]);   // 分野ごとに1問ずつ
    if(examQuestions.length >= 4) break;
  }

  // もし4問未満なら、他の問題から補充（分野被りOK）
  if(examQuestions.length < 4){
    const others = [...allData];
    shuffle(others);
    for(let q of others){
      if(!examQuestions.includes(q)){
        examQuestions.push(q);
        if(examQuestions.length >= 4) break;
      }
    }
  }

  examIndex   = 0;
  examResults = [];
}

/* 検定モード用：1問読み込み */
function loadExamQuestion(){
  clearInputs();
  clearHintClasses();
  const qObj = examQuestions[examIndex];
  current = qObj;   // 共通のcheckロジックで採点するため

  document.getElementById("question").innerText = qObj.q;
  document.getElementById("result").innerHTML  = "";

  document.getElementById("nextBtn").classList.add("hidden");
  const checkBtn = document.getElementById("checkBtn");
  if(checkBtn) checkBtn.disabled = false;
}

/* 検定モード：結果表示 */
function showExamResult(){
  lockInputs();
  clearHintClasses();

  const total = examResults.length;
  const correctCount = examResults.filter(r => r.correct).length;

  let html = "";
  html += "<b>検定モード 結果</b><br>";
  html += total + "問中 " + correctCount + "問 正解<br><br>";

  examResults.forEach((r, idx) =>{
    html += (idx+1) + "問目：" + (r.correct ? "〇 正解" : "× 不正解");
    html += "（分野：" + r.question.field + "）<br>";
  });

  html += "<br>";

  if(correctCount <= 1){
    html += "練習モードでしっかりと復習しましょう！";
  }else if(correctCount >= 4){
    html += "検定でもこの調子で頑張りましょう！";
  }else{
    html += "よくできています。間違えた問題は復習モードで確認しましょう。";
  }

  document.getElementById("result").innerHTML = html;

  const checkBtn = document.getElementById("checkBtn");
  if(checkBtn) checkBtn.disabled = true;
}

/* =====================
   開始（練習・復習・検定）
===================== */
function start(){
  // 検定モード
  if(mode === "exam"){
    pickExamQuestions();
    document.getElementById("journalArea").style.display = "block";
    document.getElementById("result").innerHTML = "";
    loadExamQuestion();
    return;
  }

  // 練習・復習モード共通：分野チェック
  let selected = [...document.querySelectorAll("#fieldList input:checked")]
                  .map(x => x.value);
  if(selected.length === 0){
    alert("分野を選択してください");
    return;
  }

  if(mode === "review"){
    if(wrongPool.length === 0){
      alert("復習する問題がありません（まだ間違いが記録されていません）。");
      return;
    }
    // 間違えた問題だけを対象にする
    data = [...wrongPool];
    // wrongPoolを空にするかどうかは運用次第（ここでは残しておく）
  }else{
    // 練習モード：選択された分野の全問題
    data = allData.filter(x => selected.includes(x.field));
  }

  // 分野別成績リセット
  fieldStats = {};
  data.forEach(q =>{
    if(!fieldStats[q.field]){
      fieldStats[q.field] = {correct:0, total:0};
    }
  });

  // 連続正解リセット（最高値は保持）
  streak = 0;
  updateStreakDisplay();

  quizOrder = shuffle([...data]);
  quizIndex = 0;

  document.getElementById("journalArea").style.display = "block";
  next();
}

/* 次の問題（シャッフル順に出題、検定モードでは使わない） */
function next(){
  if(autoNextTimer !== null){
    clearTimeout(autoNextTimer);
    autoNextTimer = null;
  }

  // 検定モードでは next() は使わない
  if(mode === "exam"){
    return;
  }

  if(!quizOrder || quizOrder.length === 0) return;

  if(quizIndex >= quizOrder.length){
    quizOrder = shuffle([...data]);
    quizIndex = 0;
  }

  current = quizOrder[quizIndex];
  quizIndex++;

  document.getElementById("question").innerText = current.q;
  document.getElementById("result").innerHTML  = "";
  clearInputs();
  clearHintClasses();

  const nextBtn  = document.getElementById("nextBtn");
  const checkBtn = document.getElementById("checkBtn");
  if(nextBtn)  nextBtn.classList.add("hidden");
  if(checkBtn) checkBtn.disabled = false;
}

/* 入力欄クリア＆有効化 */
function clearInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id =>{
    let el = document.getElementById(id);
    if(!el) return;
    el.disabled = false;
    if(el.tagName === "SELECT"){
      el.selectedIndex = 0;
    }else{
      el.value = "";
    }
  });
}

/* 値取得 */
function v(id){
  return document.getElementById(id).value;
}
function n(id){
  const raw = document.getElementById(id).value.replace(/,/g,"").trim();
  if(raw === "") return 0;
  const num = Number(raw);
  return isNaN(num) ? 0 : num;
}

/* 入力ロック */
function lockInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id =>{
    let el = document.getElementById(id);
    if(el){
      el.disabled = true;
    }
  });
}

/* 勘定科目 → 分類 */
function getTypeByAccountName(name){
  if(!name) return null;
  for(const type of typeOrder){
    const list = accountMaster[type] || [];
    if(list.includes(name)) return type;
  }
  return null;
}

/* 分類 → ヒント用クラス名 */
function getHintClassByType(type){
  switch(type){
    case "資産": return "hint-asset";
    case "負債": return "hint-liability";
    case "資本": return "hint-capital";
    case "費用": return "hint-expense";
    case "収益": return "hint-revenue";
    default:     return null;
  }
}

/* すべてのヒント枠を消す */
function clearHintClasses(){
  document.querySelectorAll(".entry").forEach(e =>{
    e.classList.remove(
      "hint-asset",
      "hint-liability",
      "hint-capital",
      "hint-expense",
      "hint-revenue"
    );
  });
}

/* ヒント表示：未入力行だけ分類色で光らせる */
function showHint(){
  // 検定モードではヒント無効
  if(mode === "exam") return;
  if(!current) return;
  clearHintClasses();

  const rows = [
    { id: "d1", account: current.d1 },
    { id: "d2", account: current.d2 },
    { id: "c1", account: current.c1 },
    { id: "c2", account: current.c2 }
  ];

  rows.forEach(row =>{
    if(!row.account) return;
    const userValue = v(row.id);
    if(userValue) return;
    const type  = getTypeByAccountName(row.account);
    const klass = getHintClassByType(type);
    if(!klass) return;
    const selectEl = document.getElementById(row.id);
    if(!selectEl) return;
    const entryDiv = selectEl.closest(".entry");
    if(entryDiv){
      entryDiv.classList.add(klass);
    }
  });
}

/* チェック（一問一回だけ有効） */
function check(){
  const checkBtn = document.getElementById("checkBtn");
  const result   = document.getElementById("result");

  if(!current) return;

  // すでに採点済みなら無視
  if(checkBtn.disabled) return;

  // 現在の入力
  let ansD = [
    {a:v("d1"), m:n("dm1")},
    {a:v("d2"), m:n("dm2")}
  ];
  let ansC = [
    {a:v("c1"), m:n("cm1")},
    {a:v("c2"), m:n("cm2")}
  ];

  let debitSum  = ansD.reduce((s,x) => s + x.m, 0);
  let creditSum = ansC.reduce((s,x) => s + x.m, 0);

  // 空入力
  const allAccountEmpty =
    !v("d1") && !v("d2") && !v("c1") && !v("c2");
  if(allAccountEmpty && debitSum === 0 && creditSum === 0){
    result.innerHTML = "科目と金額を入力してください";
    return;
  }

  // 金額未入力
  if(debitSum === 0 && creditSum === 0){
    result.innerHTML = "金額を入力してください";
    return;
  }

  // 合計不一致
  if(debitSum !== creditSum){
    result.innerHTML = "借方と貸方の金額が一致していません";
    return;
  }

  // ここからモード別の採点処理
  if(mode === "exam"){
    // 検定モード：ここでは○×だけ記録して表示はしない
    let corD = [
      {a:current.d1, m:current.dm1},
      {a:current.d2, m:current.dm2}
    ];
    let corC = [
      {a:current.c1, m:current.cm1},
      {a:current.c2, m:current.cm2}
    ];

    const ok = compare(ansD, corD) && compare(ansC, corC);

    examResults.push({
      question: current,
      correct : ok
    });

    checkBtn.disabled = true;

    examIndex++;
    if(examIndex < 4){
      loadExamQuestion();
    }else{
      showExamResult();
    }
    return;
  }

  // ここからは 練習・復習モード 共通の採点処理
  checkBtn.disabled = true;

  let corD = [
    {a:current.d1, m:current.dm1},
    {a:current.d2, m:current.dm2}
  ];
  let corC = [
    {a:current.c1, m:current.cm1},
    {a:current.c2, m:current.cm2}
  ];

  fieldStats[current.field].total++;

  let ok = compare(ansD, corD) && compare(ansC, corC);

  if(ok){
    result.innerHTML = "〇 正解！";
    streak++;
    if(streak > bestStreak){
      bestStreak = streak;
      saveBestStreak();
    }
    fieldStats[current.field].correct++;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 正解時：1秒後に自動で次の問題へ
    autoNextTimer = setTimeout(() =>{
      autoNextTimer = null;
      next();
    }, 1000);

  }else{
    let html =
      "× 不正解<br><br>" +
      "<b>正解</b>" +
      "<div class='answer-journal'>" +
        "<div class='answer-side'>" +
          "<b>借方</b><br>" +
          current.d1 + " " + current.dm1.toLocaleString() + "<br>" +
          (current.d2 ? current.d2 + " " + current.dm2.toLocaleString() : "") +
        "</div>" +
        "<div class='answer-side'>" +
          "<b>貸方</b><br>" +
          current.c1 + " " + current.cm1.toLocaleString() + "<br>" +
          (current.c2 ? current.c2 + " " + current.cm2.toLocaleString() : "") +
        "</div>" +
      "</div><br>" +
      "解説：" + (current.desc || "");

    result.innerHTML = html;

    // 復習用に間違えた問題を保存
    wrongPool.push(current);

    streak = 0;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 不正解時：次の問題ボタンで進む
    const nextBtn = document.getElementById("nextBtn");
    if(nextBtn) nextBtn.classList.remove("hidden");
  }
}

/* 勘定科目＋金額の比較（順不同OK） */
function compare(a, b){
  a = a.filter(x => x.m > 0);
  b = b.filter(x => x.m > 0);
  if(a.length !== b.length) return false;
  return a.every(x => b.some(y => x.a === y.a && x.m === y.m));
}

/* 分野別正解率表示 */
function showFieldStats(){
  let html = "<br><b>分野別正解率</b><br>";
  for(let f in fieldStats){
    let s    = fieldStats[f];
    let rate = s.total ? Math.round(s.correct / s.total * 100) : 0;
    html += f + " : " + rate + "% (" + s.correct + "/" + s.total + ")<br>";
  }
  document.getElementById("result").innerHTML += html;
}
</script>
