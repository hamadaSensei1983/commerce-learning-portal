<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>簿記3級 仕訳トレーニング</title>

<link rel="stylesheet" href="../../../css/common.css">

<style>

/* 問題 */

#question{
text-align:center;
font-size:26px;
margin-bottom:25px;
}

/* 分野選択 */

.field-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:8px;

max-width:400px;

margin:10px auto;

text-align:left;

}

/* 仕訳エリア */

.journal{

display:grid;

grid-template-columns:1fr 1fr;

gap:40px;

margin-top:20px;

}

.side{
text-align:center;
}

.side-title{
font-weight:bold;
margin-bottom:10px;
}

/* 入力行 */

.entry{

display:flex;

justify-content:center;

gap:8px;

margin:8px 0;

}

/* プルダウン */

select{

width:130px;

padding:5px;

font-size:16px;

}

/* 金額 */

.money{

width:90px;

padding:5px;

font-size:16px;

text-align:right;

}

.answer-box{

margin-top:20px;

font-size:18px;

font-weight:bold;

min-height:60px;

}

</style>

</head>

<body>

<header class="app-header">

<div class="header-left">

<img src="../../../images/logo.png" class="header-icon">

<div>

<h1 class="site-title">検定対策システム</h1>

<div class="exam-title">全商簿記3級 仕訳トレーニング</div>

</div>

</div>

</header>


<div class="card">

<!-- 分野選択 -->

<div id="fieldArea">

<div style="text-align:center">

<button onclick="selectAll()">全選択</button>
<button onclick="clearAll()">全解除</button>

</div>

<div id="fieldList" class="field-grid"></div>

<div style="text-align:center;margin-top:10px">

<button class="main-btn" onclick="start()">開始</button>

</div>

</div>


<h2 id="question"></h2>


<div id="journalArea" style="display:none">

<div class="journal">

<!-- 借方 -->

<div class="side">

<div class="side-title">借方</div>

<div class="entry">
<select id="d1"></select>
<input id="dm1" class="money" inputmode="numeric">
</div>

<div class="entry">
<select id="d2"></select>
<input id="dm2" class="money" inputmode="numeric">
</div>

</div>

<!-- 貸方 -->

<div class="side">

<div class="side-title">貸方</div>

<div class="entry">
<select id="c1"></select>
<input id="cm1" class="money" inputmode="numeric">
</div>

<div class="entry">
<select id="c2"></select>
<input id="cm2" class="money" inputmode="numeric">
</div>

</div>

</div>


<p id="result" class="answer-box"></p>

<div style="text-align:center">

<button class="main-btn" onclick="check()">答え合わせ</button>
<button class="main-btn" onclick="next()">次の問題</button>

</div>

</div>

</div>


<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>


<script>

let allData=[]
let data=[]
let current
let accounts=[]

fetch("../data/journal3.csv")
.then(res=>res.text())
.then(text=>{

let rows=text.trim().split(/\r?\n/).slice(1)

allData=rows.map(r=>{

let c=r.split(",")

return{

field:c[0],
q:c[1],

d1:c[2], dm1:Number(c[3]||0),
d2:c[4], dm2:Number(c[5]||0),

c1:c[6], cm1:Number(c[7]||0),
c2:c[8], cm2:Number(c[9]||0),

desc:c[10]

}

})

init()

})


function init(){

let fields=[...new Set(allData.map(x=>x.field))]

let area=document.getElementById("fieldList")

fields.forEach(f=>{

let label=document.createElement("label")

label.innerHTML=`<input type="checkbox" value="${f}"> ${f}`

area.appendChild(label)

})

accounts=[...new Set(allData.flatMap(x=>[
x.d1,x.d2,x.c1,x.c2
]).filter(Boolean))]

fillAccounts()

}


/* 勘定科目 */

function fillAccounts(){

["d1","d2","c1","c2"].forEach(id=>{

let s=document.getElementById(id)

let blank=document.createElement("option")
blank.value=""
blank.text=""

s.appendChild(blank)

accounts.forEach(a=>{

let o=document.createElement("option")
o.value=a
o.text=a

s.appendChild(o)

})

})

}


/* 全選択 */

function selectAll(){

document.querySelectorAll("#fieldList input")
.forEach(x=>x.checked=true)

}

/* 全解除 */

function clearAll(){

document.querySelectorAll("#fieldList input")
.forEach(x=>x.checked=false)

}


function start(){

let selected=[...document.querySelectorAll("#fieldList input:checked")]
.map(x=>x.value)

if(selected.length===0){

alert("分野を選択してください")

return

}

data=allData.filter(x=>selected.includes(x.field))

document.getElementById("journalArea").style.display="block"

next()

}


/* 次の問題 */

function next(){

current=data[Math.floor(Math.random()*data.length)]

document.getElementById("question").innerText=current.q

document.getElementById("result").innerText=""

clearInputs()

}


function clearInputs(){

["dm1","dm2","cm1","cm2"].forEach(id=>{
document.getElementById(id).value=""
})

["d1","d2","c1","c2"].forEach(id=>{
document.getElementById(id).value=""
})

}


/* カンマ処理 */

document.querySelectorAll(".money").forEach(el=>{

el.addEventListener("input",()=>{

let v=el.value.replace(/,/g,"")

if(!isNaN(v) && v!==""){

el.value=Number(v).toLocaleString()

}

})

})


/* チェック */

function check(){

let ansD=[

{a:v("d1"),m:n("dm1")},
{a:v("d2"),m:n("dm2")}

]

let ansC=[

{a:v("c1"),m:n("cm1")},
{a:v("c2"),m:n("cm2")}

]

let corD=[

{a:current.d1,m:current.dm1},
{a:current.d2,m:current.dm2}

]

let corC=[

{a:current.c1,m:current.cm1},
{a:current.c2,m:current.cm2}

]


let debitSum=ansD.reduce((s,x)=>s+x.m,0)
let creditSum=ansC.reduce((s,x)=>s+x.m,0)

if(debitSum!==creditSum){

document.getElementById("result").innerHTML=
"借方と貸方の金額が一致していません"

return

}

let ok=compare(ansD,corD) && compare(ansC,corC)

if(ok){

document.getElementById("result").innerHTML="〇 正解！"

}else{

document.getElementById("result").innerHTML=

"× 不正解<br><br>"+

"正解<br>"+

"借方："+current.d1+" "+current.dm1+
(current.d2?" , "+current.d2+" "+current.dm2:"")+"<br>"+

"貸方："+current.c1+" "+current.cm1+
(current.c2?" , "+current.c2+" "+current.cm2:"")+"<br><br>"+

"解説："+current.desc

}

}


function compare(a,b){

a=a.filter(x=>x.m>0)
b=b.filter(x=>x.m>0)

if(a.length!==b.length) return false

return a.every(x=>b.some(y=>x.a===y.a && x.m===y.m))

}


function v(id){
return document.getElementById(id).value
}

function n(id){
return Number(document.getElementById(id).value.replace(/,/g,"")||0)
}

</script>

</body>
</html>
