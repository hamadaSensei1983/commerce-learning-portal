<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 精算表（8桁）トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
  .card{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
  }
  .hidden{ display:none !important; }

  /* 上部タブ：常に2列 */
  .tab-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    max-width:600px;
    margin:0 auto 10px;
  }

  .tab-btn{
    width:100%;
    text-align:center;
  }

  .tab-btn.active{
    background:#72b48a;
    color:#fff;
  }

  /* 操作バー */
  #controlBar{
    text-align:center;
    margin-bottom:10px;
  }
  #problemSelect{
    padding:8px;
    font-size:16px;
    border-radius:8px;
    border:2px solid var(--main-green);
  }

  /* 見出し */
  .section-title{
    margin-top:12px;
    margin-bottom:6px;
    padding-left:8px;
    border-left:4px solid #e53935;
    font-size:15px;
    font-weight:bold;
  }

  /* 決算整理仕訳入力エリア */
  .adj-wrap{
    border:2px solid #d8ead8;
    background:#f9fdf9;
    border-radius:10px;
    padding:10px;
    max-width:900px;
    margin:0 auto;
  }
  .note-block{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:8px;
    margin:8px 0;
  }
  .note-q{
    font-weight:bold;
    margin-bottom:8px;
    white-space:pre-line;
  }
  .adj-grid{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .adj-row{
    display:grid;
    grid-template-columns: 70px 1fr 140px 90px;
    gap:8px;
    align-items:center;
  }
  .adj-row select, .adj-row input{
    padding:6px;
    font-size:14px;
  }
  .adj-row input{
    text-align:right;
  }
  .mini-btns{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:6px;
  }
  .mini-btn{
    width:auto;
    padding:6px 10px;
    font-size:13px;
    border-radius:8px;
    cursor:pointer;
  }

  /* 精算表（8桁：TB/整理/PL/BS の借貸＝8列） */
  table.seisan8{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:14px;
  }
  table.seisan8 th, table.seisan8 td{
    border:1px solid #e53935;
    padding:6px;
    vertical-align:middle;
  }
  table.seisan8 th{
    background:#ffebee;
    text-align:center;
  }
  table.seisan8 td{
    text-align:right;
  }
  table.seisan8 td:first-child{
    text-align:left;
    width:20%;
  }
  .money{
    width:100%;
    box-sizing:border-box;
    padding:4px;
    text-align:right;
    font-size:14px;
  }

  /* 新規追加行（TBに無い科目） */
  tr.added-row td:first-child{
    background:#f3f8ff;
    font-weight:bold;
  }

  /* 当期純利益・合計行 */
  tr.profit-row td, tr.total-row td{
    font-weight:bold;
    background:#fff7f7;
  }

  /* 画面下の結果 */
  #result{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-line;
    text-align:center;
  }

  /* PL（元帳残高形式：今回は表示だけの器） */
  .pl-wrap{
    max-width:760px;
    margin:0 auto;
    border:2px solid #e53935;
    border-radius:10px;
    padding:12px;
    background:#fffdfd;
  }
  .pl-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
  }
  .pl-item{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px dotted #ccc;
  }

  /* ===== 決算整理仕訳（左右入力） ===== */
  .jrnl{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:8px;
  }
  .jrnl-side{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
  }

/* ===== 決算整理仕訳（左右入力）ここを修正 ===== */

/* 1行を「科目＋金額」で横並びにする */
.jrnl-row{
  display:grid;                      /* ★これが無いと縦積みになる */
  grid-template-columns: 1fr 95px;   /* ★科目を広く、金額を狭く */
  gap:6px;
  margin:3px 0;                      /* 行間も少し詰める */
}

/* セレクト（科目）は横幅いっぱい使う */
.jrnl-row select{
  width:100%;
  min-width:0;                       /* ★Grid内で縮められるように */
}

/* 金額は狭め＋右寄せ */
.jrnl-row input{
  width:95px;                        /* ★固定で狭く */
  text-align:right;
}

/* 入力部品を少しコンパクトに（任意） */
.jrnl-row select,
.jrnl-row input{
  padding:3px 4px;
  font-size:12.5px;
  height:28px;
  box-sizing:border-box;
}

/* 借方/貸方の見出しもさらに詰めたい場合 */
.jrnl-title{
  font-size:11px;
  padding:1px 0;
  margin-bottom:4px;
  line-height:1.0;
}

  /* 金額は右寄せ維持 */
  .jrnl-row input{
    text-align:right;
  }

  /* 付記事項ブロックの採点表示（答えは出さず枠だけ） */
  .note-block.ok{
    border:2px solid #2e7d32 !important;
    background:#e8f5e9;
  }
  .note-block.ng{
    border:2px solid #c62828 !important;
    background:#ffebee;
  }

  /* 間違い欄を赤枠に */
  .wrong {
    outline: 3px solid #e53935;
    border-radius: 4px;
  }

  /* 正解メッセージ */
  .praise {
    background: #e8f5e9;
    border: 2px solid #66bb6a;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
  }

    /* ===== 残高一覧（例：現金 368,000 / 当座預金 2,540,000 みたいな2列表示） ===== */
.balance-grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr); /* ★4列 */
  gap:6px 18px;
  max-width:1100px;
  margin:0 auto;
  border:2px solid #ffd0d0;
  border-radius:10px;
  padding:12px;
  background:#fffdfd;
}

  .bal-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px dotted #ddd;
    padding:4px 0;
    font-size:14px;
  }
  .bal-name{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding-right:10px;
  }
  .bal-amt{ font-variant-numeric: tabular-nums; }

  /* ===== 損益計算書テーブル（費用 左 / 収益 右） ===== */
  table.pl-table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:14px;
    max-width:920px;
    margin:0 auto;
  }
  table.pl-table th, table.pl-table td{
    border:1px solid #e53935;
    padding:6px;
    vertical-align:middle;
  }
  table.pl-table th{ background:#ffebee; text-align:center; }
  table.pl-table td{ text-align:right; }
  table.pl-table td.name{ text-align:left; width:35%; }

  @media (max-width: 720px){
    .balance-grid{ grid-template-columns:2, 1fr; }
  }

  @media (max-width: 720px){
    .jrnl{ grid-template-columns:1fr; }
  }

  /* スマホ */
  @media (max-width: 720px){
    .adj-row{ grid-template-columns: 60px 1fr 110px 80px; }
    table.seisan8{ font-size:13px; }
  }
</style>
</head>

<script>
/* =========================================================
  seisan2.html 2段階採点 + seisan2_map.csv（../data/固定）
  Phase1合格後に PL + BS を同時に入力させる版
========================================================= */

let TB = [];
let SEIRI = [];
let MAP = []; // {acct, cls, label?}

let problemIds = [];
let currentId = null;

let baseAccounts = [];
let extraAccounts = new Set();
let phase = 1;

let acctClass = {}; // acct -> 分類
let acctLabel = {}; // acct -> 表示名（任意）

let currentAdjMap = null;

let startMode = "seisan"; // "seisan" or "pl"

const loadStartTime = Date.now();

/* ---------- CSV（クォート内改行OK） ---------- */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = [];
  let row = [], cur = "", inQ = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === "," && !inQ){ row.push(cur); cur=""; continue; }
    if((c === "\n" || c === "\r") && !inQ){
      if(c === "\r" && text[i+1] === "\n") i++;
      row.push(cur);
      if(row.join("").trim() !== "") out.push(row);
      row=[]; cur="";
      continue;
    }
    cur += c;
  }
  row.push(cur);
  if(row.join("").trim() !== "") out.push(row);
  return out;
}

function num(v){
  const s = String(v||"").replace(/,/g,"").trim();
  if(s==="") return 0;
  const n = Number(s);
  return isNaN(n)?0:n;
}
function fmt(n){ return n ? Number(n).toLocaleString() : ""; }

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeText(s){
  return String(s||"")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/\|/g,"\n")
    .trim();
}
function splitCandidates(s){
  return String(s||"")
    .replace(/\\\r?\n/g,"|")
    .replace(/\r?\n/g,"|")
    .replace(/｜/g,"|")
    .split("|")
    .map(x=>x.trim())
    .filter(Boolean);
}

function parseAnswerRaw(raw){
  raw = String(raw||"")
    .replace(/\\\r?\n/g,"|")
    .replace(/\r?\n/g,"|")
    .replace(/｜/g,"|")
    .trim();

  const parts = raw.split(";");
  const dPart = (parts[0]||"").trim();
  const cPart = (parts[1]||"").trim();

  function parseSide(str){
    if(!str) return [];
    return str.split("|")
      .map(x=>x.trim())
      .filter(Boolean)
      .map(line=>{
        const [a,m] = line.split(":").map(z=>z.trim());
        return {acct:a, amt:num(m)};
      })
      .filter(x=>x.acct && x.amt>=0);
  }
  return { D: parseSide(dPart), C: parseSide(cPart) };
}

/* =========================================================
   UI制御（下部ボタン）
========================================================= */
function getApplyBtn(){ return document.querySelector("button[onclick*='applyAdjustments']"); }
function getPhase2CheckBtn(){ return document.querySelector("button[onclick*='checkStub']"); }
function setPhase2CheckVisible(visible){
  const b = getPhase2CheckBtn();
  if(!b) return;
  b.style.display = visible ? "" : "none";
}
function hideApplyBtnAlways(){
  const b = getApplyBtn();
  if(!b) return;
  b.style.display = "none";
}

/* ---------- タブ切替 ---------- */
function showTab(t){
  // すべて一旦隠す
  document.getElementById("area_seisan")?.classList.add("hidden");
  document.getElementById("area_pl")?.classList.add("hidden");

  document.getElementById("tabSeisan")?.classList.remove("active");
  document.getElementById("tabPL")?.classList.remove("active");

  // タブの active
  if(t==="seisan"){
    document.getElementById("tabSeisan")?.classList.add("active");
  }else{
    document.getElementById("tabPL")?.classList.add("active");
  }

  // ★開始前（workAreaがhidden）の場合は、何も表示しない
  if(document.getElementById("workArea")?.classList.contains("hidden")){
    return;
  }

  // 開始後のみ中身を表示
  document.getElementById("area_"+t)?.classList.remove("hidden");

  // 見出し切替
  const title = document.getElementById("mainSectionTitle");
  if(title){
    title.textContent = (t==="seisan")
      ? "精算表（8桁）"
      : "損益計算書";
  }
}


/* ---------- 問題選択 ---------- */
function setupProblemSelect(){
  const sel = document.getElementById("problemSelect");
  if(!sel) return;
  sel.innerHTML = "";
  problemIds.forEach(id=>{
    const opt=document.createElement("option");
    opt.value=id;
    opt.textContent="問題 "+id;
    sel.appendChild(opt);
  });
  sel.onchange=()=>{ currentId = sel.value; resetPhase(); start(); };
  currentId = problemIds[0] || null;
}

function resetPhase(){
  phase = 0; // INIT

  document.getElementById("workArea")?.classList.add("hidden");

  document.getElementById("area_seisan")?.classList.add("hidden");
  document.getElementById("area_pl")?.classList.add("hidden");

  document.getElementById("plBalanceArea")?.classList.add("hidden");
  document.getElementById("plWorksheetArea")?.classList.add("hidden");

  document.getElementById("result").textContent = "";
}

/* ---------- 開始 ---------- */
function start(){
  if(!currentId) return;

  phase = 1;
  startMode = document.getElementById("tabPL").classList.contains("active")
    ? "pl" : "seisan";

  document.getElementById("workArea").classList.remove("hidden");

  buildAcctDictionaries();

  // ★ ここが今回の肝：必ずTBを表示
  renderTBBalanceList();

  // 決算整理仕訳
  renderAdjInputs();

  if(startMode === "seisan"){
    document.getElementById("area_seisan").classList.remove("hidden");
    document.getElementById("area_pl").classList.add("hidden");
    document.getElementById("mainSectionTitle").textContent = "精算表（8桁）";
    renderSeisanTable(null);
  }else{
    document.getElementById("area_pl").classList.remove("hidden");
    document.getElementById("area_seisan").classList.add("hidden");
    document.getElementById("mainSectionTitle").textContent = "損益計算書";
    renderPLWorksheet();   // ← Phase1：整理前PL
  }

  document.getElementById("result").textContent = "";
}

/* TB＋mapから分類辞書作成 */
function buildAcctDictionaries(){
  acctClass = {};
  acctLabel = {};

  TB.filter(r=>r.id===currentId).forEach(r=>{
    acctClass[r.acct] = r.cls;
    acctLabel[r.acct] = r.acct;
  });

  MAP.forEach(m=>{
    if(!acctClass[m.acct]) acctClass[m.acct] = m.cls;
    if(m.label) acctLabel[m.acct] = m.label;
  });

}

function renderTBBalanceList(){
  const area = document.getElementById("tbBalanceList");
  if(!area) return;
  area.innerHTML = "";

  TB
    .filter(r => r.id === currentId)
    .forEach(r => {
      const net = r.debit - r.credit;
      const amt = Math.abs(net);
      if(amt === 0) return;

      const div = document.createElement("div");
      div.className = "bal-item";
      div.innerHTML =
        `<span class="bal-name">${escapeHtml(r.acct)}</span>` +
        `<span class="bal-amt">${fmt(amt)}</span>`;
      area.appendChild(div);
    });
}

/* =========================================================
   Phase1：仕訳入力（左右・正解行数固定）
========================================================= */
function renderAdjInputs(){
  const area = document.getElementById("adjInputArea");
  if(!area) return;
  area.innerHTML = "";

  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc="abcdefghijklmnopqrstuvwxyz";

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    const block = document.createElement("div");
    block.className="note-block";
    block.dataset.noteIndex=String(idx);

    const q = document.createElement("div");
    q.className="note-q";
    q.textContent = `${abc[idx]}. ${normalizeText(n.q)}`;
    block.appendChild(q);

    const jrnl = document.createElement("div");
    jrnl.className="jrnl";
    jrnl.innerHTML = `
      <div class="jrnl-side">
        <div class="jrnl-title">借方</div>
        <div id="dBox_${idx}"></div>
      </div>
      <div class="jrnl-side">
        <div class="jrnl-title">貸方</div>
        <div id="cBox_${idx}"></div>
      </div>
    `;
    block.appendChild(jrnl);

    area.appendChild(block);

    buildSideRows(idx,"D", n.candidates, rowCount);
    buildSideRows(idx,"C", n.candidates, rowCount);
  });
}

function buildSideRows(noteIndex, side, candidates, rowCount){
  const box = document.getElementById(`${side==="D" ? "dBox" : "cBox"}_${noteIndex}`);
  if(!box) return;
  box.innerHTML="";

  const optHtml = (candidates||[])
    .map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`)
    .join("");

  for(let r=0;r<rowCount;r++){
    const row = document.createElement("div");
    row.className="jrnl-row";
    row.style.display="grid";
    row.innerHTML = `
      <select id="${side}acct_${noteIndex}_${r}">
        <option value=""></option>
        ${optHtml}
      </select>
      <input id="${side}amt_${noteIndex}_${r}" class="money" inputmode="numeric">
    `;
    box.appendChild(row);
  }
}

/* =========================================================
   Phase1：採点（答えは出さず枠のみ）
========================================================= */
function gradeAdjustments(){
  // Phase1（決算整理仕訳）の採点だけを担当
  if(phase !== 1) return;

  const notes = SEIRI.filter(x => x.id === currentId);
  let allOk = true;

  // ① 各付記事項の採点（正解/不正解を枠だけで表示）
  notes.forEach((n, idx) => {
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);
    const user = collectUser(idx, rowCount);

    const ok = equalMulti(user.D, correct.D) && equalMulti(user.C, correct.C);
    markBlock(idx, ok);
    if(!ok) allOk = false;
  });

  const res = document.getElementById("result");

  // 不正解があればここで終了
  if(!allOk){
    if(res){
      res.className = "";
      res.textContent = "× 仕訳に誤りがあります。赤枠の箇所を見直して、もう一度「仕訳採点」を押してください。";
    }
    return;
  }

  // ② 仕訳が全問正解 → 整理記入を集計
  const adjMap = buildAdjMapFromInputs();
  currentAdjMap = adjMap; // Phase2表示（精算表/PL）で使う

  // ③ ★ここが重要：先にPhase2へ移行（この後の描画は“Phase2として”行う）
  phase = 2;

  // ④ 決算整理仕訳入力をロック
  lockAdjustmentInputs();

  // ⑤ 精算表を整理記入反映で再描画
  renderSeisanTable(adjMap);

  // ⑥ 精算表のPL/BS入力欄を表示（デコイ表示含む）
  showOutputInputFields();

  // ⑦ PL側の再描画（存在する場合のみ安全に呼ぶ）
  //    ※あなたのPLは「残高一覧」「PL表」があるので、ここで整理後に更新されます
  if(typeof renderPLBalanceList === "function"){
    renderPLBalanceList();
  }
  if(typeof renderPLWorksheet === "function"){
    renderPLWorksheet();
  }

  // ⑧ ボタン状態（Phase1操作を無効化）
  document.getElementById("gradeAdjBtn")?.setAttribute("disabled","disabled");
  document.getElementById("giveUpBtn")?.setAttribute("disabled","disabled");
  setPhase2CheckVisible(true);

  // ⑨ 画面メッセージ
  if(res){
    res.className = "";
    res.textContent =
      "〇 仕訳は全て正解です。整理記入に反映しました。\n" +
      "次は（精算表）PL/BSへ転記し、当期純利益が一致するか確認しましょう。";
  }

  // ⑩ 新規科目の分類不足があれば注意（既存関数）
  if(typeof warnUnknownExtraAccounts === "function"){
    warnUnknownExtraAccounts();
  }

  // ⑪ ★損益計算書（PL）で学習している場合は、自動でPLタブへ切替
  //    startMode を持っていればそれを優先、無ければ現在のタブ状態で判断
  const hasStartMode = (typeof startMode !== "undefined");
  const plLearning = hasStartMode
    ? (startMode === "pl")
    : (document.getElementById("tabPL")?.classList.contains("active"));

  if(plLearning && typeof showTab === "function"){
    showTab("pl");
  }
}

function giveUp(){
  if(phase!==1) return;
  const ok = confirm("ギブアップすると、決算整理仕訳に正解を入力して次のフェーズへ進みます。\nよろしいですか？");
  if(!ok) return;

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const d = correct.D[r];
      const da = document.getElementById(`Dacct_${idx}_${r}`);
      const dm = document.getElementById(`Damt_${idx}_${r}`);
      if(da) da.value = d ? d.acct : "";
      if(dm) dm.value = d ? fmt(d.amt) : "";
    }
    for(let r=0;r<rowCount;r++){
      const c = correct.C[r];
      const ca = document.getElementById(`Cacct_${idx}_${r}`);
      const cm = document.getElementById(`Camt_${idx}_${r}`);
      if(ca) ca.value = c ? c.acct : "";
      if(cm) cm.value = c ? fmt(c.amt) : "";
    }
  });

  gradeAdjustments();
}

function collectUser(noteIndex,rowCount){
  const D=[], C=[];
  for(let r=0;r<rowCount;r++){
    const da=(document.getElementById(`Dacct_${noteIndex}_${r}`)?.value||"").trim();
    const dm=num(document.getElementById(`Damt_${noteIndex}_${r}`)?.value);
    const ca=(document.getElementById(`Cacct_${noteIndex}_${r}`)?.value||"").trim();
    const cm=num(document.getElementById(`Camt_${noteIndex}_${r}`)?.value);
    if(da && dm>0) D.push({acct:da, amt:dm});
    if(ca && cm>0) C.push({acct:ca, amt:cm});
  }
  return {D,C};
}

function ms(list){
  const m=new Map();
  list.forEach(x=>{
    const k=x.acct+"|"+x.amt;
    m.set(k,(m.get(k)||0)+1);
  });
  return m;
}
function equalMulti(a,b){
  const A=ms(a), B=ms(b);
  if(A.size!==B.size) return false;
  for(const [k,v] of A) if(B.get(k)!==v) return false;
  return true;
}
function markBlock(noteIndex, ok){
  const blocks=document.querySelectorAll(".note-block");
  const b=blocks[noteIndex];
  if(!b) return;
  b.classList.remove("ok","ng");
  b.classList.add(ok ? "ok":"ng");
}
function lockAdjustmentInputs(){
  document.querySelectorAll("#adjInputArea select, #adjInputArea input").forEach(el=>el.disabled=true);
}

function buildAdjMapFromInputs(){
  const adjMap={};
  const ensure=a=>{ if(!adjMap[a]) adjMap[a]={d:0,c:0}; };

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const correct=parseAnswerRaw(n.answerRaw);
    const rowCount=Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const da=(document.getElementById(`Dacct_${idx}_${r}`)?.value||"").trim();
      const dm=num(document.getElementById(`Damt_${idx}_${r}`)?.value);
      const ca=(document.getElementById(`Cacct_${idx}_${r}`)?.value||"").trim();
      const cm=num(document.getElementById(`Camt_${idx}_${r}`)?.value);

      if(da && dm>0){
        ensure(da); adjMap[da].d += dm;
        if(!baseAccounts.includes(da)) extraAccounts.add(da);
      }
      if(ca && cm>0){
        ensure(ca); adjMap[ca].c += cm;
        if(!baseAccounts.includes(ca)) extraAccounts.add(ca);
      }
    }
  });

  // 新規科目分類補完（map）
  [...extraAccounts].forEach(a=>{
    if(!acctClass[a]){
      const m = MAP.find(x=>x.acct===a);
      if(m) acctClass[a]=m.cls;
    }
    if(!acctLabel[a]) acctLabel[a]=a;
  });

  return adjMap;
}

    <td class="plD"></td>
    <td class="plC"></td>
    <td class="bsD"></td>

}

function renderSeisanTable(adjMap){
  currentAdjMap = adjMap;
  const tbody=document.getElementById("seisanBody");
  if(!tbody) return;
  tbody.innerHTML="";

  let tbSumD=0,tbSumC=0, adjSumD=0, adjSumC=0;

  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    if(!r) return;

    tbSumD += r.debit;
    tbSumC += r.credit;

    const tr = makeSeisanRow(acct,r.debit,r.credit,false);
    if(adjMap){
      const adj = adjMap[acct] || {d:0,c:0};
      tr.querySelector(".adjD").textContent = fmt(adj.d);
      tr.querySelector(".adjC").textContent = fmt(adj.c);
      adjSumD += adj.d; adjSumC += adj.c;
    }
    tbody.appendChild(tr);
  });

  if(adjMap){
    [...extraAccounts].forEach(acct=>{
      const tr = makeSeisanRow(acct,0,0,true);
      const adj = adjMap[acct] || {d:0,c:0};
      tr.querySelector(".adjD").textContent = fmt(adj.d);
      tr.querySelector(".adjC").textContent = fmt(adj.c);
      adjSumD += adj.d; adjSumC += adj.c;
      tbody.appendChild(tr);

    <td>当期純利益</td>
    <td></td><td></td>
    <td></td><td></td>
    <td class="plD"></td><td class="plC"></td>
    <td class="bsD"></td><td class="bsC"></td>
  `;

  const trTotal=document.createElement("tr");

  trTotal.innerHTML=`
    <td style="text-align:right;">合計</td>
    <td>${fmt(tbSumD)}</td>

    <td>${adjMap ? fmt(adjSumD) : ""}</td>
    <td>${adjMap ? fmt(adjSumC) : ""}</td>

}

/* =========================================================
   Phase2：PL+BS入力欄を同時に出す（TB+新規科目）
========================================================= */
function showOutputInputFields(){
  const tbody=document.getElementById("seisanBody");
  if(!tbody) return;

  // 科目→正解の表（PL or BS）を決める
  function correctStatementByClass(cls){
    return (cls==="費用" || cls==="収益") ? "PL" : "BS";
  }

  // 科目→入力する側（借/貸）を決める（教育設計として“分類に従う”）
  function normalSideByClass(cls){
    if(cls==="資産" || cls==="費用") return "debit";
    if(cls==="負債" || cls==="資本" || cls==="収益") return "credit";
    // 控除資産等（例：減価償却累計額・貸倒引当金など）→貸方扱い
    if(cls==="控除資産" || cls==="資産控除") return "credit";
    // 不明は一旦借方（※本来はmapで埋める）
    return "debit";
  }

  // input生成（data属性を付けてPhase2採点で使う）
  function makeTransferInput(acct, statement, side){
    return `<input class="money"
      data-role="transfer"
      data-acct="${escapeHtml(acct)}"
      data-statement="${statement}"
      data-side="${side}"
      inputmode="numeric">`;
  }

  tbody.querySelectorAll("tr").forEach(tr=>{
    const acct = tr.dataset.acct;
    const isProfit = tr.dataset.rowtype==="profit";

    // 当期純利益行：要望どおり4か所すべてに入力欄（すでに実装済みだがdata-role付与）
    if(isProfit){
      tr.querySelector(".plD").innerHTML = `<input class="money" id="plProfitD" data-role="netIncome" data-statement="PL" data-side="debit" inputmode="numeric">`;
      tr.querySelector(".plC").innerHTML = `<input class="money" id="plProfitC" data-role="netIncome" data-statement="PL" data-side="credit" inputmode="numeric">`;
      tr.querySelector(".bsD").innerHTML = `<input class="money" id="bsProfitD" data-role="netIncome" data-statement="BS" data-side="debit" inputmode="numeric">`;
      tr.querySelector(".bsC").innerHTML = `<input class="money" id="bsProfitC" data-role="netIncome" data-statement="BS" data-side="credit" inputmode="numeric">`;
      return;
    }

    if(!acct) return;

    const cls = acctClass[acct];
    const normalSide = normalSideByClass(cls);
    const correctStatement = correctStatementByClass(cls);

    // いったん空に（再描画時のゴミ防止）
    tr.querySelector(".plD").innerHTML = "";
    tr.querySelector(".plC").innerHTML = "";
    tr.querySelector(".bsD").innerHTML = "";
    tr.querySelector(".bsC").innerHTML = "";

    // 要望：「資産なら BS借方 と PL借方 の両方にInput」
    // →すべての科目で「normalSide側」を、BSとPLの両方に出す（片方がデコイ）
    if(normalSide==="debit"){
      tr.querySelector(".plD").innerHTML = makeTransferInput(acct, "PL", "debit");
      tr.querySelector(".bsD").innerHTML = makeTransferInput(acct, "BS", "debit");
    }else{
      tr.querySelector(".plC").innerHTML = makeTransferInput(acct, "PL", "credit");
      tr.querySelector(".bsC").innerHTML = makeTransferInput(acct, "BS", "credit");
    }

    // 正解セルかどうかをdata-correctで埋め込む（採点が楽）
    // （同じsideの2つのうち、正解statement側だけ correct=1）
    tr.querySelectorAll('input[data-role="transfer"]').forEach(inp=>{
      if(inp.dataset.acct !== acct) return;
      const st = inp.dataset.statement;
      inp.dataset.correct = (st === correctStatement) ? "1" : "0";
    });
  });
}

function escapeId(s){
  return String(s).replace(/[^a-zA-Z0-9_\-]/g,"_");
}

function warnUnknownExtraAccounts(){
  const unknown = [...extraAccounts].filter(a=>!acctClass[a]);
  if(unknown.length===0) return;
  document.getElementById("result").textContent +=
    `\n※注意：分類が不明な新規科目があり、PL/BS入力欄を表示できません：${unknown.join("、")}\n（seisan2_map.csv に分類を追加してください）`;
}

// 整理後残高（借-貸 + 整理借-整理貸）
function adjustedNetForPL(acct){
  const tb = TB.find(x => x.id===currentId && x.acct===acct);
  const base = tb ? (tb.debit - tb.credit) : 0;
  const adj = currentAdjMap?.[acct] ?? {d:0, c:0};
  return base + (adj.d - adj.c);
}


// 残高試算表（TB表示）用：売上・仕入は変換しない
function displayNameTB(acct){
  return acctLabel[acct] || acct;
}

// 表示名（labelを優先し、売上/仕入の置換も反映）
function displayNamePL(acct){
  if(acct === "売上") return "売上高";
  if(acct === "仕入") return "売上原価";
  return acctLabel[acct] || acct;
}

// 残高一覧：TBの残高（Phase1）→ 整理後残高（Phase2）へ自動切替
function renderPLBalanceList(){
  const area = document.getElementById("plBalanceList");
  if(!area) return;
  area.innerHTML = "";

  // ① TBの順序をそのまま使う
  const ordered = TB
    .filter(r => r.id === currentId)
    .map(r => r.acct);

  // ② 新規科目は後ろに追加
  [...extraAccounts].forEach(a=>{
    if(!ordered.includes(a)) ordered.push(a);
  });

  ordered.forEach(acct=>{
    const net = (phase>=2 && currentAdjMap)
      ? adjustedNetForPL(acct)
      : ((TB.find(r=>r.id===currentId && r.acct===acct)?.debit ?? 0)
        - (TB.find(r=>r.id===currentId && r.acct===acct)?.credit ?? 0));

    const amt = Math.abs(net);
    if(amt === 0) return;

    const div = document.createElement("div");
    div.className = "bal-item";
    div.innerHTML =
      `<span class="bal-name">${escapeHtml(displayNamePL(x.acct))}</span>`
      `<span class="bal-amt">${fmt(amt)}</span>`;
    area.appendChild(div);
  });
}

// Phase2：損益計算書の答え合わせ（赤枠＋褒めちぎり）
function checkPLWorksheet(){
  if(phase < 2) return;

  // 赤枠リセット
  document.querySelectorAll("#area_pl input.wrong").forEach(x=>x.classList.remove("wrong"));

  const inputs = [...document.querySelectorAll('#area_pl input[data-role="pl"]')];
  let allOk = true;

  let expE = 0, expR = 0; // 期待合計（費用・収益）

  inputs.forEach(inp=>{
    const acct = inp.dataset.acct;
    const kind = inp.dataset.kind;
    const v = num(inp.value);
    const exp = Math.abs(adjustedNetForPL(acct));

    if(v !== exp){
      inp.classList.add("wrong");
      allOk = false;
    }
    if(kind==="expense") expE += exp;
    if(kind==="revenue") expR += exp;
  });

  // 期待の当期純利益（収益－費用）
  const net = expR - expE;
  const expectedNI = Math.abs(net);

  const left  = document.getElementById("plNI_left");  // 費用側（借方）
  const right = document.getElementById("plNI_right"); // 収益側（貸方）

  function filled(el){ return el && String(el.value).trim() !== ""; }

  // 利益なら左（借方）／損失なら右（貸方）に入れるルールで判定
  if(net > 0){
    if(num(left.value) !== expectedNI){ left.classList.add("wrong"); allOk=false; }
    if(filled(right)){ right.classList.add("wrong"); allOk=false; }
  }else if(net < 0){
    if(num(right.value) !== expectedNI){ right.classList.add("wrong"); allOk=false; }
    if(filled(left)){ left.classList.add("wrong"); allOk=false; }
  }else{
    if(filled(left)){ left.classList.add("wrong"); allOk=false; }
    if(filled(right)){ right.classList.add("wrong"); allOk=false; }
  }

  // 結果表示（seisan2と同じresultを使う）
  const res = document.getElementById("result");
  if(!res) return;

  if(allOk){
    res.className = "praise";
    res.innerHTML =
      "🎉 損益計算書、全問正解！！ 🎉<br>" +
      "費用・収益の分類も金額も完璧です。<br>" +
      "この精度なら検定で安定して点が取れます！";
  }else{
    res.className = "";
    res.textContent =
      "× 間違いがあります。赤枠の欄を見直しましょう。\n" +
      "ポイント：費用は左（借方）、収益は右（貸方）。当期純利益（損失）で左右が一致します。";
  }
}

function clearWrong(){
  document.querySelectorAll("input.wrong").forEach(inp => inp.classList.remove("wrong"));
}

function checkStub(){
  // Phase2（PL/BS入力）採点
  if(phase !== 2) return;

  clearWrong();
  const res = document.getElementById("result");
  if(res){
    res.className = "";
    res.textContent = "";
  }

  if(!currentAdjMap){
    if(res) res.textContent = "まだ整理記入が反映されていません。先に「仕訳採点」を完了してください。";
    return;
  }

  // ---- ① 各科目の「整理後残高」を計算 ----
  // 整理後残高 = (TB借 - TB貸) + (整理借 - 整理貸)
  function adjustedNet(acct){
    const tb = TB.find(x => x.id===currentId && x.acct===acct);
    const base = tb ? (tb.debit - tb.credit) : 0;
    const adj = currentAdjMap[acct] || {d:0, c:0};
    return base + (adj.d - adj.c);
  }

  // 科目分類で「正解の表」を決める（費用/収益→PL、それ以外→BS）
  function correctStatementByClass(cls){
    return (cls==="費用" || cls==="収益") ? "PL" : "BS";
  }

  // 期待する金額（絶対値）。ゼロなら空欄が正解。
  function expectedAmount(acct){
    return Math.abs(adjustedNet(acct));
  }

  // ---- ② 入力欄の採点（デコイ含む）----
  let allOk = true;

  // 科目別に、正解statement側に金額が入っているか／デコイは空か
  const transferInputs = [...document.querySelectorAll('input[data-role="transfer"]')];

  // 期待値を使って判定
  transferInputs.forEach(inp=>{
    const acct = inp.dataset.acct;
    const cls = acctClass[acct];
    const correctStatement = correctStatementByClass(cls);
    const exp = expectedAmount(acct);
    const v = num(inp.value);

    const isCorrectCell = (inp.dataset.correct === "1") && (inp.dataset.statement === correctStatement);

    if(exp === 0){
      // 残高0 → どこにも入れない（両方空が正解）
      if(String(inp.value).trim() !== ""){
        inp.classList.add("wrong");
        allOk = false;
      }
      return;
    }

    if(isCorrectCell){
      // 正解セル：期待金額が一致している必要
      if(v !== exp){
        inp.classList.add("wrong");
        allOk = false;
      }
    }else{
      // デコイセル：空欄が正解（入ってたら×）
      if(String(inp.value).trim() !== ""){
        inp.classList.add("wrong");
        allOk = false;
      }
    }
  });

  // ---- ③ 当期純利益（PL:収益-費用 / BS:資産-(負債+資本)）で整合判定 ----
  let sumRev = 0, sumExp = 0, sumAsset = 0, sumLE = 0;

  // 表に存在する全科目を対象（TB + 追加科目）
  const allAccts = [...new Set([
    ...baseAccounts,
    ...[...extraAccounts]
  ])];

  allAccts.forEach(acct=>{
    const cls = acctClass[acct];
    const net = adjustedNet(acct);
    const amt = Math.abs(net);
    if(amt === 0) return;

    if(cls === "収益") sumRev += amt;
    if(cls === "費用") sumExp += amt;
    if(cls === "資産") sumAsset += amt;
    if(cls === "負債" || cls === "資本" || cls === "控除資産" || cls === "資産控除") sumLE += amt;
  });

  const netFromPL = sumRev - sumExp;      // 収益－費用
  const netFromBS = sumAsset - sumLE;     // 資産－（負債＋資本＋控除）

  // 2つが一致しているか（内部整合）
  const sameNet = (netFromPL === netFromBS);

  // 当期純利益入力欄（4つ）の正解位置判定
  const plProfitD = document.getElementById("plProfitD");
  const plProfitC = document.getElementById("plProfitC");
  const bsProfitD = document.getElementById("bsProfitD");
  const bsProfitC = document.getElementById("bsProfitC");

  const expectedNI = Math.abs(netFromPL);

  function markWrong(el){
    if(el){ el.classList.add("wrong"); allOk = false; }
  }
  function isFilled(el){
    return el && String(el.value).trim() !== "";
  }

  if(!sameNet){
    // 転記のどこかがズレていて利益が一致しない
    allOk = false;
    // 利益欄を全部赤にして「利益が一致しない」ことを意識させる
    [plProfitD, plProfitC, bsProfitD, bsProfitC].forEach(el => el && el.classList.add("wrong"));
  }else{
    // 一致しているなら、利益欄の正しい位置＆金額を判定
    if(netFromPL === 0){
      // 0なら全て空が正解
      [plProfitD, plProfitC, bsProfitD, bsProfitC].forEach(el=>{
        if(isFilled(el)) markWrong(el);
      });
    }else if(netFromPL > 0){
      // 利益：PL借方・BS貸方に入る
      if(num(plProfitD?.value) !== expectedNI) markWrong(plProfitD);
      if(isFilled(plProfitC)) markWrong(plProfitC);

      if(num(bsProfitC?.value) !== expectedNI) markWrong(bsProfitC);
      if(isFilled(bsProfitD)) markWrong(bsProfitD);
    }else{
      // 損失：PL貸方・BS借方に入る
      if(num(plProfitC?.value) !== expectedNI) markWrong(plProfitC);
      if(isFilled(plProfitD)) markWrong(plProfitD);

      if(num(bsProfitD?.value) !== expectedNI) markWrong(bsProfitD);
      if(isFilled(bsProfitC)) markWrong(bsProfitC);
    }
  }

  // ---- ④ 結果表示（褒めちぎる/赤枠を見直し）----
  if(res){
    if(allOk){
      res.className = "praise";
      res.innerHTML =
        "🎉🎉 全問正解！！すごすぎます！！ 🎉🎉\n" +
        "分類→転記→利益確認まで完璧。\n" +
        "この精算表、検定レベルで通用します！";
    }else{
      res.className = "";
      if(!sameNet){
        res.textContent =
          "× まだどこか転記がズレています。\n" +
          "（PLとBSで当期純利益が一致しません）\n" +
          "赤枠の入力欄を中心に見直してみよう！";
      }else{
        res.textContent =
          "× 間違いがあります。\n" +
          "赤枠の入力欄を見直して、どこに転記すべきか考えてみよう！";
      }
    }
  }
}

document.addEventListener("input", (e)=>{
  const t=e.target;
  if(!t || !t.classList) return;
  if(!t.classList.contains("money")) return;
  const raw=t.value.replace(/,/g,"");
  if(raw==="" || isNaN(raw)) return;
  t.value = Number(raw).toLocaleString();
});

/* =========================================================
   CSV読込（../data固定）
========================================================= */
(async function initAll(){
  try{
    const [tbText, seiriText, mapText] = await Promise.all([
      fetch("../data/seisan2_TB.csv").then(r=>{
        if(!r.ok) throw new Error("seisan2_TB.csv が見つかりません");
        return r.text();
      }),
      fetch("../data/seisan2_seiri.csv").then(r=>{
        if(!r.ok) throw new Error("seisan2_seiri.csv が見つかりません");
        return r.text();
      }),
      fetch("../data/seisan2_map.csv").then(r=>{
        if(!r.ok) throw new Error("seisan2_map.csv が見つかりません");
        return r.text();
      })
    ]);

    TB = parseCSV(tbText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]||"").trim(),
        acct:(c[1]||"").trim(),
        cls:(c[2]||"").trim(),
        debit:num(c[3]),
        credit:num(c[4])
      }));

    SEIRI = parseCSV(seiriText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]||"").trim(),
        q:(c[1]||"").trim(),
        candidates: splitCandidates(c[2]||""),
        answerRaw:(c[3]||"").trim()
      }));

    MAP = parseCSV(mapText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        acct:(c[0]||"").trim(),
        cls:(c[1]||"").trim(),
        label:(c[2]||"").trim()
      }));

    problemIds = [...new Set(TB.map(x=>x.id))].sort();
    setupProblemSelect();

    hideApplyBtnAlways();
    setPhase2CheckVisible(false);
    resetPhase();

  }catch(e){
    console.error(e);
    alert("CSV読み込みエラー：" + (e.message || e));
  } finally {
    const elapsed = Date.now() - loadStartTime;
    const remain = 1000 - elapsed;

    const show = () => {
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainCard").classList.remove("hidden");
    };

    if (remain > 0) {
      setTimeout(show, remain);
    } else {
      show();
    }
  }
})();
</script>
