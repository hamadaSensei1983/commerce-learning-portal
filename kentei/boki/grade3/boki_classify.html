<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>簿記3級 勘定科目分類</title>
  <link rel="stylesheet" href="../../../css/common.css">
  <style>
    /* 問題文（テストモード） */
    #question{
      text-align:center;
      font-size:28px;
      margin-bottom:20px;
    }
    /* 結果表示 */
    .answer-box{
      margin-top:20px;
      font-weight:bold;
      font-size:18px;
      min-height:60px;
    }
    /* Tフォーム（5分類ボタン配置） */
    .tform{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      grid-template-rows:90px 90px;
      gap:12px;
      margin-top:25px;
    }
    /* 資産 */
    .btn-asset{
      grid-row:1 / 3;
      grid-column:1;
      background:#a9c9ff;
      color:black;
    }
    /* 負債 */
    .btn-liability{
      grid-row:1;
      grid-column:2;
      background:#ffb3b3;
      color:black;
    }
    /* 資本 */
    .btn-capital{
      grid-row:2;
      grid-column:2;
      background:#e3c6ff;
      color:black;
    }
    /* 費用 */
    .btn-expense{
      grid-row:1 / 3;
      grid-column:3;
      background:#ffd8a8;
      color:black;
    }
    /* 収益 */
    .btn-revenue{
      grid-row:1 / 3;
      grid-column:4;
      background:#b9f6ca;
      color:black;
    }
    /* ボタンホバー */
    .tform button:hover{
      opacity:0.85;
    }
    /* 正解ボタンを光らせる */
    .correct{
      outline:4px solid gold;
      transform:scale(1.05);
    }

    /* モード切り替えボタンエリア */
    .mode-switch{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }
    .mode-switch button{
      flex:1 1 120px;
    }
    .active-mode{
      background:var(--main-green);
      color:white;
      border:2px solid var(--main-green);
    }

    /* 学習モード用：フィルタ部分 */
    #filterArea{
      text-align:center;
      margin-bottom:10px;
      font-size:14px;
    }
    #filterArea label{
      margin:0 6px;
      cursor:pointer;
    }

    /* 学習モード：分類表示（大きめに） */
    #studyType{
      text-align:center;
      font-weight:bold;
      margin-bottom:10px;
      font-size:22px;
    }

    /* 学習モード用の位置表示 */
    .study-position{
      margin-top:6px;
      font-size:14px;
      color:#666;
      text-align:center;
    }

    /* 学習モードの分類ボタン（見本用） */
    .tform-study{
      margin-top:15px;
    }
    .tform-study button{
      pointer-events:none;     /* クリック無効化（見本用） */
      cursor:default;
    }

    /* 学習モード：説明ボックスの高さをコンパクトに */
    .study-meaning-box{
      min-height:70px;
      padding:8px 10px;
      border-radius:10px;
      background:#f9f9f9;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 勘定科目分類</div>
    </div>
  </div>
</header>

<!-- ▼ ローディング画面 ▼ -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold">
      問題を読み込み中...
    </p>
  </div>
</div>
<!-- ▲ ローディング画面 ▲ -->

<!-- ▼ メインカード（最初は非表示） ▼ -->
<div class="card hidden" id="mainCard">

  <!-- モード切り替え -->
  <div class="mode-switch">
    <button id="modeStudyBtn" class="control-btn active-mode"
            onclick="switchMode('study')">
      学習モード
    </button>
    <button id="modeQuizBtn" class="control-btn"
            onclick="switchMode('quiz')">
      テストモード
    </button>
  </div>

  <!-- 学習モードエリア -->
  <div id="studyArea">
    <h2 style="text-align:center;">勘定科目を眺めて学習しよう</h2>

    <!-- 分類フィルタ -->
    <div id="filterArea">
      <span style="margin-right:8px;">表示する分類：</span>
      <label><input type="checkbox" value="資産" checked onchange="updateStudyFilter()">資産</label>
      <label><input type="checkbox" value="負債" checked onchange="updateStudyFilter()">負債</label>
      <label><input type="checkbox" value="費用" checked onchange="updateStudyFilter()">費用</label>
      <label><input type="checkbox" value="収益" checked onchange="updateStudyFilter()">収益</label>
      <label><input type="checkbox" value="資本" checked onchange="updateStudyFilter()">資本</label>
    </div>

    <!-- カード表示部分 -->
    <div class="study-row" id="studyCard">
      <button class="nav-square" onclick="prevStudy()">◀</button>
      <div class="study-center">
        <h2 id="studyTerm"></h2>
        <div class="study-position" id="studyPosition"></div>
      </div>
      <button class="nav-square" onclick="nextStudy()">▶</button>
    </div>

    <p id="studyType"></p>

    <div class="study-meaning-box">
      <span id="studyDesc"></span>
    </div>

    <!-- 学習モード用：分類見本（テストと同じ配置・色） -->
    <div class="tform tform-study">
      <button class="quiz-btn btn-asset"    data-type="資産">資産</button>
      <button class="quiz-btn btn-liability" data-type="負債">負債</button>
      <button class="quiz-btn btn-expense"  data-type="費用">費用</button>
      <button class="quiz-btn btn-revenue"  data-type="収益">収益</button>
      <button class="quiz-btn btn-capital"  data-type="資本">資本</button>
    </div>
  </div>

  <!-- テストモードエリア -->
  <div id="quizArea" class="hidden">
    <h2>次の勘定科目は以下のどの分類に該当するか答えなさい。</h2>
    <h2 id="question"></h2>

    <!-- 連続正解数表示 -->
    <p id="streakInfo" style="text-align:center; font-weight:bold; margin-bottom:8px;">
      連続正解数：0問
    </p>

    <div class="tform">
      <button class="quiz-btn btn-asset"    onclick="check('資産')">資産</button>
      <button class="quiz-btn btn-liability" onclick="check('負債')">負債</button>
      <button class="quiz-btn btn-expense"  onclick="check('費用')">費用</button>
      <button class="quiz-btn btn-revenue"  onclick="check('収益')">収益</button>
      <button class="quiz-btn btn-capital"  onclick="check('資本')">資本</button>
    </div>

    <p id="result" class="answer-box"></p>

    <button class="main-btn hidden" id="nextBtn" onclick="next()">
      次の問題
    </button>
  </div>
</div>
<!-- ▲ メインカード ▲ -->

<a href="../index.html" class="portal-btn exam-btn">
  簿記トップ
</a>
<a href="../../../index.html" class="portal-btn portal-main">
  ポータルへ戻る
</a>

<script>
  // =========================
  //  データ関連
  // =========================
  let data = [];      // CSVから読み込んだ全勘定科目
  let current;        // 今出している問題（オブジェクト）
  let questions = []; // 出題用配列
  let wrong = [];     // 間違えた問題を保存
  let index = 0;      // 何問目か
  let correctCount = 0;

  // 学習モード用
  let studyList = [];
  let studyIndex = 0;

  // 連続正解数 & 自動遷移タイマー
  let streak = 0;
  let autoNextTimer = null;

  // =========================
  //  CSV読み込み
  // =========================
  fetch("../data/boki3.csv")
    .then(res => {
      if (!res.ok) {
        throw new Error("CSVファイルが見つかりません");
      }
      return res.text();
    })
    .then(text => {
      let rows = text.trim().split(/\r?\n/).slice(1); // ヘッダー除去
      data = rows.map(r => {
        let c = r.split(",");
        return {
          term: (c[0] || "").trim(),
          type: (c[1] || "").trim(),
          desc: (c.slice(2).join(",") || "").trim()
        };
      });

      // ローディング画面を消してメインカードを表示
      const loading = document.getElementById("loadingScreen");
      const card = document.getElementById("mainCard");
      if(loading) loading.style.display = "none";
      if(card) card.classList.remove("hidden");

      // 学習モードを初期表示
      initStudyMode();
      switchMode('study');
    })
    .catch(err => {
      // エラー時もローディング画面を消してカードを表示
      const loading = document.getElementById("loadingScreen");
      const card = document.getElementById("mainCard");
      if(loading) loading.style.display = "none";
      if(card) card.classList.remove("hidden");

      document.getElementById("question").innerText = "CSV読み込みエラー";
      document.getElementById("result").innerText = err;
    });

  // =========================
  //  モード切り替え
  // =========================
  function switchMode(mode){
    const study = document.getElementById("studyArea");
    const quiz  = document.getElementById("quizArea");
    const nextBtn = document.getElementById("nextBtn");

    // モードボタンの見た目切り替え
    setActiveModeButton(mode);

    // テスト用のハイライトなどをリセット
    removeHighlight();
    clearButtonFocus();
    document.getElementById("result").innerText = "";

    if(mode === 'study'){
      // 学習モード表示
      study.classList.remove("hidden");
      quiz.classList.add("hidden");
      nextBtn.classList.add("hidden");
      initStudyMode();
    }else{
      // テストモード表示
      study.classList.add("hidden");
      quiz.classList.remove("hidden");
      startQuiz();
    }
  }

  function setActiveModeButton(mode){
    const btnStudy = document.getElementById("modeStudyBtn");
    const btnQuiz  = document.getElementById("modeQuizBtn");
    btnStudy.classList.remove("active-mode");
    btnQuiz.classList.remove("active-mode");
    if(mode === 'study'){
      btnStudy.classList.add("active-mode");
    }else{
      btnQuiz.classList.add("active-mode");
    }
  }

  // =========================
  //  学習モード
  // =========================
  function initStudyMode(){
    // チェックボックスの状態に応じて絞り込み
    updateStudyFilter();
  }

  function updateStudyFilter(){
    const checkedTypes = [...document.querySelectorAll("#filterArea input:checked")]
      .map(c => c.value);

    if(checkedTypes.length === 0){
      // 何も選ばれていないとき
      studyList = [];
      studyIndex = 0;
      showStudyCard();
      return;
    }

    // data（CSVの順＝五十音順）から、選択された分類だけ抽出
    studyList = data.filter(d => checkedTypes.includes(d.type));
    studyIndex = 0;
    showStudyCard();
  }

  function showStudyCard(){
    if(studyList.length === 0){
      document.getElementById("studyTerm").innerText = "";
      document.getElementById("studyType").innerText = "";
      document.getElementById("studyDesc").innerText =
        "表示する分類にチェックを入れてください。";
      document.getElementById("studyPosition").innerText = "";
      // 学習モード側のボタンハイライトも消す
      highlightStudyType(null);
      return;
    }
    const q = studyList[studyIndex];
    document.getElementById("studyTerm").innerText = q.term;
    document.getElementById("studyType").innerText = "分類：" + q.type;
    document.getElementById("studyDesc").innerText = q.desc || "（説明は登録されていません）";
    document.getElementById("studyPosition").innerText =
      (studyIndex + 1) + " / " + studyList.length;

    // 学習モード側の分類ボタンをハイライト
    highlightStudyType(q.type);
  }

  function nextStudy(){
    if(studyIndex < studyList.length - 1){
      studyIndex++;
      showStudyCard();
    }
  }

  function prevStudy(){
    if(studyIndex > 0){
      studyIndex--;
      showStudyCard();
    }
  }

  function highlightStudyType(type){
    document.querySelectorAll(".tform-study button").forEach(b => {
      b.classList.remove("correct");
      if(type && b.dataset.type === type){
        b.classList.add("correct");
      }
    });
  }

  // =========================
  //  学習モード用：スワイプ操作
  // =========================
  let touchStartX = 0;
  let touchEndX = 0;

  const studyTouchArea = document.getElementById("studyArea");

  studyTouchArea.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
  });

  studyTouchArea.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
  });

  function handleSwipe(){
    const diff = touchEndX - touchStartX;
    const threshold = 60;  // 60px以上動いたらスワイプとみなす

    if(diff > threshold){
      // 右スワイプ → 前のカード
      prevStudy();
    }else if(diff < -threshold){
      // 左スワイプ → 次のカード
      nextStudy();
    }
  }

  // =========================
  //  テストモード（分類当て）
  // =========================
  function startQuiz(){
    questions = [...data];
    shuffle(questions);
    index = 0;
    wrong = [];
    correctCount = 0;

    // 連続正解数リセット
    streak = 0;
    updateStreakDisplay();

    next();
  }

  function next(){
    // 自動遷移タイマーが残っていればクリア
    if(autoNextTimer !== null){
      clearTimeout(autoNextTimer);
      autoNextTimer = null;
    }

    removeHighlight();
    clearButtonFocus();

    if(index >= questions.length){
      finishQuiz();
      return;
    }
    current = questions[index];
    index++;

    document.getElementById("question").innerText = current.term;
    document.getElementById("result").innerText = "";
    document.getElementById("nextBtn").classList.add("hidden");
    enableButtons();
  }

  function check(ans){
    let result = document.getElementById("result");
    disableButtons();

    if(ans === current.type){
      // 正解時
      result.innerHTML = "〇 正解！";

      correctCount++;

      // 連続正解数を増やす
      streak++;
      updateStreakDisplay();

      // 「次の問題」ボタンは出さない
      document.getElementById("nextBtn").classList.add("hidden");

      // 1秒後に自動で次の問題へ
      autoNextTimer = setTimeout(() => {
        autoNextTimer = null;
        next();
      }, 1000);

    }else{
      // 不正解時
      result.innerHTML =
        "× 不正解<br><br>" +
        "正解：" + current.type + "<br>" +
        "解説：" + current.desc;
      wrong.push(current);

      // 連続正解数リセット
      streak = 0;
      updateStreakDisplay();

      // 解説を読ませるため、「次の問題」ボタンを表示
      document.getElementById("nextBtn").classList.remove("hidden");
    }

    // 正解ボタンを光らせる
    document.querySelectorAll(".tform button").forEach(b => {
      if(b.innerText === current.type){
        b.classList.add("correct");
      }
    });

    // 念のため、今アクティブな要素のフォーカスも外しておく
    if(document.activeElement){
      document.activeElement.blur();
    }
  }

  function finishQuiz(){
    // 念のため自動遷移タイマーを停止
    if(autoNextTimer !== null){
      clearTimeout(autoNextTimer);
      autoNextTimer = null;
    }

    let rate = Math.round((correctCount / questions.length) * 100);
    document.getElementById("question").innerText = "全問終了！";
    document.getElementById("result").innerHTML =
      "正解数：" + correctCount + " / " + questions.length + "<br>" +
      "正解率：" + rate + "％<br><br>" +
      "間違い：" + wrong.length + "問<br><br>" +
      "<button class=\"control-btn\" onclick='reviewMode()'>復習モード</button><br><br>" +
      "<button class=\"control-btn\" onclick='startQuiz()'>もう一度チャレンジ</button>";
    document.getElementById("nextBtn").classList.add("hidden");
    disableButtons();
  }

  // 復習モード（間違えた問題だけ再出題）
  function reviewMode(){
    if(wrong.length === 0){
      document.getElementById("result").innerHTML =
        "間違えた問題はありません！<br><br>" +
        "<button class=\"control-btn\" onclick='startQuiz()'>もう一度チャレンジ</button>";
      return;
    }
    questions = [...wrong];
    shuffle(questions);
    index = 0;
    correctCount = 0;
    wrong = [];
    next();
  }

  // 連続正解数表示更新
  function updateStreakDisplay(){
    const elm = document.getElementById("streakInfo");
    if(!elm) return;
    elm.innerText = "連続正解数：" + streak + "問";
  }

  // ボタン制御
  function disableButtons(){
    document.querySelectorAll("#quizArea .tform button").forEach(b => {
      b.disabled = true;
    });
  }
  function enableButtons(){
    document.querySelectorAll("#quizArea .tform button").forEach(b => {
      b.disabled = false;
    });
  }

  // ハイライト解除（テストモード用）
  function removeHighlight(){
    document.querySelectorAll("#quizArea .tform button").forEach(b => {
      b.classList.remove("correct");
    });
  }

  // ボタンのフォーカス解除
  function clearButtonFocus(){
    document.querySelectorAll("#quizArea .tform button").forEach(b => {
      b.blur();
    });
  }

  // シャッフル
  function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
      let j = Math.floor(Math.random() * (i + 1));
      let temp = array[i];
      array[i] = array[j];
      array[j] = temp;
    }
  }
</script>
</body>
</html>
