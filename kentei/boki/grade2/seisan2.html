<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 精算表（8桁）トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
  .card{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
  }
  .hidden{ display:none !important; }

  /* 操作バー */
  #controlBar{
    text-align:center;
    margin-bottom:10px;
  }
  #problemSelect{
    padding:8px;
    font-size:16px;
    border-radius:8px;
    border:2px solid var(--main-green);
  }

  /* 見出し */
  .section-title{
    margin-top:12px;
    margin-bottom:6px;
    padding-left:8px;
    border-left:4px solid #e53935;
    font-size:15px;
    font-weight:bold;
  }

  /* 決算整理仕訳入力エリア */
  .adj-wrap{
    border:2px solid #d8ead8;
    background:#f9fdf9;
    border-radius:10px;
    padding:10px;
    max-width:900px;
    margin:0 auto;
  }
  .note-block{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:8px;
    margin:8px 0;
  }
  .note-q{
    font-weight:bold;
    margin-bottom:8px;
    white-space:pre-line;
  }

  /* 仕訳左右入力（横並び＋コンパクト） */
  .jrnl{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:8px;
  }
  .jrnl-side{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
  }
  .jrnl-title{
    font-size:11px;
    padding:1px 0;
    margin-bottom:4px;
    line-height:1.0;
  }
  .jrnl-row{
    display:grid;
    grid-template-columns: 1fr 95px;
    gap:6px;
    margin:3px 0;
  }
  .jrnl-row select{
    width:100%;
    min-width:0;
  }
  .jrnl-row input{
    width:95px;
    text-align:right;
  }
  .jrnl-row select,
  .jrnl-row input{
    padding:3px 4px;
    font-size:12.5px;
    height:28px;
    box-sizing:border-box;
  }

  /* 精算表（8桁） */
  table.seisan8{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:14px;
  }
  table.seisan8 th, table.seisan8 td{
    border:1px solid #e53935;
    padding:6px;
    vertical-align:middle;
  }
  table.seisan8 th{
    background:#ffebee;
    text-align:center;
  }
  table.seisan8 td{
    text-align:right;
  }
  table.seisan8 td:first-child{
    text-align:left;
    width:20%;
  }
  .money{
    width:100%;
    box-sizing:border-box;
    padding:4px;
    text-align:right;
    font-size:14px;
  }

  tr.added-row td:first-child{
    background:#f3f8ff;
    font-weight:bold;
  }
  tr.profit-row td, tr.total-row td{
    font-weight:bold;
    background:#fff7f7;
  }

  /* 結果表示 */
  #result{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-line;
    text-align:center;
  }

  /* 採点枠 */
  .note-block.ok{
    border:2px solid #2e7d32 !important;
    background:#e8f5e9;
  }
  .note-block.ng{
    border:2px solid #c62828 !important;
    background:#ffebee;
  }

  /* 間違い欄：赤枠 */
  .wrong{
    outline: 3px solid #e53935;
    border-radius: 4px;
  }

  /* 正解メッセージ */
  .praise{
    background:#e8f5e9;
    border:2px solid #66bb6a;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    text-align:center;
  }

  @media (max-width:720px){
    .jrnl{ grid-template-columns:1fr; }
    table.seisan8{ font-size:13px; }
  }
</style>
</head>

<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記2級 精算表（8桁）トレーニング</div>
    </div>
  </div>
</header>

<!-- ローディング -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">読み込み中...</p>
  </div>
</div>

<!-- メイン -->
<div class="card hidden" id="mainCard">

  <!-- 起動直後に見せるのはココだけ -->
  <div id="controlBar">
    <select id="problemSelect"></select>
    <button class="main-btn" style="width:auto" onclick="start()">開始</button>
  </div>

  <!-- 開始後に表示 -->
  <div id="workArea" class="hidden">

    <h2>下記の決算整理仕訳を示しなさい。</h2>

    <div class="section-title">決算整理仕訳（入力）</div>
    <div class="adj-wrap" id="adjInputArea"></div>

    <div style="text-align:center;margin:10px 0 6px;">
      <button class="main-btn" id="gradeAdjBtn" style="width:auto" onclick="gradeAdjustments()">仕訳採点</button>
      <button class="control-btn" id="giveUpBtn" style="width:auto" onclick="giveUp()">ギブアップ</button>
    </div>

    <div class="section-title">精算表（8桁）</div>

    <div id="area_seisan">
      <table class="seisan8">
        <thead>
          <tr>
            <th rowspan="2">勘定科目</th>
            <th colspan="2">残高試算表</th>
            <th colspan="2">整理記入</th>
            <th colspan="2">損益計算書</th>
            <th colspan="2">貸借対照表</th>
          </tr>
          <tr>
            <th>借方</th><th>貸方</th>
            <th>借方</th><th>貸方</th>
            <th>借方</th><th>貸方</th>
            <th>借方</th><th>貸方</th>
          </tr>
        </thead>
        <tbody id="seisanBody"></tbody>
      </table>

      <div style="text-align:center;margin-top:10px;">
        <!-- Phase2（仕訳全問正解）で表示 -->
        <button class="control-btn hidden" id="checkSeisanBtn" style="width:auto" onclick="checkSeisan()">精算表採点</button>
        <button class="main-btn hidden" id="nextProblemBtn" style="width:auto" onclick="nextProblem()">次の問題へ</button>
      </div>

      <p id="result"></p>
    </div>
  </div>
</div>

<a href="index.html" class="portal-btn grade3-btn">２級トップ</a>
<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

<script>
/* =========================================================
  精算表専用（seisan2.html）
  - ローディング1秒
  - 起動直後：問題選択＋開始のみ
  - 開始：決算整理仕訳＋精算表（TB表示）
  - 仕訳採点：不正解は赤枠、正解ならロック＆精算表に反映＆精算表採点ボタン表示
  - 精算表採点：不正解は赤枠、正解なら褒め＆次の問題へ
========================================================= */

let TB = [];
let SEIRI = [];
let MAP = [];           // {acct, cls, label}
let problemIds = [];
let currentId = null;

let baseAccounts = [];
let extraAccounts = new Set();

let phase = 0;          // 0: INIT, 1: Phase1(仕訳入力), 2: Phase2(精算表入力)
let acctClass = {};     // acct -> 分類
let acctLabel = {};     // acct -> 表示名（任意）
let currentAdjMap = null;

const loadStartTime = Date.now();

/* ---------- CSV（クォート内改行OK） ---------- */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = [];
  let row = [], cur = "", inQ = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === "," && !inQ){ row.push(cur); cur=""; continue; }
    if((c === "\n" || c === "\r") && !inQ){
      if(c === "\r" && text[i+1] === "\n") i++;
      row.push(cur);
      if(row.join("").trim() !== "") out.push(row);
      row=[]; cur="";
      continue;
    }
    cur += c;
  }
  row.push(cur);
  if(row.join("").trim() !== "") out.push(row);
  return out;
}

function num(v){
  const s = String(v ?? "").replace(/,/g,"").trim();
  if(s === "") return 0;
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}
function fmt(n){ return n ? Number(n).toLocaleString() : ""; }

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeText(s){
  return String(s ?? "")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/\\/g,"\n")
    .trim();
}

function splitCandidates(s){
  return String(s ?? "")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/｜/g,"\n")
    .split("\n")
    .map(x=>x.trim())
    .filter(Boolean);
}

function parseAnswerRaw(raw){
  raw = String(raw ?? "")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/｜/g,"\n")
    .trim();

  const parts = raw.split(";");
  const dPart = (parts[0] ?? "").trim();
  const cPart = (parts[1] ?? "").trim();

  function parseSide(str){
    if(!str) return [];
    return str.split("\n")
      .map(x=>x.trim())
      .filter(Boolean)
      .map(line=>{
        const [a,m] = line.split(":").map(z=>z.trim());
        return {acct:a, amt:num(m)};
      })
      .filter(x=>x.acct && x.amt>=0);
  }
  return { D: parseSide(dPart), C: parseSide(cPart) };
}

/* =========================================================
  UI初期化
========================================================= */
function setupProblemSelect(){
  const sel = document.getElementById("problemSelect");
  sel.innerHTML = "";
  problemIds.forEach(id=>{
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = "問題 " + id;
    sel.appendChild(opt);
  });
  currentId = problemIds[0] ?? null;
  sel.onchange = ()=>{ currentId = sel.value; resetView(); };
}

function resetView(){
  phase = 0;
  currentAdjMap = null;
  extraAccounts = new Set();

  document.getElementById("workArea")?.classList.add("hidden");
  document.getElementById("adjInputArea").innerHTML = "";
  document.getElementById("seisanBody").innerHTML = "";
  document.getElementById("result").textContent = "";

  document.getElementById("gradeAdjBtn")?.removeAttribute("disabled");
  document.getElementById("giveUpBtn")?.removeAttribute("disabled");

  document.getElementById("checkSeisanBtn")?.classList.add("hidden");
  document.getElementById("nextProblemBtn")?.classList.add("hidden");

  document.querySelectorAll(".note-block").forEach(b=>b.classList.remove("ok","ng"));
}

/* =========================================================
  開始
========================================================= */
function start(){
  if(!currentId) return;

  phase = 1;
  document.getElementById("workArea")?.classList.remove("hidden");

  // 対象問題のTB科目一覧
  const tbRows = TB.filter(x=>x.id===currentId);
  baseAccounts = tbRows.map(x=>x.acct);
  extraAccounts = new Set();

  buildAcctDictionaries();

  // 仕訳入力欄と精算表（TBのみ）を表示
  renderAdjInputs();
  renderSeisanTable(null);

  // ボタン状態
  document.getElementById("gradeAdjBtn")?.removeAttribute("disabled");
  document.getElementById("giveUpBtn")?.removeAttribute("disabled");
  document.getElementById("checkSeisanBtn")?.classList.add("hidden");
  document.getElementById("nextProblemBtn")?.classList.add("hidden");

  document.getElementById("result").className = "";
  document.getElementById("result").textContent = "";
}

/* TB＋mapから分類辞書作成 */
function buildAcctDictionaries(){
  acctClass = {};
  acctLabel = {};

  TB.filter(r=>r.id===currentId).forEach(r=>{
    acctClass[r.acct] = r.cls;
    acctLabel[r.acct] = r.acct;
  });

  MAP.forEach(m=>{
    if(!acctClass[m.acct]) acctClass[m.acct] = m.cls;
    if(m.label) acctLabel[m.acct] = m.label;
  });
}

/* =========================================================
  Phase1：仕訳入力（左右・正解行数固定）
========================================================= */
function renderAdjInputs(){
  const area = document.getElementById("adjInputArea");
  area.innerHTML = "";

  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc = "abcdefghijklmnopqrstuvwxyz";

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    const block = document.createElement("div");
    block.className = "note-block";
    block.dataset.noteIndex = String(idx);

    const q = document.createElement("div");
    q.className = "note-q";
    q.textContent = `${abc[idx]}. ${normalizeText(n.q)}`;
    block.appendChild(q);

    const jrnl = document.createElement("div");
    jrnl.className="jrnl";
    jrnl.innerHTML = `
      <div class="jrnl-side">
        <div class="jrnl-title">借方</div>
        <div id="dBox_${idx}"></div>
      </div>
      <div class="jrnl-side">
        <div class="jrnl-title">貸方</div>
        <div id="cBox_${idx}"></div>
      </div>
    `;
    block.appendChild(jrnl);
    area.appendChild(block);

    buildSideRows(idx, "D", n.candidates, rowCount);
    buildSideRows(idx, "C", n.candidates, rowCount);
  });
}

function buildSideRows(noteIndex, side, candidates, rowCount){
  const box = document.getElementById(`${side==="D" ? "dBox" : "cBox"}_${noteIndex}`);
  box.innerHTML = "";

  const optHtml = (candidates ?? [])
    .map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`)
    .join("");

  for(let r=0;r<rowCount;r++){
    const row = document.createElement("div");
    row.className = "jrnl-row";
    row.innerHTML = `
      <select id="${side}acct_${noteIndex}_${r}">
        <option value=""></option>
        ${optHtml}
      </select>
      <input id="${side}amt_${noteIndex}_${r}" class="money" inputmode="numeric">
    `;
    box.appendChild(row);
  }
}

/* 入力収集 */
function collectUser(noteIndex, rowCount){
  const D=[], C=[];
  for(let r=0;r<rowCount;r++){
    const da=(document.getElementById(`Dacct_${noteIndex}_${r}`)?.value ?? "").trim();
    const dm=num(document.getElementById(`Damt_${noteIndex}_${r}`)?.value);
    const ca=(document.getElementById(`Cacct_${noteIndex}_${r}`)?.value ?? "").trim();
    const cm=num(document.getElementById(`Camt_${noteIndex}_${r}`)?.value);
    if(da && dm>0) D.push({acct:da, amt:dm});
    if(ca && cm>0) C.push({acct:ca, amt:cm});
  }
  return {D,C};
}

/* マルチセット一致 */
function ms(list){
  const m = new Map();
  list.forEach(x=>{
    const k = x.acct + "\n" + x.amt;
    m.set(k, (m.get(k) ?? 0) + 1);
  });
  return m;
}
function equalMulti(a,b){
  const A=ms(a), B=ms(b);
  if(A.size !== B.size) return false;
  for(const [k,v] of A) if(B.get(k) !== v) return false;
  return true;
}
function markBlock(noteIndex, ok){
  const blocks = document.querySelectorAll(".note-block");
  const b = blocks[noteIndex];
  if(!b) return;
  b.classList.remove("ok","ng");
  b.classList.add(ok ? "ok" : "ng");
}

function lockAdjustmentInputs(){
  document.querySelectorAll("#adjInputArea select, #adjInputArea input").forEach(el=>el.disabled=true);
}

/* =========================================================
  Phase1：仕訳採点
========================================================= */
function gradeAdjustments(){
  if(phase !== 1) return;

  const notes = SEIRI.filter(x=>x.id===currentId);
  let allOk = true;

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);
    const user = collectUser(idx, rowCount);

    const ok = equalMulti(user.D, correct.D) && equalMulti(user.C, correct.C);
    markBlock(idx, ok);
    if(!ok) allOk = false;
  });

  const res = document.getElementById("result");
  if(!allOk){
    res.className = "";
    res.textContent = "× 仕訳に誤りがあります。赤枠の箇所を見直して、もう一度「仕訳採点」を押してください。";
    return;
  }

  // 正解 → 整理記入を作成してPhase2へ
  const adjMap = buildAdjMapFromInputs();
  currentAdjMap = adjMap;
  phase = 2;

  // 仕訳入力をロック
  lockAdjustmentInputs();

  // 精算表を整理記入反映で再描画（profit/total行も出す）
  renderSeisanTable(adjMap);

  // PL/BS入力欄を表示（資産でもBS借方＋PL借方の両方にInput）
  showOutputInputFields();

  // ボタン制御
  document.getElementById("gradeAdjBtn")?.setAttribute("disabled","disabled");
  document.getElementById("giveUpBtn")?.setAttribute("disabled","disabled");
  document.getElementById("checkSeisanBtn")?.classList.remove("hidden");
  document.getElementById("nextProblemBtn")?.classList.add("hidden");

  res.className = "";
  res.textContent = "〇 仕訳は全て正解です。整理記入に反映しました。次は精算表を完成させて「精算表採点」を押しましょう。";

  warnUnknownExtraAccounts();
}

/* ギブアップ（正解を入力してPhase2へ） */
function giveUp(){
  if(phase !== 1) return;

  const ok = confirm("ギブアップすると、決算整理仕訳に正解を入力して次のフェーズへ進みます。\nよろしいですか？");
  if(!ok) return;

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const d = correct.D[r];
      const da = document.getElementById(`Dacct_${idx}_${r}`);
      const dm = document.getElementById(`Damt_${idx}_${r}`);
      if(da) da.value = d ? d.acct : "";
      if(dm) dm.value = d ? fmt(d.amt) : "";
    }
    for(let r=0;r<rowCount;r++){
      const c = correct.C[r];
      const ca = document.getElementById(`Cacct_${idx}_${r}`);
      const cm = document.getElementById(`Camt_${idx}_${r}`);
      if(ca) ca.value = c ? c.acct : "";
      if(cm) cm.value = c ? fmt(c.amt) : "";
    }
  });

  gradeAdjustments();
}

/* 整理記入mapを入力欄から作成 */
function buildAdjMapFromInputs(){
  const adjMap = {};
  const ensure = a => { if(!adjMap[a]) adjMap[a] = {d:0, c:0}; };

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const da=(document.getElementById(`Dacct_${idx}_${r}`)?.value ?? "").trim();
      const dm=num(document.getElementById(`Damt_${idx}_${r}`)?.value);
      const ca=(document.getElementById(`Cacct_${idx}_${r}`)?.value ?? "").trim();
      const cm=num(document.getElementById(`Camt_${idx}_${r}`)?.value);

      if(da && dm>0){
        ensure(da); adjMap[da].d += dm;
        if(!baseAccounts.includes(da)) extraAccounts.add(da);
      }
      if(ca && cm>0){
        ensure(ca); adjMap[ca].c += cm;
        if(!baseAccounts.includes(ca)) extraAccounts.add(ca);
      }
    }
  });

  // 新規科目分類補完
  [...extraAccounts].forEach(a=>{
    if(!acctClass[a]){
      const m = MAP.find(x=>x.acct===a);
      if(m) acctClass[a] = m.cls;
    }
    if(!acctLabel[a]) acctLabel[a] = a;
  });

  return adjMap;
}

/* =========================================================
  精算表の描画
========================================================= */
function makeSeisanRow(acct, tbD, tbC, added){
  const tr = document.createElement("tr");
  if(added) tr.classList.add("added-row");
  tr.dataset.acct = acct;

  tr.innerHTML = `
    <td>${escapeHtml(acct)}</td>
    <td>${fmt(tbD)}</td>
    <td>${fmt(tbC)}</td>
    <td class="adjD"></td>
    <td class="adjC"></td>
    <td class="plD"></td>
    <td class="plC"></td>
    <td class="bsD"></td>
    <td class="bsC"></td>
  `;
  return tr;
}

function renderSeisanTable(adjMap){
  currentAdjMap = adjMap;

  const tbody = document.getElementById("seisanBody");
  tbody.innerHTML = "";

  // TB行
  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    if(!r) return;

    const tr = makeSeisanRow(acct, r.debit, r.credit, false);

    // Phase2（adjMapあり）なら整理記入を表示
    if(adjMap){
      const adj = adjMap[acct] ?? {d:0,c:0};
      tr.querySelector(".adjD").textContent = fmt(adj.d);
      tr.querySelector(".adjC").textContent = fmt(adj.c);
    }
    tbody.appendChild(tr);
  });

  // 新規科目（仕訳入力で出た科目）
  if(adjMap){
    [...extraAccounts].forEach(acct=>{
      const tr = makeSeisanRow(acct, 0, 0, true);
      const adj = adjMap[acct] ?? {d:0,c:0};
      tr.querySelector(".adjD").textContent = fmt(adj.d);
      tr.querySelector(".adjC").textContent = fmt(adj.c);
      tbody.appendChild(tr);
    });
  }

  // Phase1では「当期純利益・合計・採点」は出さない（仕様）
  if(!adjMap) return;

  // 当期純利益行（4か所入力）
  const trProfit = document.createElement("tr");
  trProfit.className = "profit-row";
  trProfit.dataset.rowtype = "profit";
  trProfit.innerHTML = `
    <td>当期純利益</td>
    <td></td><td></td>
    <td></td><td></td>
    <td class="plD"></td><td class="plC"></td>
    <td class="bsD"></td><td class="bsC"></td>
  `;
  tbody.appendChild(trProfit);

  // 合計行（空でもOK。採点後の見直しで使うなら将来拡張）
  const trTotal = document.createElement("tr");
  trTotal.className = "total-row";
  trTotal.innerHTML = `
    <td style="text-align:right;">合計</td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
  `;
  tbody.appendChild(trTotal);
}

/* =========================================================
  Phase2：PL/BS入力欄を同時に出す（資産でもBS借方＋PL借方）
========================================================= */
function showOutputInputFields(){
  const tbody = document.getElementById("seisanBody");
  if(!tbody) return;

  function correctStatementByClass(cls){
    return (cls==="費用" || cls==="収益") ? "PL" : "BS";
  }
  function normalSideByClass(cls){
    if(cls==="資産" || cls==="費用") return "debit";
    if(cls==="負債" || cls==="資本" || cls==="収益") return "credit";
    if(cls==="控除資産" || cls==="資産控除") return "credit";
    return "debit";
  }
  function makeTransferInput(acct, statement, side){
    return `<input class="money"
      data-role="transfer"
      data-acct="${escapeHtml(acct)}"
      data-statement="${statement}"
      data-side="${side}"
      inputmode="numeric">`;
  }

  tbody.querySelectorAll("tr").forEach(tr=>{
    const acct = tr.dataset.acct;
    const isProfit = tr.dataset.rowtype==="profit";

    if(isProfit){
      tr.querySelector(".plD").innerHTML = `<input class="money" id="plProfitD" data-role="netIncome" data-statement="PL" data-side="debit" inputmode="numeric">`;
      tr.querySelector(".plC").innerHTML = `<input class="money" id="plProfitC" data-role="netIncome" data-statement="PL" data-side="credit" inputmode="numeric">`;
      tr.querySelector(".bsD").innerHTML = `<input class="money" id="bsProfitD" data-role="netIncome" data-statement="BS" data-side="debit" inputmode="numeric">`;
      tr.querySelector(".bsC").innerHTML = `<input class="money" id="bsProfitC" data-role="netIncome" data-statement="BS" data-side="credit" inputmode="numeric">`;
      return;
    }

    if(!acct) return;

    const cls = acctClass[acct];
    const normalSide = normalSideByClass(cls);
    const correctStatement = correctStatementByClass(cls);

    tr.querySelector(".plD").innerHTML = "";
    tr.querySelector(".plC").innerHTML = "";
    tr.querySelector(".bsD").innerHTML = "";
    tr.querySelector(".bsC").innerHTML = "";

    // 「normalSide側」をBSとPLの両方に出す（片方がデコイ）
    if(normalSide === "debit"){
      tr.querySelector(".plD").innerHTML = makeTransferInput(acct, "PL", "debit");
      tr.querySelector(".bsD").innerHTML = makeTransferInput(acct, "BS", "debit");
    }else{
      tr.querySelector(".plC").innerHTML = makeTransferInput(acct, "PL", "credit");
      tr.querySelector(".bsC").innerHTML = makeTransferInput(acct, "BS", "credit");
    }

    // 正解セル識別
    tr.querySelectorAll('input[data-role="transfer"]').forEach(inp=>{
      const st = inp.dataset.statement;
      inp.dataset.correct = (st === correctStatement) ? "1" : "0";
    });
  });
}

/* =========================================================
  Phase2：精算表採点（赤枠＋褒め＋次の問題）
  判定方針：
  - 各科目：正解statement側のみ「整理後残高」を入力必須、デコイ側は空欄必須
  - 当期純利益：PL（収益−費用）とBS（資産−負債資本）が一致し、正しい位置に入力
========================================================= */
function clearWrong(){
  document.querySelectorAll("input.wrong").forEach(inp=>inp.classList.remove("wrong"));
}

function checkSeisan(){
  if(phase !== 2) return;
  clearWrong();

  const res = document.getElementById("result");
  res.className = "";
  res.textContent = "";

  if(!currentAdjMap){
    res.textContent = "まだ整理記入が反映されていません。先に「仕訳採点」を完了してください。";
    return;
  }

  // 整理後残高 = (TB借 - TB貸) + (整理借 - 整理貸)
  function adjustedNet(acct){
    const tb = TB.find(x=>x.id===currentId && x.acct===acct);
    const base = tb ? (tb.debit - tb.credit) : 0;
    const adj = currentAdjMap[acct] ?? {d:0,c:0};
    return base + (adj.d - adj.c);
  }
  function correctStatementByClass(cls){
    return (cls==="費用" || cls==="収益") ? "PL" : "BS";
  }
  function expectedAmount(acct){
    return Math.abs(adjustedNet(acct));
  }

  let allOk = true;

  // ① 科目入力の採点（transfer）
  const transferInputs = [...document.querySelectorAll('input[data-role="transfer"]')];
  transferInputs.forEach(inp=>{
    const acct = inp.dataset.acct;
    const cls = acctClass[acct];
    const correctStatement = correctStatementByClass(cls);
    const exp = expectedAmount(acct);
    const v = num(inp.value);

    const isCorrectCell = (inp.dataset.correct === "1") && (inp.dataset.statement === correctStatement);

    if(exp === 0){
      // 残高0：両方空が正解
      if(String(inp.value).trim() !== ""){
        inp.classList.add("wrong");
        allOk = false;
      }
      return;
    }

    if(isCorrectCell){
      if(v !== exp){
        inp.classList.add("wrong");
        allOk = false;
      }
    }else{
      if(String(inp.value).trim() !== ""){
        inp.classList.add("wrong");
        allOk = false;
      }
    }
  });

  // ② 当期純利益の整合（PL:収益-費用 / BS:資産-(負債+資本+控除)）
  let sumRev=0, sumExp=0, sumAsset=0, sumLE=0;

  const allAccts = [...new Set([...baseAccounts, ...[...extraAccounts]])];
  allAccts.forEach(acct=>{
    const cls = acctClass[acct];
    const net = adjustedNet(acct);
    const amt = Math.abs(net);
    if(amt === 0) return;

    if(cls === "収益") sumRev += amt;
    if(cls === "費用") sumExp += amt;
    if(cls === "資産") sumAsset += amt;
    if(cls === "負債" || cls === "資本" || cls === "控除資産" || cls === "資産控除") sumLE += amt;
  });

  const netFromPL = sumRev - sumExp;
  const netFromBS = sumAsset - sumLE;
  const sameNet = (netFromPL === netFromBS);
  const expectedNI = Math.abs(netFromPL);

  const plProfitD = document.getElementById("plProfitD");
  const plProfitC = document.getElementById("plProfitC");
  const bsProfitD = document.getElementById("bsProfitD");
  const bsProfitC = document.getElementById("bsProfitC");

  function isFilled(el){ return el && String(el.value).trim() !== ""; }
  function markWrong(el){ if(el){ el.classList.add("wrong"); allOk=false; } }

  if(!sameNet){
    allOk = false;
    [plProfitD,plProfitC,bsProfitD,bsProfitC].forEach(el=>el && el.classList.add("wrong"));
  }else{
    if(netFromPL === 0){
      [plProfitD,plProfitC,bsProfitD,bsProfitC].forEach(el=>{
        if(isFilled(el)) markWrong(el);
      });
    }else if(netFromPL > 0){
      // 利益：PL借方・BS貸方
      if(num(plProfitD.value) !== expectedNI) markWrong(plProfitD);
      if(isFilled(plProfitC)) markWrong(plProfitC);
      if(num(bsProfitC.value) !== expectedNI) markWrong(bsProfitC);
      if(isFilled(bsProfitD)) markWrong(bsProfitD);
    }else{
      // 損失：PL貸方・BS借方
      if(num(plProfitC.value) !== expectedNI) markWrong(plProfitC);
      if(isFilled(plProfitD)) markWrong(plProfitD);
      if(num(bsProfitD.value) !== expectedNI) markWrong(bsProfitD);
      if(isFilled(bsProfitC)) markWrong(bsProfitC);
    }
  }

  // ③ 結果
  if(allOk){
    res.className = "praise";
    res.innerHTML =
      "🎉🎉 全問正解！！素晴らしい！！ 🎉🎉\n" +
      "転記・分類・当期純利益の整合まで完璧です。\n" +
      "この精算表、検定レベルで通用します！";

    document.getElementById("nextProblemBtn")?.classList.remove("hidden");
  }else{
    res.className = "";
    res.textContent =
      "× 間違いがあります。赤枠の箇所を見直しましょう。\n" +
      (sameNet ? "（ヒント：分類・転記先の選択を再確認）" : "（ヒント：PLとBSで当期純利益が一致しません）");
    document.getElementById("nextProblemBtn")?.classList.add("hidden");
  }
}

/* 次の問題へ */
function nextProblem(){
  const sel = document.getElementById("problemSelect");
  if(!sel) return;

  const idx = sel.selectedIndex;
  const nextIdx = (idx + 1 < sel.options.length) ? idx + 1 : 0;
  sel.selectedIndex = nextIdx;
  currentId = sel.value;

  resetView();
  start();
}

/* 分類不明の新規科目 */
function warnUnknownExtraAccounts(){
  const unknown = [...extraAccounts].filter(a=>!acctClass[a]);
  if(unknown.length===0) return;

  document.getElementById("result").textContent +=
    `\n※注意：分類が不明な新規科目があり、PL/BS入力欄を正しく出せない可能性があります：${unknown.join("、")}\n（seisan2_map.csv に分類を追加してください）`;
}

/* =========================================================
  カンマ補助：イベント委任
========================================================= */
document.addEventListener("input", (e)=>{
  const t = e.target;
  if(!t || !t.classList) return;
  if(!t.classList.contains("money")) return;

  const raw = t.value.replace(/,/g,"");
  if(raw === "" || isNaN(raw)) return;
  t.value = Number(raw).toLocaleString();
});

/* =========================================================
  CSV読込（../data固定）＋ローディング最低1秒
========================================================= */
(async function initAll(){
  try{
    const [tbText, seiriText, mapText] = await Promise.all([
      fetch("../data/seisan2_TB.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_TB.csv が見つかりません"); return r.text(); }),
      fetch("../data/seisan2_seiri.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_seiri.csv が見つかりません"); return r.text(); }),
      fetch("../data/seisan2_map.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_map.csv が見つかりません"); return r.text(); })
    ]);

    TB = parseCSV(tbText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]??"").trim(),
        acct:(c[1]??"").trim(),
        cls:(c[2]??"").trim(),
        debit:num(c[3]),
        credit:num(c[4])
      }));

    SEIRI = parseCSV(seiriText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]??"").trim(),
        q:(c[1]??"").trim(),
        candidates: splitCandidates(c[2]??""),
        answerRaw:(c[3]??"").trim()
      }));

    MAP = parseCSV(mapText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        acct:(c[0]??"").trim(),
        cls:(c[1]??"").trim(),
        label:(c[2]??"").trim()
      }));

    problemIds = [...new Set(TB.map(x=>x.id))].sort();
    setupProblemSelect();
    resetView();

  }catch(e){
    console.error(e);
    alert("CSV読み込みエラー：" + (e.message ?? e));
  }finally{
    const elapsed = Date.now() - loadStartTime;
    const remain = 1000 - elapsed;

    const show = ()=>{
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainCard").classList.remove("hidden");
    };

    if(remain > 0) setTimeout(show, remain);
    else show();
  }
})();
</script>
