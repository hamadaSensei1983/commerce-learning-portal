<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>情報処理検定 用語問題</title>

<link rel="stylesheet" href="../../css/common.css">

</head>

<body>

<header class="app-header">

<div class="header-left">

<img src="../../images/logo.png" class="header-icon">

<div>
<h1 class="site-title">検定対策システム</h1>
<div class="exam-title" id="examLevel"></div>
</div>

</div>
</header>


<!-- =====================
 ローディング画面
===================== -->

<div id="loadingScreen">

<div style="text-align:center">

<img src="../../images/logo.png" style="width:90px;margin-bottom:20px">

<div class="spinner"></div>

<p style="margin-top:15px;font-weight:bold">
問題を読み込み中...
</p>

</div>

</div>



<!-- =====================
 初期設定画面
===================== -->

<div class="card hidden" id="setupArea">

<h3>生徒名</h3>

<input id="studentNameInput" style="width:100%;padding:8px">

<button class="control-btn" onclick="saveStudent()">保存</button>

<div id="studentStats"></div>


<h3>分野選択</h3>

<div id="fieldArea" class="field-grid"></div>

<button class="control-btn" onclick="selectAll()">全選択</button>
<button class="control-btn" onclick="clearAll()">全解除</button>


<h3>モード選択</h3>

<select id="modeSelect" style="width:100%;padding:10px">

<option value="normal">通常モード</option>
<option value="challenge">チャレンジモード</option>
<option value="review">復習モード</option>
<option value="study">学習モード</option>

</select>

<div id="modeDescription"></div>

<button class="main-btn" onclick="startQuiz()">開始</button>


<h3>弱点ランキング</h3>
<div id="weakRanking"></div>
<h3>分野別正答率</h3>
<div id="fieldRates"></div>

</div>

<!-- =====================
 クイズ画面
===================== -->

<div class="card hidden" id="quizArea">

<div class="progress-wrapper">

<div id="progressText"></div>

<div class="progress-bar">
<div id="progressBar" class="progress-bar-fill"></div>
</div>

</div>

<h3 id="question"></h3>

<div id="choices"></div>

<p id="result"></p>

<button id="nextBtn" class="main-btn hidden" onclick="nextQuestion()">次へ</button>

</div>

<!-- =====================
 結果画面
===================== -->

<div class="card hidden" id="resultArea">

<h2>結果</h2>

<p id="scoreText"></p>
<p id="rateText"></p>
<p id="rankText"></p>

<button class="main-btn" onclick="location.reload()">もう一度</button>
<button class="control-btn" onclick="retryWrong()">復習する</button>

</div>



<!-- =====================
 学習モード
===================== -->

<div class="card hidden" id="studyArea">

<div class="study-row">

<button class="nav-square" onclick="prevCard()">◀</button>

<div>

<h2 id="studyTerm"></h2>
<div id="cardPosition"></div>

</div>

<button class="nav-square" onclick="nextCard()">▶</button>

</div>

<div class="study-meaning-box" id="studyMeaning"></div>

</div>

<a href="index.html" class="portal-btn exam-btn">
検定トップ
</a>

<a href="../../index.html" class="portal-btn portal-main">
ポータルへ戻る
</a>


<script>

/* =====================
   グローバル変数
===================== */

let questions=[]
let filtered=[]
let wrong=[]

let current=0
let score=0
let mode=""
let streak=0

/* =====================
 モード説明
===================== */

const modeDesc={
    normal:"5問出題されます",
    challenge:"全問題出題。1問でも間違えると終了",
    review:"間違えた問題を再出題",
    study:"カード形式で学習"
}

/* =====================
 レベル判定
===================== */

const params=new URLSearchParams(location.search)
const level=params.get("level")

if(level==="3"){
    document.getElementById("examLevel").innerText="情報処理検定 3級"
    loadCSV("data/data3.csv")
}

if(level==="2"){
    document.getElementById("examLevel").innerText="情報処理検定 2級"
    loadCSV("data/data2.csv")
}

/* =====================
 CSV読み込み
===================== */

async function loadCSV(path){

    try{
        let res=await fetch(path)
        if(!res.ok){
            throw new Error("CSVが見つかりません: "+path)
        }
        let text=await res.text()
        text=text.replace(/^\uFEFF/,"")
        questions=parseCSV(text)
        createFieldList()
        showWeakRanking()

        document.getElementById("loadingScreen").style.display="none"
        document.getElementById("setupArea").classList.remove("hidden")
    }catch(e){
        alert("CSV読み込みエラー\n"+e.message)
    }
}

/* =====================
 CSVパーサー
===================== */

function parseCSV(text){

    let rows=text.split("\n")
    let result=[]
    for(let i=1;i<rows.length;i++){
        let r=rows[i].split(",")
        if(r.length<3) continue
            result.push({
            field:r[0],
            term:r[1],
            meaning:r[2],
            index:i-1
        })
    }
    return result
}


/* =====================
 分野リスト作成
===================== */

function createFieldList(){

    let counts={}

    questions.forEach(q=>{

        if(!counts[q.field]) counts[q.field]=0
            counts[q.field]++

    })

    let area=document.getElementById("fieldArea")

    Object.keys(counts).forEach(field=>{

        let label=document.createElement("label")
        label.innerHTML=
        '<input type="checkbox" value="'+field+'"> '
        +field+' ('+counts[field]+')'
        area.appendChild(label)

    })

}

/* =====================
 分野選択操作
===================== */

function selectAll(){
    document.querySelectorAll("#fieldArea input").forEach(c=>c.checked=true)
}

function clearAll(){
    document.querySelectorAll("#fieldArea input").forEach(c=>c.checked=false)
}

/* =====================
 モード説明
===================== */

document.getElementById("modeSelect").addEventListener("change",updateModeDesc)

function updateModeDesc(){
    let m=document.getElementById("modeSelect").value
    document.getElementById("modeDescription").innerText=modeDesc[m]
}

updateModeDesc()

/* =====================
 クイズ開始
===================== */

function startQuiz(){

    mode=document.getElementById("modeSelect").value
    let selected=[...document.querySelectorAll("#fieldArea input:checked")].map(c=>c.value)

    if(selected.length===0){
        alert("分野を1つ以上選択してください")
        return
    }

    filtered=questions.filter(q=>selected.includes(q.field))

    shuffle(filtered)

    current=0
    score=0
    wrong=[]
    streak=0


    /* 学習モードならクイズ画面ではなく学習画面 */

    if(mode==="study"){
        document.getElementById("setupArea").classList.add("hidden")
        document.getElementById("studyArea").classList.remove("hidden")
        startStudy()
        return
    }


    /* 通常モードは5問に制限 */

    if(mode==="normal"){
        filtered=filtered.slice(0,5)
    }

    document.getElementById("setupArea").classList.add("hidden")
    document.getElementById("quizArea").classList.remove("hidden")

    nextQuestion()

}

/* =====================
 問題表示
===================== */

function nextQuestion(){

    let total=filtered.length

    document.getElementById("progressText").innerText=
    (current+1)+" / "+total+" 問目"

    document.getElementById("progressBar").style.width=
    (current/total*100)+"%"

    document.getElementById("result").innerText=""

    if(current>=filtered.length){
        showResult()
        return
    }

    let q=filtered[current]

    document.getElementById("question").innerText=q.meaning

    let area=document.getElementById("choices")
    area.innerHTML=""

    let choices=generateChoices(q)

    choices.forEach(c=>{

        let btn=document.createElement("button")

        btn.className="quiz-btn"
        btn.innerText=c.term

        btn.onclick=function(){
            checkAnswer(c.term,q.term,btn)
        }
        area.appendChild(btn)
    })
}

/* =====================
 選択肢生成
===================== */

function generateChoices(q){

    let arr=[q]

    while(arr.length<4){
        let r=questions[Math.floor(Math.random()*questions.length)]
        if(!arr.includes(r)) arr.push(r)
    }

    shuffle(arr)
    return arr

}


/* =====================
 正解判定
===================== */

function checkAnswer(a,c,btn){

    let buttons=document.querySelectorAll(".quiz-btn")
    buttons.forEach(b=>b.disabled=true)
    let field=filtered[current].field

    if(a===c){
        btn.classList.add("correct")
        streak++
        score++
        document.getElementById("result").innerText="正解！🔥"+streak+"連続"
    }else{
        btn.classList.add("incorrect")
        streak=0
        document.getElementById("result").innerText="不正解"
        wrong.push(filtered[current])
    }

    updateFieldStats(field,a===c)
    current++
    document.getElementById("nextBtn").classList.remove("hidden")
}

/* =====================
 弱点ランキング更新
====================== */

function updateFieldStats(field,correct){

    let key="fieldStats_"+level
    let stats=JSON.parse(localStorage.getItem(key)||"{}")

    if(!stats[field]){
        stats[field]={correct:0,attempts:0}
    }

    stats[field].attempts++

    if(correct){
        stats[field].correct++
    }

    localStorage.setItem(key,JSON.stringify(stats))
}

/* =====================
 結果画面
===================== */

function showResult(){

    document.getElementById("quizArea").classList.add("hidden")
    document.getElementById("resultArea").classList.remove("hidden")
    let rate=Math.round(score/filtered.length*100)
    document.getElementById("scoreText").innerText="正解数 "+score
    document.getElementById("rateText").innerText="正答率 "+rate+"%"
    saveStudentStats(rate)

}

/* =====================
 成績保存
===================== */

function saveStudent(){

    let name=document.getElementById("studentNameInput").value
    localStorage.setItem("studentName",name)
    showStudentStats()

}

function saveStudentStats(rate){

    let stats=JSON.parse(localStorage.getItem("studentStats")||"[]")
    stats.push(rate)
    localStorage.setItem("studentStats",JSON.stringify(stats))
    showStudentStats()

}

function showStudentStats(){

    let stats=JSON.parse(localStorage.getItem("studentStats")||"[]")
    if(stats.length===0) return
    let avg=Math.round(stats.reduce((a,b)=>a+b)/stats.length)
    let max=Math.max(...stats)
    document.getElementById("studentStats").innerHTML=

    "試験回数 "+stats.length+"回<br>"+
    "平均正答率 "+avg+"%<br>"+
    "最高正答率 "+max+"%"

}

/* =====================
 弱点ランキング
===================== */

function showWeakRanking(){

    let key="fieldStats_"+level
    let stats=JSON.parse(localStorage.getItem(key)||"{}")
    let arr=Object.keys(stats).map(f=>{
        let s=stats[f]
        let rate=Math.round(s.correct/s.attempts*100)
        return {field:f,rate:rate}
    })

    arr.sort((a,b)=>a.rate-b.rate)
    let html=""

    arr.slice(0,3).forEach((r,i)=>{
        html+=(i+1)+"位 "+r.field+" "+r.rate+"%<br>"
    })

    document.getElementById("weakRanking").innerHTML=html

    showFieldRates()
}


function showFieldRates(){

    let key="fieldStats_"+level
    let stats=JSON.parse(localStorage.getItem(key)||"{}")
    let html=""

    Object.keys(stats).forEach(field=>{

        let s=stats[field]
        let rate=Math.round(s.correct/s.attempts*100)
        html+=field+"　"+rate+"% ("+s.correct+"/"+s.attempts+")<br>"

    })

    document.getElementById("fieldRates").innerHTML=html

}

/* =====================
 配列シャッフル
===================== */

function shuffle(a){

    for(let i=a.length-1;i>0;i--){

        let j=Math.floor(Math.random()*(i+1))

        let t=a[i]
        a[i]=a[j]
        a[j]=t

    }

}

/* =====================
 学習モード用
===================== */

let studyIndex=0

function startStudy(){
    studyIndex=0
    showStudy()
}

function showStudy(){

    let q=filtered[studyIndex]

    document.getElementById("studyTerm").innerText=q.term
    document.getElementById("studyMeaning").innerText=q.meaning

    document.getElementById("cardPosition").innerText=
    (studyIndex+1)+" / "+filtered.length

}

function nextCard(){
    if(studyIndex<filtered.length-1){
        studyIndex++
        showStudy()
    }
}

function prevCard(){

    if(studyIndex>0){
        studyIndex--
        showStudy()
    }

}

//スワイプ対応

let touchStartX=0
let touchEndX=0

const studyArea=document.getElementById("studyArea")

studyArea.addEventListener("touchstart",e=>{
    touchStartX=e.changedTouches[0].screenX
})

studyArea.addEventListener("touchend",e=>{
    touchEndX=e.changedTouches[0].screenX
    handleSwipe()
})

function handleSwipe(){

    let diff=touchEndX-touchStartX

    if(diff>60){
        prevCard()
    }

    if(diff<-60){
        nextCard()
    }

}

</script>

</body>
</html>
