<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>簿記3級 仕訳トレーニング</title>
  <link rel="stylesheet" href="../../../css/common.css">
  <style>
    /* 問題 */
    #question{
      text-align:center;
      font-size:26px;
      margin-bottom:25px;
    }
    /* 分野選択 */
    .field-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      max-width:400px;
      margin:10px auto;
      text-align:left;
    }
    /* 分野ボタン */
    .field-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:400px;
      margin:10px auto;
    }
    /* 仕訳カード */
    .journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
      margin-top:20px;
      padding:15px;
      background:#f9fdf9;
      border-radius:10px;
      border:2px solid #d8ead8;
    }
    /* 左右エリア */
    .side{
      background:white;
      padding:15px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
      text-align:center;
    }
    /* 見出し */
    .side-title{
      font-weight:bold;
      margin-bottom:10px;
      padding-bottom:6px;
      border-bottom:2px solid #eee;
    }
    /* 入力行 */
    .entry{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin:8px 0;
    }
    /* プルダウン */
    select{
      width:130px;
      padding:5px;
      font-size:16px;
    }
    /* 金額 */
    .money{
      width:90px;
      padding:5px;
      font-size:16px;
      text-align:right;
    }
    .answer-box{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
      min-height:60px;
    }
    /* 正解表示用の仕訳 */
    .answer-journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
      margin-top:10px;
    }
    .answer-side{
      background:#f7fff7;
      padding:10px;
      border-radius:6px;
      text-align:left;
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 仕訳トレーニング</div>
    </div>
  </div>
</header>

<!-- =====================
  ローディング画面
===================== -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold">
      問題を読み込み中...
    </p>
  </div>
</div>

<!-- =====================
  メインカード（最初は非表示）
===================== -->
<div class="card hidden" id="mainCard">
  <!-- 分野選択＆ステータス -->
  <div id="fieldArea">
    <div style="text-align:center">
      <div id="fieldList" class="field-grid"></div>
      <div class="field-controls">
        <button class="control-btn" onclick="selectAll()">
          全選択
        </button>
        <button class="control-btn" onclick="clearAll()">
          全解除
        </button>
      </div>
      <div style="text-align:center;margin-top:10px">
        <button class="main-btn" onclick="start()">開始</button>
      </div>
    </div>

    <div id="stats" style="text-align:center;margin:10px 0;font-weight:bold;">
      連続正解：0（最高：0）
    </div>

    <div id="instruction" style="text-align:center;font-size:18px;margin-bottom:8px">
      次の取引の仕訳を示しなさい。
    </div>

    <h2 id="question"></h2>

    <div id="journalArea" style="display:none">
      <div class="journal">
        <!-- 借方 -->
        <div class="side">
          <div class="side-title">借方</div>
          <div class="entry">
            <select id="d1"></select>
            <input id="dm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="d2"></select>
            <input id="dm2" class="money" inputmode="numeric">
          </div>
        </div>
        <!-- 貸方 -->
        <div class="side">
          <div class="side-title">貸方</div>
          <div class="entry">
            <select id="c1"></select>
            <input id="cm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="c2"></select>
            <input id="cm2" class="money" inputmode="numeric">
          </div>
        </div>
      </div>

      <p id="result" class="answer-box"></p>

      <div style="text-align:center">
        <button class="main-btn" onclick="check()">答え合わせ</button>
        <button class="main-btn hidden" id="nextBtn" onclick="next()">次の問題</button>
      </div>
    </div>
  </div>
</div>

<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

<script>
let allData   = [];
let data      = [];
let current;
let accounts  = [];
let streak    = 0;
let bestStreak = 0;
let autoNextTimer = null;
let fieldStats = {};

// ローディング1秒ルール用
const loadStartTime = Date.now();

/* =====================
   CSV読み込み
===================== */
fetch("../data/journal3.csv")
  .then(res => {
    if(!res.ok){
      throw new Error("CSVファイルが見つかりません");
    }
    return res.text();
  })
  .then(text => {
    let rows = text.trim().split(/\r?\n/).slice(1);
    allData = rows.map(r => {
      let c = r.split(",");
      return {
        field : c[0],
        q     : c[1],
        d1    : c[2],
        dm1   : Number(c[3] || 0),
        d2    : c[4],
        dm2   : Number(c[5] || 0),
        c1    : c[6],
        cm1   : Number(c[7] || 0),
        c2    : c[8],
        cm2   : Number(c[9] || 0),
        desc  : c[10]
      };
    });

    init();

    const elapsed     = Date.now() - loadStartTime;
    const minDuration = 1000;
    const showMain = () => {
      const loading = document.getElementById("loadingScreen");
      const card    = document.getElementById("mainCard");
      if(loading) loading.style.display = "none";
      if(card) card.classList.remove("hidden");
      // ロード後にストリーク表示を初期化
      loadBestStreak();
      updateStreakDisplay();
    };
    if(elapsed >= minDuration){
      showMain();
    }else{
      setTimeout(showMain, minDuration - elapsed);
    }
  })
  .catch(err => {
    console.error("CSV読み込み失敗", err);
    const loading = document.getElementById("loadingScreen");
    const card    = document.getElementById("mainCard");
    if(loading) loading.style.display = "none";
    if(card) card.classList.remove("hidden");
    document.getElementById("question").innerText = "CSV読み込みエラー";
    document.getElementById("result").innerText   = err.message || err;
  });

/* =====================
   初期化
===================== */
function init(){
  // 分野リスト作成
  let fields = [...new Set(allData.map(x => x.field))];
  let area   = document.getElementById("fieldList");
  fields.forEach(f => {
    let label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${f}"> ${f}`;
    area.appendChild(label);
  });

  // 勘定科目リスト
  accounts = [...new Set(allData.flatMap(x => [
    x.d1, x.d2, x.c1, x.c2
  ]).filter(Boolean))];
  fillAccounts();

  // 金額入力カンマフォーマット
  document.querySelectorAll(".money").forEach(el => {
    el.addEventListener("input", () => {
      let v = el.value.replace(/,/g,"");
      if(!isNaN(v) && v !== ""){
        el.value = Number(v).toLocaleString();
      }
    });
  });

  // 最高連続正解数を読み込む
  loadBestStreak();
  updateStreakDisplay();
}

/* 勘定科目プルダウンに反映 */
function fillAccounts(){
  ["d1","d2","c1","c2"].forEach(id => {
    let s = document.getElementById(id);
    s.innerHTML = "";
    let blank = document.createElement("option");
    blank.value = "";
    blank.text  = "";
    s.appendChild(blank);
    accounts.forEach(a => {
      let o = document.createElement("option");
      o.value = a;
      o.text  = a;
      s.appendChild(o);
    });
  });
}

/* 最高連続正解数 読込・保存 */
function loadBestStreak(){
  const key = "journal3_bestStreak";
  const v   = localStorage.getItem(key);
  bestStreak = v ? parseInt(v,10) : 0;
}
function saveBestStreak(){
  const key = "journal3_bestStreak";
  localStorage.setItem(key, String(bestStreak));
}

/* ストリーク表示更新 */
function updateStreakDisplay(){
  const statsDiv = document.getElementById("stats");
  if(!statsDiv) return;
  statsDiv.innerText = "連続正解：" + streak + "（最高：" + bestStreak + "）";
}

/* 全選択 / 全解除 */
function selectAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = true);
}
function clearAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = false);
}

/* 開始 */
function start(){
  let selected = [...document.querySelectorAll("#fieldList input:checked")]
    .map(x => x.value);
  if(selected.length === 0){
    alert("分野を選択してください");
    return;
  }
  data = allData.filter(x => selected.includes(x.field));

  // 分野別成績リセット
  fieldStats = {};
  data.forEach(q => {
    if(!fieldStats[q.field]){
      fieldStats[q.field] = {correct:0, total:0};
    }
  });

  // 連続正解リセット（最高値は保持）
  streak = 0;
  updateStreakDisplay();

  document.getElementById("journalArea").style.display = "block";
  next();
}

/* 次の問題 */
function next(){
  // 自動遷移タイマーが残っていれば止める
  if(autoNextTimer !== null){
    clearTimeout(autoNextTimer);
    autoNextTimer = null;
  }

  if(!data || data.length === 0) return;

  current = data[Math.floor(Math.random() * data.length)];
  document.getElementById("question").innerText = current.q;
  document.getElementById("result").innerHTML  = "";
  clearInputs();

  // 「次の問題」ボタンを隠す（不正解のときだけ表示）
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.classList.add("hidden");
}

/* 入力欄クリア＆有効化 */
function clearInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id => {
    let el = document.getElementById(id);
    if(!el) return;
    el.disabled = false;
    if(el.tagName === "SELECT"){
      el.selectedIndex = 0;
    }else{
      el.value = "";
    }
  });
}

/* 値取得 */
function v(id){
  return document.getElementById(id).value;
}
function n(id){
  const raw = document.getElementById(id).value.replace(/,/g,"");
  return Number(raw || 0);
}

/* 入力ロック */
function lockInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id => {
    let el = document.getElementById(id);
    if(el){
      el.disabled = true;
    }
  });
}

/* チェック */
function check(){
  if(!current) return;

  fieldStats[current.field].total++;

  let ansD = [
    {a:v("d1"), m:n("dm1")},
    {a:v("d2"), m:n("dm2")}
  ];
  let ansC = [
    {a:v("c1"), m:n("cm1")},
    {a:v("c2"), m:n("cm2")}
  ];
  let corD = [
    {a:current.d1, m:current.dm1},
    {a:current.d2, m:current.dm2}
  ];
  let corC = [
    {a:current.c1, m:current.cm1},
    {a:current.c2, m:current.cm2}
  ];

  // 借方・貸方合計チェック
  let debitSum  = ansD.reduce((s,x) => s + x.m, 0);
  let creditSum = ansC.reduce((s,x) => s + x.m, 0);
  if(debitSum !== creditSum){
    document.getElementById("result").innerHTML =
      "借方と貸方の金額が一致していません";
    return;
  }

  let ok = compare(ansD, corD) && compare(ansC, corC);
  const result = document.getElementById("result");

  if(ok){
    result.innerHTML = "〇 正解！";
    streak++;
    if(streak > bestStreak){
      bestStreak = streak;
      saveBestStreak();
    }
    fieldStats[current.field].correct++;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 正解時はテンポ良く：1秒後に自動で次の問題へ
    autoNextTimer = setTimeout(() => {
      autoNextTimer = null;
      next();
    }, 1000);

  }else{
    let html =
      "× 不正解<br><br>" +
      "<b>正解</b>" +
      "<div class='answer-journal'>" +
        "<div class='answer-side'>" +
          "<b>借方</b><br>" +
          current.d1 + " " + current.dm1.toLocaleString() + "<br>" +
          (current.d2 ? current.d2 + " " + current.dm2.toLocaleString() : "") +
        "</div>" +
        "<div class='answer-side'>" +
          "<b>貸方</b><br>" +
          current.c1 + " " + current.cm1.toLocaleString() + "<br>" +
          (current.c2 ? current.c2 + " " + current.cm2.toLocaleString() : "") +
        "</div>" +
      "</div><br>" +
      "解説：" + (current.desc || "");

    result.innerHTML = html;

    // ストリークリセット
    streak = 0;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 不正解時は「次の問題」ボタンを押すまで進まない
    const nextBtn = document.getElementById("nextBtn");
    if(nextBtn) nextBtn.classList.remove("hidden");
  }
}

/* 勘定科目＋金額の比較（順不同OK） */
function compare(a, b){
  a = a.filter(x => x.m > 0);
  b = b.filter(x => x.m > 0);
  if(a.length !== b.length) return false;
  return a.every(x => b.some(y => x.a === y.a && x.m === y.m));
}

/* 分野別正解率表示 */
function showFieldStats(){
  let html = "<br><b>分野別正解率</b><br>";
  for(let f in fieldStats){
    let s    = fieldStats[f];
    let rate = s.total ? Math.round(s.correct / s.total * 100) : 0;
    html += f + " : " + rate + "% (" + s.correct + "/" + s.total + ")<br>";
  }
  document.getElementById("result").innerHTML += html;
}
</script>
</body>
</html>
