<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商情報処理検定3級 計算問題</title>

<link rel="stylesheet" href="common.css">

<style>

.calc-question{
    font-size:28px;
    text-align:center;
    margin:20px 0;
}

.calc-input{
    width:120px;
    font-size:20px;
    text-align:center;
    padding:8px;
}

.calc-result{
    margin-top:15px;
    font-weight:bold;
}

.hint-box{
    margin-top:15px;
    background:#f5f5f5;
    padding:12px;
    border-radius:8px;
}

.score-box{
    margin-bottom:15px;
    font-weight:bold;
}

</style>
</head>


<body>

<header class="app-header">
<div class="header-left">
<img src="logo.png" class="header-icon">
<div>
<h1 class="site-title">情報処理検定 学習サイト</h1>
<div class="exam-title">3級 計算問題</div>
</div>
</div>
</header>


<div class="card">

<div id="modeSelect">

<h2>問題タイプを選択</h2>

<button class="mode-btn" onclick="startGame('binToDec')">
2進数 → 10進数
</button>

<button class="mode-btn" onclick="startGame('decToBin')">
10進数 → 2進数
</button>

<button class="mode-btn" onclick="startGame('mix')">
ミックス
</button>

</div>


<div id="quizArea" class="hidden">

<div class="score-box">
問題 <span id="qNum">1</span> / 10　
正解 <span id="correct">0</span>
</div>

<div class="calc-question" id="question"></div>

<div style="text-align:center">

<input id="answerInput" class="calc-input" type="text">

<br><br>

<button class="main-btn" onclick="checkAnswer()" id="checkBtn">
答え合わせ
</button>

<button class="control-btn" onclick="showHint()">
ヒント
</button>

</div>

<div class="calc-result" id="result"></div>

<div class="hint-box hidden" id="hint"></div>

</div>


<div id="resultArea" class="card hidden">

<h2>結果</h2>

<p id="finalScore"></p>

<button class="main-btn" onclick="restart()">
もう一度挑戦
</button>

</div>

</div>


<a href="joho3.html" class="portal-btn">
ポータルへ戻る
</a>



<script>

let mode=""
let currentAnswer=0
let qCount=0
let correctCount=0

function startGame(m){

mode=m
qCount=0
correctCount=0

document.getElementById("modeSelect").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

nextQuestion()

}

function nextQuestion(){

if(qCount>=10){

showResult()
return

}

qCount++

document.getElementById("qNum").textContent=qCount
document.getElementById("correct").textContent=correctCount

document.getElementById("answerInput").value=""
document.getElementById("result").textContent=""
document.getElementById("hint").classList.add("hidden")

generateQuestion()

}

function generateQuestion(){

let type=mode

if(mode==="mix"){

type=Math.random()<0.5 ? "binToDec" : "decToBin"

}

if(type==="binToDec"){

let num=Math.floor(Math.random()*100)+13

let bin=num.toString(2)

if(bin.length>7){
generateQuestion()
return
}

currentAnswer=num

document.getElementById("question").textContent=
bin+" (2進数) → 10進数"

document.getElementById("hint").innerHTML=
"ヒント：<br>2進数は右から<br>"
+"1,2,4,8,16,32,64…<br>"
+"を足して計算します。"

}

else{

let num=Math.floor(Math.random()*100)+13

let bin=num.toString(2)

if(bin.length>7){
generateQuestion()
return
}

currentAnswer=bin

document.getElementById("question").textContent=
num+" (10進数) → 2進数"

document.getElementById("hint").innerHTML=
"ヒント：<br>10進数を2で割り続けて<br>"
+"余りを下から読んでいきます。"

}

}

function checkAnswer(){

let input=document.getElementById("answerInput").value.trim()

if(input===""){

alert("答えを入力してください")
return

}

let result=document.getElementById("result")

if(input==currentAnswer){

correctCount++

result.textContent="正解！"

document.getElementById("correct").textContent=correctCount

setTimeout(nextQuestion,800)

}

else{

result.textContent="不正解。ヒントを確認しましょう。"

document.getElementById("hint").classList.remove("hidden")

setTimeout(nextQuestion,1500)

}

}

function showHint(){

document.getElementById("hint").classList.remove("hidden")

}

function showResult(){

document.getElementById("quizArea").classList.add("hidden")

document.getElementById("resultArea").classList.remove("hidden")

let rate=Math.round(correctCount/10*100)

document.getElementById("finalScore").textContent=
"正解数："+correctCount+" / 10　（正解率 "+rate+"%）"

}

function restart(){

location.reload()

}

</script>

</body>
</html>
