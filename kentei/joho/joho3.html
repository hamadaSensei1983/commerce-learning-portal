<body>

<div id="loadingScreen">

<div class="card" id="setupCard">

<h2>モード選択</h2>
<div class="grid-2">

  <button onclick="setMode('challenge')">チャレンジモード</button>

</div>

<button onclick="startGame()">ゲーム開始</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div class="card hidden" id="gameCard">
<h3 id="scoreDisplay"></h3>
<p id="progress"></p>
<p id="question"></p>
<div id="choices"></div>
<p id="result"></p>
<button onclick="nextQuestion()" id="nextBtn" class="hidden">次へ</button>
<button onclick="backToMenu()" id="menuBtn" class="hidden">メニューへ戻る</button>
</div>

<!-- ===== 学習モード ===== -->
<div class="card hidden" id="studyCard">
<h3>📚 学習モード</h3>
<div class="studyWord" id="studyWord"></div>
<div class="studyDesc" id="studyDesc"></div>
<button onclick="toggleDescription()">説明を表示/非表示</button>
<button onclick="prevStudy()">← 前へ</button>
<button onclick="nextStudy()">次へ →</button>
<button onclick="backToMenu()">メニューへ戻る</button>
</div>

<a href="../../index.html">

</a>

var words=[];
var categories={};
var mode=null;
var quizSet=[];
var wrongList=[];
var currentIndex=0;
var score=0;

var questionTimer;
var timeLeft=10;
var totalStartTime;

var studyList=[];
var studyIndex=0;
var studyVisible=false;

// ===== CSV解析 =====
function parseCSV(){
    var lines=csvData.trim().split("\n");
    for(var i=1;i<lines.length;i++){
        var p=lines[i].split(",");
        var obj={category:p[0],word:p[1],description:p[2]};
        words.push(obj);
        if(!categories[obj.category]) categories[obj.category]=[];
        categories[obj.category].push(obj);
    }
}
parseCSV();

// ===== 分野表示 =====
var catDiv=document.getElementById("categorySelect");
for(var c in categories){
    catDiv.innerHTML+=
    `<label><input type="checkbox" value="${c}"> ${c}</label><br>`;
}

function selectAll(){
    document.querySelectorAll("#categorySelect input")
    .forEach(c=>c.checked=true);
}

function setMode(m){
    mode=m;
    document.getElementById("modeDisplay").innerHTML="選択中："+m;
}

// ===== シャッフル =====
function shuffle(a){
    for(var i=a.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var t=a[i];a[i]=a[j];a[j]=t;
    }
}

// ===== ゲーム開始 =====
function startGame(){
    if(!mode){alert("モードを選択してください");return;}

    var selected=[];
    document.querySelectorAll("#categorySelect input")
    .forEach(c=>{if(c.checked)selected.push(c.value);});

    if(selected.length===0){alert("分野を選択してください");return;}

    var pool=[];
    selected.forEach(c=>pool=pool.concat(categories[c]));
    shuffle(pool);
    quizSet=pool.slice(0,10);
    wrongList=[];
    currentIndex=0;
    score=0;

    totalStartTime=Date.now();
    document.getElementById("timerBox").style.display="block";

    document.getElementById("setupCard").classList.add("hidden");
    document.getElementById("gameCard").classList.remove("hidden");

    showQuestion();
}

// ===== 問題表示 =====
function showQuestion(){

    document.getElementById("result").innerHTML="";
    clearInterval(questionTimer);

    if(currentIndex>=quizSet.length){

        var totalTime=Math.floor((Date.now()-totalStartTime)/1000);

        document.getElementById("question").innerHTML=
        "終了！<br>正解数："+score+
        "<br>⏱ 通算時間："+totalTime+"秒";

        document.getElementById("choices").innerHTML="";
        document.getElementById("menuBtn").classList.remove("hidden");
        document.getElementById("timerBox").style.display="none";
        return;
    }

    var q=quizSet[currentIndex];

    document.getElementById("scoreDisplay").innerHTML="スコア："+score;
    document.getElementById("progress").innerHTML=(currentIndex+1)+" / 10";
    document.getElementById("question").innerHTML=q.description;

    timeLeft=10;
    document.getElementById("timerBox").innerHTML="⏱ "+timeLeft;

    questionTimer=setInterval(function(){
        timeLeft--;
        document.getElementById("timerBox").innerHTML="⏱ "+timeLeft;
        if(timeLeft<=0){
            clearInterval(questionTimer);
            handleTimeUp();
        }
    },1000);

    var same=categories[q.category];
    var choices=[q.word];
    var wrong=same.filter(w=>w.word!==q.word);
    shuffle(wrong);
    for(var i=0;i<3 && i<wrong.length;i++){
        choices.push(wrong[i].word);
    }
    shuffle(choices);

    var div=document.getElementById("choices");
    div.innerHTML="";

    choices.forEach(choice=>{
        var btn=document.createElement("button");
        btn.innerHTML=choice;

        btn.onclick=function(){

            clearInterval(questionTimer);

            var all=document.querySelectorAll("#choices button");
            all.forEach(b=>b.disabled=true);

            if(choice===q.word){
                btn.classList.add("correct");
                document.getElementById("result").innerHTML="✅ 正解です！";
                score++;
            }else{
                btn.classList.add("wrong");
                all.forEach(b=>{
                    if(b.innerHTML===q.word){
                        b.classList.add("correct");
                    }
                });

                if(mode==="challenge"){
                    document.getElementById("result").innerHTML=
                    "❌ 不正解！ゲームオーバー";
                    setTimeout(()=>backToMenu(),1500);
                    return;
                }

                if(mode==="review") wrongList.push(q);

                document.getElementById("result").innerHTML=
                "❌ 不正解です。正解は「"+q.word+"」です。";
            }

            document.getElementById("nextBtn").classList.remove("hidden");
        };

        div.appendChild(btn);
    });
}

function handleTimeUp(){
    var q=quizSet[currentIndex];
    document.getElementById("result").innerHTML=
    "⏰ 時間切れ！ 正解は「"+q.word+"」です。";
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
    document.getElementById("nextBtn").classList.add("hidden");
    currentIndex++;
    showQuestion();
}

function backToMenu(){
    clearInterval(questionTimer);
    document.getElementById("timerBox").style.display="none";
    document.getElementById("gameCard").classList.add("hidden");
    document.getElementById("studyCard").classList.add("hidden");
    document.getElementById("setupCard").classList.remove("hidden");
}

// ===== 学習モード =====
function startStudyMode(){

    var selected=[];
    document.querySelectorAll("#categorySelect input")
    .forEach(c=>{if(c.checked)selected.push(c.value);});

    if(selected.length===0){alert("分野を選択してください");return;}

    studyList=[];
    selected.forEach(c=>studyList=studyList.concat(categories[c]));

    shuffle(studyList);
    studyIndex=0;
    studyVisible=false;

    document.getElementById("setupCard").classList.add("hidden");
    document.getElementById("studyCard").classList.remove("hidden");

    showStudy();
}

function showStudy(){
    var item=studyList[studyIndex];
    document.getElementById("studyWord").innerHTML=item.word;
    document.getElementById("studyDesc").innerHTML="";
    studyVisible=false;
}

function toggleDescription(){
    var item=studyList[studyIndex];
    if(studyVisible){
        document.getElementById("studyDesc").innerHTML="";
        studyVisible=false;
    }else{
        document.getElementById("studyDesc").innerHTML=item.description;
        studyVisible=true;
    }
}

function nextStudy(){
    studyIndex++;
    if(studyIndex>=studyList.length) studyIndex=0;
    showStudy();
}

function prevStudy(){
    studyIndex--;
    if(studyIndex<0) studyIndex=studyList.length-1;
    showStudy();
}

window.addEventListener("load", function(){
    setTimeout(function(){
        document.getElementById("loadingScreen").style.display="none";
    }, 800);
});

</script>
