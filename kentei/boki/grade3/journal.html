<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>簿記3級 仕訳トレーニング</title>
  <link rel="stylesheet" href="../../../css/common.css">
  <style>
    /* 問題文 */
    #question{
      text-align:center;
      font-size:26px;
      margin-bottom:25px;
    }
    /* 分野選択チェックボックス */
    .field-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      max-width:400px;
      margin:10px auto;
      text-align:left;
    }
    /* 分野ボタン */
    .field-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      max-width:400px;
      margin:10px auto;
    }
    /* 仕訳カード全体 */
    .journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
      margin-top:20px;
      padding:15px;
      background:#f9fdf9;
      border-radius:10px;
      border:2px solid #d8ead8;
    }
    /* 左右エリア（借方・貸方） */
    .side{
      background:white;
      padding:15px;
      border-radius:8px;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
      text-align:center;
    }
    .side-title{
      font-weight:bold;
      margin-bottom:10px;
      padding-bottom:6px;
      border-bottom:2px solid #eee;
    }
    /* 入力行 */
    .entry{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin:8px 0;
    }
    /* プルダウン */
    select{
      width:130px;
      padding:5px;
      font-size:16px;
    }
    /* 金額入力欄 */
    .money{
      width:90px;
      padding:5px;
      font-size:16px;
      text-align:right;
    }
    /* 結果表示 */
    .answer-box{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
      min-height:60px;
    }
    /* 正解仕訳表示 */
    .answer-journal{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
      margin-top:10px;
    }
    .answer-side{
      background:#f7fff7;
      padding:10px;
      border-radius:6px;
      text-align:left;
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 仕訳トレーニング</div>
    </div>
  </div>
</header>

<!-- =====================
  ローディング画面
===================== -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold">
      問題を読み込み中...
    </p>
  </div>
</div>

<!-- =====================
  メインカード（最初は非表示）
===================== -->
<div class="card hidden" id="mainCard">
  <div id="fieldArea">
    <!-- 分野選択 -->
    <div style="text-align:center">
      <div id="fieldList" class="field-grid"></div>
      <div class="field-controls">
        <button class="control-btn" onclick="selectAll()">全選択</button>
        <button class="control-btn" onclick="clearAll()">全解除</button>
      </div>
      <div style="text-align:center;margin-top:10px">
        <button class="main-btn" onclick="start()">開始</button>
      </div>
    </div>

    <!-- ストリーク表示 -->
    <div id="stats" style="text-align:center;margin:10px 0;font-weight:bold;">
      連続正解：0（最高：0）
    </div>

    <div id="instruction" style="text-align:center;font-size:18px;margin-bottom:8px">
      次の取引の仕訳を示しなさい。
    </div>

    <h2 id="question"></h2>

    <!-- 仕訳入力エリア -->
    <div id="journalArea" style="display:none">
      <div class="journal">
        <!-- 借方 -->
        <div class="side">
          <div class="side-title">借方</div>
          <div class="entry">
            <select id="d1"></select>
            <input id="dm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="d2"></select>
            <input id="dm2" class="money" inputmode="numeric">
          </div>
        </div>
        <!-- 貸方 -->
        <div class="side">
          <div class="side-title">貸方</div>
          <div class="entry">
            <select id="c1"></select>
            <input id="cm1" class="money" inputmode="numeric">
          </div>
          <div class="entry">
            <select id="c2"></select>
            <input id="cm2" class="money" inputmode="numeric">
          </div>
        </div>
      </div>

      <p id="result" class="answer-box"></p>

      <div style="text-align:center">
        <button class="main-btn" id="checkBtn" onclick="check()">答え合わせ</button>
        <button class="main-btn hidden" id="nextBtn" onclick="next()">次の問題</button>
      </div>
    </div>
  </div>
</div>

<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

<script>
/* =====================
   グローバル変数
===================== */
let allData   = [];        // journal3.csv から読み込んだ仕訳問題
let data      = [];        // 出題対象の問題
let current;               // 現在の問題
let accountMaster = {};    // { 資産:[現金,当座預金,...], 負債:[...], ... } (boki3.csvから)
let streak    = 0;         // 連続正解数
let bestStreak = 0;        // 最高連続正解数
let autoNextTimer = null;  // 正解時の自動次問題タイマー
let fieldStats = {};       // 分野別成績
let quizOrder = [];   // シャッフル後の問題並び
let quizIndex = 0;    // 現在の問題番号


const loadStartTime = Date.now(); // ローディング開始時刻
const typeOrder = ["資産","負債","資本","費用","収益"];

/* =====================
   CSVパーサー（クォート対応）
   "1,200" や "商品1,200円を..." に対応
===================== */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, ""); // BOM除去
  let rows = text.trim().split(/\r?\n/);
  let result = [];
  for(let line of rows){
    let cols = [];
    let current = "";
    let inQuotes = false;
    for(let i=0;i<line.length;i++){
      let c = line[i];
      if(c === '"'){
        inQuotes = !inQuotes;
        continue;
      }
      if(c === "," && !inQuotes){
        cols.push(current);
        current = "";
      }else{
        current += c;
      }
    }
    cols.push(current);
    result.push(cols);
  }
  return result;
}

/* 文字列 → 数値（カンマ削除＆空欄は0） */
function toNumber(v){
  if(!v) return 0;
  const s = String(v).replace(/,/g,"").trim();
  return s === "" ? 0 : Number(s);
}

/* =====================
   CSV読み込み（journal3 + boki3）
===================== */
Promise.all([
  fetch("../data/journal3.csv").then(res => {
    if(!res.ok) throw new Error("journal3.csv が見つかりません");
    return res.text();
  }),
  fetch("../data/boki3.csv").then(res => {
    if(!res.ok) throw new Error("boki3.csv が見つかりません");
    return res.text();
  })
])
.then(([journalText, bokiText]) => {
  // --- 仕訳問題（journal3） ---
  const jRows = parseCSV(journalText);
  const jBody = jRows.slice(1).filter(r => r.length && r.join("").trim() !== "");
  allData = jBody.map(c => {
    return {
      field : (c[0] || "").trim(),
      q     : (c[1] || "").trim(),     // 取引文（カンマ入りOK）
      d1    : (c[2] || "").trim(),
      dm1   : toNumber(c[3]),
      d2    : (c[4] || "").trim(),
      dm2   : toNumber(c[5]),
      c1    : (c[6] || "").trim(),
      cm1   : toNumber(c[7]),
      c2    : (c[8] || "").trim(),
      cm2   : toNumber(c[9]),
      desc  : (c[10] || "").trim()
    };
  });

  // --- 勘定科目マスタ（boki3） ---
  const bRows = parseCSV(bokiText);
  const bBody = bRows.slice(1).filter(r => r.length && r.join("").trim() !== "");
  accountMaster = {}; // {資産:[], 負債:[], ...}
  bBody.forEach(cols => {
    const name = (cols[0] || "").trim(); // 勘定科目
    const type = (cols[1] || "").trim(); // 分類（資産・負債・資本・費用・収益）
    if(!name || !type) return;
    if(!accountMaster[type]) accountMaster[type] = [];
    // 重複チェック
    if(!accountMaster[type].includes(name)){
      accountMaster[type].push(name);
    }
  });

  init();

  // ローディング1秒ルール
  const elapsed     = Date.now() - loadStartTime;
  const minDuration = 1000;
  const showMain = () => {
    const loading = document.getElementById("loadingScreen");
    const card    = document.getElementById("mainCard");
    if(loading) loading.style.display = "none";
    if(card) card.classList.remove("hidden");
    loadBestStreak();
    updateStreakDisplay();
  };
  if(elapsed >= minDuration){
    showMain();
  }else{
    setTimeout(showMain, minDuration - elapsed);
  }
})
.catch(err => {
  console.error("CSV読み込み失敗", err);
  const loading = document.getElementById("loadingScreen");
  const card    = document.getElementById("mainCard");
  if(loading) loading.style.display = "none";
  if(card) card.classList.remove("hidden");
  document.getElementById("question").innerText = "CSV読み込みエラー";
  document.getElementById("result").innerText   = err.message || err;
});

/* =====================
   初期化
===================== */
function init(){
  // 分野リスト作成
  let fields = [...new Set(allData.map(x => x.field))];
  let area   = document.getElementById("fieldList");
  fields.forEach(f => {
    let label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${f}"> ${f}`;
    area.appendChild(label);
  });

  // 勘定科目プルダウン（分類ごとに optgroup でグルーピング）
  fillAccountsGrouped();

  // 金額入力カンマフォーマット
  document.querySelectorAll(".money").forEach(el => {
    el.addEventListener("input", () => {
      let v = el.value.replace(/,/g,"");
      if(!isNaN(v) && v !== ""){
        el.value = Number(v).toLocaleString();
      }
    });
  });

  loadBestStreak();
  updateStreakDisplay();
}

/* 勘定科目プルダウン（分類グループ付き） */
function fillAccountsGrouped(){
  ["d1","d2","c1","c2"].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = "";

    // 空白（未選択）用
    const blank = document.createElement("option");
    blank.value = "";
    blank.text  = "";
    s.appendChild(blank);

    typeOrder.forEach(type => {
      const list = accountMaster[type] || [];
      if(list.length === 0) return;

      const og = document.createElement("optgroup");
      og.label = type;

      list.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.text  = name;
        og.appendChild(opt);
      });

      s.appendChild(og);
    });
  });
}

/* 最高連続正解数 読込・保存 */
function loadBestStreak(){
  const key = "journal3_bestStreak";
  const v   = localStorage.getItem(key);
  bestStreak = v ? parseInt(v,10) : 0;
}
function saveBestStreak(){
  const key = "journal3_bestStreak";
  localStorage.setItem(key, String(bestStreak));
}

/* ストリーク表示更新 */
function updateStreakDisplay(){
  const statsDiv = document.getElementById("stats");
  if(!statsDiv) return;
  statsDiv.innerText = "連続正解：" + streak + "（最高：" + bestStreak + "）";
}

/* 全選択 / 全解除 */
function selectAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = true);
}
function clearAll(){
  document.querySelectorAll("#fieldList input")
    .forEach(x => x.checked = false);
}

/* 開始 */
function start(){
  let selected = [...document.querySelectorAll("#fieldList input:checked")]
    .map(x => x.value);
  if(selected.length === 0){
    alert("分野を選択してください");
    return;
  }
  data = allData.filter(x => selected.includes(x.field));

  // 分野別成績リセット
  fieldStats = {};
  data.forEach(q => {
    if(!fieldStats[q.field]){
      fieldStats[q.field] = {correct:0, total:0};
    }
  });

  // 連続正解リセット（最高値は保持）
  streak = 0;
  updateStreakDisplay();

  // ★★★ ここが変更点：data をシャッフルして順番確定
  quizOrder = shuffle([...data]);
  quizIndex = 0;

  document.getElementById("journalArea").style.display = "block";
  next();
}

/* 次の問題 */
function next(){
  // 自動遷移タイマーが残っていれば止める
  if(autoNextTimer !== null){
    clearTimeout(autoNextTimer);
    autoNextTimer = null;
  }

  if(!quizOrder || quizOrder.length === 0) return;

  // ★★★ ここが「シャッフル出題」
  if(quizIndex >= quizOrder.length){
    quizOrder = shuffle([...data]); // 全問終わったら再シャッフル
    quizIndex = 0;
  }

  current = quizOrder[quizIndex];
  quizIndex++;

  document.getElementById("question").innerText = current.q;
  document.getElementById("result").innerHTML  = "";
  clearInputs();

  // 「次の問題」ボタンを隠し、答え合わせボタンを有効化
  const nextBtn  = document.getElementById("nextBtn");
  const checkBtn = document.getElementById("checkBtn");
  if(nextBtn)  nextBtn.classList.add("hidden");
  if(checkBtn) checkBtn.disabled = false;
}

/* 入力欄クリア＆有効化 */
function clearInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id => {
    let el = document.getElementById(id);
    if(!el) return;
    el.disabled = false;
    if(el.tagName === "SELECT"){
      el.selectedIndex = 0;
    }else{
      el.value = "";
    }
  });
}

/* 値取得 */
function v(id){
  return document.getElementById(id).value;
}
function n(id){
  const raw = document.getElementById(id).value.replace(/,/g,"");
  return Number(raw || 0);
}

/* 入力ロック */
function lockInputs(){
  ["d1","d2","c1","c2","dm1","dm2","cm1","cm2"].forEach(id => {
    let el = document.getElementById(id);
    if(el){
      el.disabled = true;
    }
  });
}

/* チェック（一問一回だけ有効） */
function check(){
  const checkBtn = document.getElementById("checkBtn");
  // どの科目も金額も入力されていない場合は採点しない
  if(
    !v("d1") && !v("d2") && !v("c1") && !v("c2") &&
    n("dm1") === 0 && n("dm2") === 0 && n("cm1") === 0 && n("cm2") === 0
  ){
    document.getElementById("result").innerHTML =
      "科目と金額を入力してください";
    checkBtn.disabled = false; // 再入力OKに戻す
    return;
  }

  if(checkBtn.disabled) return;    // 既に採点済みなら何もしない
  checkBtn.disabled = true;        // 連打防止

  if(!current) return;

  fieldStats[current.field].total++;

  let ansD = [
    {a:v("d1"), m:n("dm1")},
    {a:v("d2"), m:n("dm2")}
  ];
  let ansC = [
    {a:v("c1"), m:n("cm1")},
    {a:v("c2"), m:n("cm2")}
  ];
  let corD = [
    {a:current.d1, m:current.dm1},
    {a:current.d2, m:current.dm2}
  ];
  let corC = [
    {a:current.c1, m:current.cm1},
    {a:current.c2, m:current.cm2}
  ];

  // 借方・貸方合計チェック
  let debitSum  = ansD.reduce((s,x) => s + x.m, 0);
  let creditSum = ansC.reduce((s,x) => s + x.m, 0);
  if(debitSum !== creditSum){
    document.getElementById("result").innerHTML =
      "借方と貸方の金額が一致していません";
    return;
  }

  let ok = compare(ansD, corD) && compare(ansC, corC);
  const result = document.getElementById("result");

  if(ok){
    result.innerHTML = "〇 正解！";
    streak++;
    if(streak > bestStreak){
      bestStreak = streak;
      saveBestStreak();
    }
    fieldStats[current.field].correct++;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 正解時は1秒後に自動で次の問題へ
    autoNextTimer = setTimeout(() => {
      autoNextTimer = null;
      next();
    }, 1000);

  }else{
    let html =
      "× 不正解<br><br>" +
      "<b>正解</b>" +
      "<div class='answer-journal'>" +
        "<div class='answer-side'>" +
          "<b>借方</b><br>" +
          current.d1 + " " + current.dm1.toLocaleString() + "<br>" +
          (current.d2 ? current.d2 + " " + current.dm2.toLocaleString() : "") +
        "</div>" +
        "<div class='answer-side'>" +
          "<b>貸方</b><br>" +
          current.c1 + " " + current.cm1.toLocaleString() + "<br>" +
          (current.c2 ? current.c2 + " " + current.cm2.toLocaleString() : "") +
        "</div>" +
      "</div><br>" +
      "解説：" + (current.desc || "");

    result.innerHTML = html;

    // ストリークリセット
    streak = 0;
    updateStreakDisplay();

    lockInputs();
    showFieldStats();

    // 不正解時は「次の問題」ボタンを押すまで進まない
    const nextBtn = document.getElementById("nextBtn");
    if(nextBtn) nextBtn.classList.remove("hidden");
  }
}

/* 勘定科目＋金額の比較（順不同OK） */
function compare(a, b){
  a = a.filter(x => x.m > 0);
  b = b.filter(x => x.m > 0);
  if(a.length !== b.length) return false;
  return a.every(x => b.some(y => x.a === y.a && x.m === y.m));
}

/* 分野別正解率表示 */
function showFieldStats(){
  let html = "<br><b>分野別正解率</b><br>";
  for(let f in fieldStats){
    let s    = fieldStats[f];
    let rate = s.total ? Math.round(s.correct / s.total * 100) : 0;
    html += f + " : " + rate + "% (" + s.correct + "/" + s.total + ")<br>";
  }
  document.getElementById("result").innerHTML += html;
}

/* 問題シャッフル用 */
function shuffle(a){
  for(let i=a.length-1; i>0; i--){
    let j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}


</script>
</body>
</html>
