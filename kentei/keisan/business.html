<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../css/common.css">
<title>ビジネス計算検定</title>

<style>
/* ===========================================================
   ▼ ページ全体（既存の business.html + 改良）
=========================================================== */

/* 動画カード */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
  margin-top:15px;
}
.video-card{
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.25s;
}
.video-card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 22px rgba(0,0,0,0.18);
}
.video-title{
  padding:12px;
  font-size:14px;
  text-align:center;
}

/* ===========================================================
   ▼ タブ切り替えボタン
=========================================================== */
.biz-tab-buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:10px 0 20px;
}

/* アクティブタブを強調 */
.mode-btn.active{
  background:var(--main-green) !important;
  color:white !important;
  border:3px solid var(--main-green);
  box-shadow:0 0 10px rgba(46,139,87,0.45);
  transform:translateY(-2px);
}

/* 非アクティブのみホバー反応 */
.mode-btn:not(.active):hover{
  background:#f0fff4;
  border:2px solid var(--main-green);
}

/* ===========================================================
   ▼ 2カラムレイアウト（級選択＝左・分野選択＝右）
=========================================================== */
#bizSelectGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:15px;
}

#bizFieldArea{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.small-btn{
  font-size:14px;
  padding:6px 8px;
}

#bizLevelSelect{
  font-size:20px;
  padding:6px 8px;
  width:120px;
  border:2px solid var(--main-green);
  border-radius:6px;
}

/* ===========================================================
   ▼ 入力欄（単位プルダウンを大きく）
=========================================================== */
.biz-unit-select{
  width:140px;
  padding:10px;
  font-size:20px;
  border:3px solid #444;
  border-radius:6px;
}

/* ===========================================================
   ▼ 問題文の正解時アニメーション
=========================================================== */
.correct-anim{
  animation:popScale 0.45s ease-out;
}
@keyframes popScale{
  0%{ transform:scale(1); }
  40%{ transform:scale(1.25); }
  100%{ transform:scale(1); }
}

/* ===========================================================
   ▼ ステータスバー
=========================================================== */
#bizStatusBar{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  margin-bottom:10px;
  color:var(--dark-green);
}
</style>
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">ビジネス計算検定</h1>
      <div class="exam-title">解説動画 ＆ 練習問題</div>
    </div>
  </div>
</header>

<div class="card">

  <!-- ▼ 学習ガイド -->
  <div class="study-guide">
    <h3>ビジネス計算部門</h3>
    <ul>
      <li>20問出題</li>
      <li>70点以上で合格</li>
      <li>まずは 3級から順番に対策しよう！</li>
    </ul>
  </div>

  <!-- ▼ タブボタン -->
  <div class="biz-tab-buttons">
    <button id="btnBizTabVideo" class="mode-btn active" onclick="showBizTab('video')">解説動画</button>
    <button id="btnBizTabQuiz"  class="mode-btn" onclick="showBizTab('quiz')">練習問題</button>
  </div>


  <!-- ▼ ▼ ▼ 解説動画タブ ▼ ▼ ▼ -->
  <div id="bizVideoTab">

    <div style="text-align:center;margin-bottom:15px;color:#444;">
      ▶ をクリックすると、その級の動画が表示されます。<br>
      見たい動画をタップして学習しましょう。
    </div>

    <div id="videoArea"></div>
  </div>


  <!-- ▼ ▼ ▼ 練習問題タブ ▼ ▼ ▼ -->
  <div id="bizQuizTab" class="hidden">

    <hr>

    <h3>練習問題にチャレンジ</h3>

    <!-- ▼ 2カラム：左（級）・右（分野） -->
    <div id="bizSelectGrid">

      <!-- 左：級選択 -->
      <div>
        <h4>級を選択</h4>
        <select id="bizLevelSelect">
          <option value="3">3級</option>
          <option value="2">2級</option>
          <option value="1">1級</option>
        </select>
        <br><br>
        <button class="main-btn small-btn" onclick="setupBizFields()">分野を表示</button>
      </div>

      <!-- 右：分野選択 -->
      <div>
        <h4>分野を選択</h4>
        <div id="bizFieldArea"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <button class="control-btn small-btn" onclick="bizSelectAllFields()">全選択</button>
          <button class="control-btn small-btn" onclick="bizClearAllFields()">全解除</button>
        </div>

      </div>
    </div>

    <!-- ▼ この条件で開始 -->
    <div style="text-align:center;margin-top:15px;">
      <button class="main-btn" onclick="startBusinessQuiz()">この条件で開始</button>
    </div>


    <!-- ▼ ▼ ▼ クイズエリア ▼ ▼ ▼ -->
    <div id="bizQuizArea" class="hidden" style="margin-top:15px;">

      <!-- ▼ ステータス（第○問／正解数／連続正解／通算成績） -->
      <div id="bizStatusBar"></div>

      <!-- ▼ 問題文 -->
      <div id="bizQuestion" style="margin-bottom:10px;font-weight:bold;"></div>

      <!-- ▼ 単位＋数値（並び順はJSで制御） -->
      <div id="bizInputRow"
           style="display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:8px;">
        <select id="bizUnitSelect" class="biz-unit-select"></select>
        <input id="bizAnswerNumber" class="calc-input" inputmode="decimal">
      </div>

      <!-- ▼ ボタン -->
      <div style="text-align:center;margin-bottom:8px;">
        <button class="main-btn" onclick="checkBusinessAnswer()">答え合わせ</button>
        <button class="control-btn hidden" id="bizNextBtn" onclick="nextBusinessQuestion()">次の問題</button>
      </div>

      <!-- ▼ 結果表示 -->
      <div id="bizResult" style="min-height:40px;"></div>

    </div><!-- /bizQuizArea -->

  </div><!-- /bizQuizTab -->

  <!-- ▼ ポータル -->
  <a href="index.html" class="portal-btn exam-btn">部門選択へ戻る</a>
  <a href="../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

</div>

<script>

/* ===========================================================
   ▼ 1. 動画一覧の表示（既存）
=========================================================== */
fetch("url.csv")
  .then(res => res.text())
  .then(text => {
    const lines = text.trim().split("\n").slice(1);
    const videos = lines.map(l => {
      const p = l.split("\t");
      return { grade:p[0], title:p[1], url:p[2] };
    });
    createVideoCards(videos);
  });

function createVideoCards(videos){
  const area=document.getElementById("videoArea");
  const grades=["3","2","1"];

  grades.forEach(g=>{
    const list=videos.filter(v=>v.grade===g);

    const block=document.createElement("details");
    const summary=document.createElement("summary");
    summary.className="grade-title";
    summary.innerText=g+"級";
    block.appendChild(summary);

    const grid=document.createElement("div");
    grid.className="video-grid";

    list.forEach(v=>{
      const id=getYoutubeID(v.url);
      const card=document.createElement("div");
      card.className="video-card";
      card.innerHTML=`
        <a href="${v.url}" target="_blank">
          <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
          <div class="video-title">${v.title}</div>
        </a>
      `;
      grid.appendChild(card);
    });

    block.appendChild(grid);
    area.appendChild(block);
  });
}

function getYoutubeID(url){
  if(url.includes("youtu.be")) return url.split("/").pop();
  if(url.includes("watch?v=")) return url.split("v=")[1].split("&")[0];
  return "";
}


/* ===========================================================
   ▼ 2. タブ切り替え（動画／練習）
=========================================================== */
function showBizTab(tab){
  const video=document.getElementById("bizVideoTab");
  const quiz =document.getElementById("bizQuizTab");
  const bV=document.getElementById("btnBizTabVideo");
  const bQ=document.getElementById("btnBizTabQuiz");

  if(tab==="video"){
    video.classList.remove("hidden");
    quiz.classList.add("hidden");
    bV.classList.add("active");
    bQ.classList.remove("active");
  }else{
    video.classList.add("hidden");
    quiz.classList.remove("hidden");
    bV.classList.remove("active");
    bQ.classList.add("active");
  }
}


/* ===========================================================
   ▼ 3. CSV パース（ダブルクォート内にカンマ含む対応）
=========================================================== */
function parseBusinessCSV(text){
  text=text.replace(/^\uFEFF/,"");
  const rows=text.trim().split(/\r?\n/);
  const result=[];

  for(let i=1;i<rows.length;i++){
    const line=rows[i].trim();
    if(!line) continue;

    let cols=[], cur="", inQ=false;
    for(let c of line){
      if(c==='"'){ inQ=!inQ; continue; }
      if(c==="," && !inQ){ cols.push(cur); cur=""; }
      else cur+=c;
    }
    cols.push(cur);

    result.push({
      level : (cols[0]||"").trim(),
      field : (cols[1]||"").trim(),
      text  : (cols[2]||"").trim(),
      pos   : (cols[3]||"").trim(),
      units : (cols[4]||"").trim(),
      correctUnit : (cols[5]||"").trim(),
      answer: Number((cols[6]||"").trim()),
      desc  : (cols[7]||"").trim().replace(/\|/g,"\n")
    });
  }
  return result;
}


/* ===========================================================
   ▼ 4. 全角→半角
=========================================================== */
function normalizeNumber(str){
  return String(str)
    .replace(/[\uFF10-\uFF19]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/\uFF0D/g,"-")
    .replace(/\uFF0B/g,"+")
    .replace(/\uFF0E/g,".")
    .replace(/\uFF0C/g,",")
    .replace(/\s+/g,"")
    .trim();
}


/* ===========================================================
   ▼ 5. ビジネス計算データ読込
=========================================================== */
let bizQuestions=[];
fetch("data/business.csv")
  .then(res=>res.text())
  .then(text=>{ bizQuestions=parseBusinessCSV(text); });


/* ===========================================================
   ▼ 6. 分野生成（級を選んだら右側に表示）
=========================================================== */
function setupBizFields(){
  const level=document.getElementById("bizLevelSelect").value;
  const list=bizQuestions.filter(q=>q.level===level);
  const area=document.getElementById("bizFieldArea");

  if(list.length===0){
    alert(level+"級の問題がありません");
    return;
  }

  const fields=[...new Set(list.map(q=>q.field))];
  area.innerHTML="";

  fields.forEach(f=>{
    const lb=document.createElement("label");
    lb.innerHTML=`<input type="checkbox" value="${f}"> ${f}`;
    area.appendChild(lb);
  });
}

function bizSelectAllFields(){
  document.querySelectorAll("#bizFieldArea input").forEach(c=>c.checked=true);
}
function bizClearAllFields(){
  document.querySelectorAll("#bizFieldArea input").forEach(c=>c.checked=false);
}

function getBizSelectedFields(){
  return [...document.querySelectorAll("#bizFieldArea input:checked")]
          .map(c=>c.value);
}


/* ===========================================================
   ▼ 7. クイズ開始
=========================================================== */
let bizCurrentList=[], bizCurrentIndex=0, bizCurrentQ=null;
let bizCorrectCount=0, bizStreak=0;

function startBusinessQuiz(){
  const level=document.getElementById("bizLevelSelect").value;
  const fields=getBizSelectedFields();

  if(fields.length===0){
    alert("分野を選択してください");
    return;
  }

  const list=bizQuestions.filter(q=>q.level===level && fields.includes(q.field));

  if(list.length===0){
    alert("その条件の問題がありません");
    return;
  }

  bizCurrentList=shuffle([...list]);
  bizCurrentIndex=0;
  bizCorrectCount=0;
  bizStreak=0;

  document.getElementById("bizQuizArea").classList.remove("hidden");
  nextBusinessQuestion();
}


/* ===========================================================
   ▼ 8. ステータスバー表示
=========================================================== */
function updateBizStatus(){
  const now=bizCurrentIndex;
  const total=bizCurrentList.length;

  const keyS=`biz_bestStreak_${bizCurrentQ.level}`;
  const keyC=`biz_totalCorrect_${bizCurrentQ.level}`;
  const keyA=`biz_totalAnswered_${bizCurrentQ.level}`;

  const bestStreak=Number(localStorage.getItem(keyS)||0);
  const totalCorrect=Number(localStorage.getItem(keyC)||0);
  const totalAnswered=Number(localStorage.getItem(keyA)||0);

  document.getElementById("bizStatusBar").innerText=
    `第 ${now} 問 / 全 ${total} 問 ｜ 正解：${bizCorrectCount} ｜ 連続：${bizStreak}（最高 ${bestStreak}） ｜ 通算：${totalCorrect}/${totalAnswered}`;
}


/* ===========================================================
   ▼ 9. 次の問題
=========================================================== */
function nextBusinessQuestion(){
  if(bizCurrentIndex>=bizCurrentList.length){
    document.getElementById("bizResult").innerText="以上で終了です。";
    document.getElementById("bizNextBtn").classList.add("hidden");
    return;
  }
  bizCurrentQ=bizCurrentList[bizCurrentIndex++];
  showBusinessQuestion(bizCurrentQ);
}


/* ===========================================================
   ▼ 10. 問題文の表示
=========================================================== */
function showBusinessQuestion(q){
  document.getElementById("bizQuestion").innerText=q.text;

  const num=document.getElementById("bizAnswerNumber");
  const unit=document.getElementById("bizUnitSelect");
  const row=document.getElementById("bizInputRow");
  const result=document.getElementById("bizResult");

  num.value="";
  result.innerText="";
  document.getElementById("bizNextBtn").classList.add("hidden");

  unit.innerHTML="";
  q.units.split("|").map(u=>u.trim()).filter(u=>u).forEach(u=>{
    const opt=document.createElement("option");
    opt.value=u;
    opt.textContent=u;
    unit.appendChild(opt);
  });

  row.innerHTML="";
  if(q.pos==="1"){
    row.appendChild(unit);
    row.appendChild(num);
  }else{
    row.appendChild(num);
    row.appendChild(unit);
  }

  /* カンマ補助 */
  num.oninput = () => {
    let raw = num.value;

    // ▼ 小数入力途中（末尾が "."）ならそのまま許可
    if(raw.endsWith(".")){
      return;
    }

    // ▼ 小数点ありの場合（例：12.5）
    if(/^\d+(\.\d+)?$/.test(raw.replace(/,/g,""))){
      let parts = raw.replace(/,/g,"").split(".");

      // 整数部分にだけコンマ付与
      parts[0] = Number(parts[0]).toLocaleString();

      num.value = parts.join(".");
      return;
    }

    // ▼ それ以外の異常な文字は除去
    num.value = raw.replace(/[^\d\.,]/g, "");
  };

  updateBizStatus();
}


/* ===========================================================
   ▼ 11. 答え合わせ
=========================================================== */
function checkBusinessAnswer(){
  if(!bizCurrentQ) return;

  const raw=document.getElementById("bizAnswerNumber").value;
  const unit=document.getElementById("bizUnitSelect").value;
  const result=document.getElementById("bizResult");

  if(!raw){
    alert("答えを入力してください。");
    return;
  }

  const normalized=normalizeNumber(raw);

  if(!/^\d{1,3}(,\d{3})*(\.\d+)?$/.test(normalized)){
    result.innerText="コンマで3桁区切りにしてください。";
    return;
  }

  const userValue=normalized.replace(/,/g,"");
  const correctValue=String(bizCurrentQ.answer);
  const correctUnit=bizCurrentQ.correctUnit;

  const keyS=`biz_bestStreak_${bizCurrentQ.level}`;
  const keyC=`biz_totalCorrect_${bizCurrentQ.level}`;
  const keyA=`biz_totalAnswered_${bizCurrentQ.level}`;

  let bestStreak=Number(localStorage.getItem(keyS)||0);
  let totalCorrect=Number(localStorage.getItem(keyC)||0);
  let totalAnswered=Number(localStorage.getItem(keyA)||0);

  const ok=(userValue===correctValue)&&(unit===correctUnit);

  const descHtml=(bizCurrentQ.desc||"").replace(/\n/g,"<br>");

  if(ok){
    result.innerHTML=`〇 正解！<br><br>${descHtml}`;

    /* ▼ 正解アニメーション */
    const qElem=document.getElementById("bizQuestion");
    qElem.classList.remove("correct-anim");
    void qElem.offsetWidth;
    qElem.classList.add("correct-anim");

    bizCorrectCount++;
    bizStreak++;
    totalCorrect++;
    bestStreak=Math.max(bestStreak,bizStreak);

  }else{
    bizStreak=0;
    result.innerHTML=
      `× 不正解<br>正解：${
        bizCurrentQ.pos==="1"
          ? correctUnit+Number(correctValue).toLocaleString()
          : Number(correctValue).toLocaleString()+correctUnit
      }<br><br>解説：${descHtml}`;
  }

  totalAnswered++;

  /* 保存 */
  localStorage.setItem(keyS,bestStreak);
  localStorage.setItem(keyC,totalCorrect);
  localStorage.setItem(keyA,totalAnswered);

  updateBizStatus();

  document.getElementById("bizNextBtn").classList.remove("hidden");
}


/* ===========================================================
   ▼ 12. シャッフル
=========================================================== */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

</script>

</body>
</html>
