<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理検定3級 計算問題</title>

<style>
body{
font-family: sans-serif;
text-align:center;
margin:40px;
}

#question{
font-size:28px;
margin:30px;
}

input{
font-size:22px;
padding:5px;
width:150px;
text-align:center;
}

button{
font-size:18px;
padding:8px 16px;
margin:8px;
}

#result{
font-size:22px;
margin-top:20px;
font-weight:bold;
}

#hint,#explain{
margin-top:20px;
display:none;
}

.portal{
position:fixed;
right:20px;
bottom:20px;
}

</style>
</head>

<body>

<h1>情報処理検定3級 計算問題</h1>

<div id="question"></div>

<input id="answer" type="text" placeholder="半角数字">

<br>

<button onclick="check()">答え合わせ</button>
<button onclick="showHint()">ヒント</button>
<button onclick="nextQuestion()">次の問題</button>

<div id="result"></div>

<div id="hint"></div>
<div id="explain"></div>

<div class="portal">
<button onclick="location.href='index.html'">ポータルへ戻る</button>
</div>

<script>

let correctAnswer;
let type;
let value;

function nextQuestion(){

document.getElementById("result").innerHTML="";
document.getElementById("hint").style.display="none";
document.getElementById("explain").style.display="none";
document.getElementById("answer").value="";

type=Math.random()<0.5 ? "binToDec":"decToBin";

if(type==="binToDec"){

let digits=Math.floor(Math.random()*5)+3; 
let bin="";

for(let i=0;i<digits;i++){
bin+=Math.floor(Math.random()*2);
}

bin=bin.replace(/^0+/,'1');

value=parseInt(bin,2);

document.getElementById("question").innerHTML=
bin+" (2進数) を10進数に変換しなさい";

correctAnswer=value;

document.getElementById("hint").innerHTML=
"ヒント：2進数は各けたに 1,2,4,8,16,32... の重みがあります。";

document.getElementById("explain").innerHTML=
"解説：<br>"+
bin+" = "+value+"<br>"+
"各桁の重みを足して計算します。";

}else{

value=Math.floor(Math.random()*100)+13;

document.getElementById("question").innerHTML=
value+" (10進数) を2進数に変換しなさい";

correctAnswer=value.toString(2);

document.getElementById("hint").innerHTML=
"ヒント：2で割り続けて余りを下から並べます。";

document.getElementById("explain").innerHTML=
"解説：<br>"+
value+" = "+correctAnswer+" (2進数)";
}

}

function check(){

let user=document.getElementById("answer").value;

if(user==correctAnswer){

document.getElementById("result").innerHTML="〇 正解！";
document.getElementById("explain").style.display="block";

}else{

document.getElementById("result").innerHTML=
"× 不正解。ヒントを見てみましょう。";

}

}

function showHint(){

document.getElementById("hint").style.display="block";

}

nextQuestion();

</script>

</body>
</html>
