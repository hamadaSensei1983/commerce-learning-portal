<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 損益計算書トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
.card{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
.hidden{ display:none !important; }

#controlBar{
  text-align:center;
  margin-bottom:10px;
}
#problemSelect{
  padding:8px;
  font-size:16px;
  border-radius:8px;
  border:2px solid var(--main-green);
}

.section-title{
  margin-top:12px;
  margin-bottom:6px;
  padding-left:8px;
  border-left:4px solid #e53935;
  font-size:15px;
  font-weight:bold;
}

/* 残高試算表 */
.balance-grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:6px 18px;
  max-width:1100px;
  margin:0 auto;
  border:2px solid #ffd0d0;
  border-radius:10px;
  padding:12px;
  background:#fffdfd;
}
.bal-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px dotted #ddd;
  padding:4px 0;
  font-size:14px;
}

/* ===== 決算整理仕訳入力エリア（seisan2.html と同一） ===== */
.adj-wrap{
  border:2px solid #d8ead8;
  background:#f9fdf9;
  border-radius:10px;
  padding:10px;
  max-width:900px;
  margin:0 auto;
}
.note-block{
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  padding:8px;
  margin:8px 0;
}
.note-q{
  font-weight:bold;
  margin-bottom:8px;
  white-space:pre-line;
}

/* 左右仕訳入力 */
.jrnl{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:8px;
}
.jrnl-side{
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
}
.jrnl-title{
  font-size:11px;
  padding:1px 0;
  margin-bottom:4px;
  line-height:1.0;
}
.jrnl-row{
  display:grid;
  grid-template-columns:1fr 95px;
  gap:6px;
  margin:3px 0;
}
.jrnl-row select{
  width:100%;
  min-width:0;
}
.jrnl-row input{
  width:95px;
  text-align:right;
}
.jrnl-row select,
.jrnl-row input{
  padding:3px 4px;
  font-size:12.5px;
  height:28px;
  box-sizing:border-box;
}

/* 採点表示 */
.note-block.ok{
  border:2px solid #2e7d32 !important;
  background:#e8f5e9;
}
.note-block.ng{
  border:2px solid #c62828 !important;
  background:#ffebee;
}

/* PL */
table.pl-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:14px;
  max-width:920px;
  margin:0 auto;
}
table.pl-table th, table.pl-table td{
  border:1px solid #e53935;
  padding:6px;
}
table.pl-table th{ background:#ffebee; text-align:center; }
table.pl-table td{ text-align:right; }
table.pl-table td.name{ text-align:left; }

/* PL用 金額入力をコンパクトに */
table.pl-table input.money{
  width:110px;
  max-width:110px;
}

.money{
  width:100%;
  text-align:right;
}

.wrong{ outline:3px solid #e53935; }
.praise{
  background:#e8f5e9;
  border:2px solid #66bb6a;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
}

/* 仕訳操作ボタン（2列） */
.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  max-width:400px;
  margin:10px auto;
}

</style>
</head>

<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記2級 損益計算書トレーニング</div>
    </div>
  </div>
</header>

<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">読み込み中...</p>
  </div>
</div>

<div class="card hidden" id="mainCard">
  <div id="controlBar">
    <select id="problemSelect"></select>
    <button class="main-btn" style="width:auto" onclick="start()">開始</button>
  </div>

  <div id="workArea" class="hidden">

    <h2>下記の決算整理仕訳を示しなさい。</h2>
    <div id="adjInputArea"></div>

    <div class="action-row">
      <button class="main-btn" onclick="gradeAdjustments()">仕訳採点</button>
      <button class="control-btn" onclick="giveUp()">ギブアップ</button>
    </div>

    <div class="section-title">残高試算表</div>
    <div id="tbBalanceList" class="balance-grid"></div>

    <div class="section-title">損益計算書</div>
    <table class="pl-table">
      <thead>
        <tr>
          <th colspan="2">費用（借方）</th>
          <th colspan="2">収益（貸方）</th>
        </tr>
      </thead>
      <tbody id="plWorksheetBody"></tbody>
    </table>

    <div id="plCheckWrap" class="hidden" style="text-align:center;margin-top:10px;">
      <button class="control-btn" onclick="checkPLWorksheet()">答え合わせ</button>
    </div>

    <p id="result"></p>
  </div>
</div>

<a href="index.html" class="portal-btn grade3-btn">２級トップ</a>
<a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
<a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>

<script>
/* =========================================================
  pl2.html（損益計算書専用）
  - ローディング1秒
  - 起動直後：問題選択＋開始のみ
  - 開始：決算整理仕訳 + 仕訳採点/ギブアップ + 残高試算表(4列) + 整理前PL(表示)
  - 仕訳全問正解：整理後PL(入力)へ再描画 + 答え合わせ
  - ギブアップ：正解を入力してPhase2へ（メッセージは別）
  - 候補/正解は半角 | 区切り（候補：|、仕訳行：|）
========================================================= */

let TB = [];
let SEIRI = [];
let MAP = [];                 // {acct, cls, label}
let problemIds = [];
let currentId = null;

let baseAccounts = [];
let extraAccounts = new Set();

let phase = 0;                // 0: INIT, 1: Phase1（仕訳入力+整理前PL）, 2: Phase2（整理後PL入力）
let acctClass = {};           // acct -> 分類
let acctLabel = {};           // acct -> 表示名（任意）
let currentAdjMap = null;

const loadStartTime = Date.now();

/* ---------- CSV ---------- */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = [];
  let row = [], cur = "", inQ = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === "," && !inQ){ row.push(cur); cur=""; continue; }

    if((c === "\n" || c === "\r") && !inQ){
      if(c === "\r" && text[i+1] === "\n") i++;
      row.push(cur);
      if(row.join("").trim() !== "") out.push(row);
      row=[]; cur="";
      continue;
    }
    cur += c;
  }
  row.push(cur);
  if(row.join("").trim() !== "") out.push(row);
  return out;
}

function num(v){
  const s = String(v ?? "").replace(/,/g,"").trim();
  if(s === "") return 0;
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}
function fmt(n){ return n ? Number(n).toLocaleString() : ""; }

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeText(s){
  return String(s ?? "")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/\\/g,"\n")
    .trim();
}

/* 候補：半角 | 区切り */
function splitCandidates(s){
  return String(s ?? "")
    .split("|")
    .map(x => x.trim())
    .filter(Boolean);
}

/* 正解仕訳：半角 | が行区切り、; が借貸区切り、科目:金額 */
function parseAnswerRaw(raw){
  raw = String(raw ?? "").trim();
  const parts = raw.split(";");
  const dPart = (parts[0] ?? "").trim();
  const cPart = (parts[1] ?? "").trim();

  function parseSide(str){
    if(!str) return [];
    return str
      .split("|") // ★行区切り
      .map(x => x.trim())
      .filter(Boolean)
      .map(line => {
        const [a,m] = line.split(":").map(z=>z.trim());
        return { acct: a, amt: num(m) };
      })
      .filter(x => x.acct && x.amt >= 0);
  }

  return { D: parseSide(dPart), C: parseSide(cPart) };
}

/* =========================================================
  UI初期化
========================================================= */
function setupProblemSelect(){
  const sel = document.getElementById("problemSelect");
  sel.innerHTML = "";
  problemIds.forEach(id=>{
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = "問題 " + id;
    sel.appendChild(opt);
  });

  currentId = problemIds[0] ?? null;

  sel.onchange = ()=>{
    currentId = sel.value;
    resetView();
  };
}

function resetView(){
  phase = 0;
  currentAdjMap = null;
  extraAccounts = new Set();

  document.getElementById("workArea")?.classList.add("hidden");
  document.getElementById("adjInputArea").innerHTML = "";
  document.getElementById("tbBalanceList").innerHTML = "";
  document.getElementById("plWorksheetBody").innerHTML = "";
  document.getElementById("plCheckWrap")?.classList.add("hidden");

  const res = document.getElementById("result");
  if(res){
    res.className = "";
    res.textContent = "";
  }

  // 仕訳ブロック色解除
  document.querySelectorAll(".note-block").forEach(b=>b.classList.remove("ok","ng"));
}

/* =========================================================
  開始（Phase1）
========================================================= */
function start(){
  if(!currentId) return;

  phase = 1;
  currentAdjMap = null;

  document.getElementById("workArea")?.classList.remove("hidden");
  document.getElementById("plCheckWrap")?.classList.add("hidden");

  // 対象問題TB
  const tbRows = TB.filter(x=>x.id===currentId);
  baseAccounts = tbRows.map(x=>x.acct);
  extraAccounts = new Set();

  buildAcctDictionaries();

  // 仕訳入力
  renderAdjInputs();

  // 残高試算表（4列）
  renderTBBalanceList();

  // 整理前PL（表示）
  renderPLBefore();

  const res = document.getElementById("result");
  if(res){
    res.className = "";
    res.textContent = "";
  }
}

/* TB＋mapから分類辞書作成 */
function buildAcctDictionaries(){
  acctClass = {};
  acctLabel = {};

  TB.filter(r=>r.id===currentId).forEach(r=>{
    acctClass[r.acct] = r.cls;
    acctLabel[r.acct] = r.acct;
  });

  MAP.forEach(m=>{
    if(!acctClass[m.acct]) acctClass[m.acct] = m.cls;
    if(m.label) acctLabel[m.acct] = m.label;
  });
}

/* =========================================================
  残高試算表（4列表示）
========================================================= */
function renderTBBalanceList(){
  const area = document.getElementById("tbBalanceList");
  if(!area) return;
  area.innerHTML = "";

  TB.filter(r=>r.id===currentId).forEach(r=>{
    const net = r.debit - r.credit;
    const amt = Math.abs(net);
    if(amt === 0) return;

    const div = document.createElement("div");
    div.className = "bal-item";
    div.innerHTML =
      `<span class="bal-name">${escapeHtml(r.acct)}</span>` +
      `<span class="bal-amt">${fmt(amt)}</span>`;
    area.appendChild(div);
  });
}

/* =========================================================
  決算整理仕訳入力（左右）
========================================================= */
function renderAdjInputs(){
  const area = document.getElementById("adjInputArea");
  area.innerHTML = "";

  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc = "abcdefghijklmnopqrstuvwxyz";

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    const block = document.createElement("div");
    block.className = "note-block";
    block.dataset.noteIndex = String(idx);

    const q = document.createElement("div");
    q.className = "note-q";
    q.textContent = `${abc[idx]}. ${normalizeText(n.q)}`;
    block.appendChild(q);

    const jrnl = document.createElement("div");
    jrnl.className = "jrnl";
    jrnl.innerHTML = `
      <div class="jrnl-side">
        <div class="jrnl-title">借方</div>
        <div id="dBox_${idx}"></div>
      </div>
      <div class="jrnl-side">
        <div class="jrnl-title">貸方</div>
        <div id="cBox_${idx}"></div>
      </div>
    `;
    block.appendChild(jrnl);
    area.appendChild(block);

    buildSideRows(idx, "D", n.candidates, rowCount);
    buildSideRows(idx, "C", n.candidates, rowCount);
  });
}

function buildSideRows(noteIndex, side, candidates, rowCount){
  const box = document.getElementById(`${side==="D" ? "dBox" : "cBox"}_${noteIndex}`);
  box.innerHTML = "";

  const optHtml = (candidates ?? [])
    .map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`)
    .join("");

  for(let r=0;r<rowCount;r++){
    const row = document.createElement("div");
    row.className = "jrnl-row";
    row.innerHTML = `
      <select id="${side}acct_${noteIndex}_${r}">
        <option value=""></option>
        ${optHtml}
      </select>
      <input id="${side}amt_${noteIndex}_${r}" class="money" inputmode="numeric">
    `;
    box.appendChild(row);
  }
}

function collectUser(noteIndex, rowCount){
  const D=[], C=[];
  for(let r=0;r<rowCount;r++){
    const da=(document.getElementById(`Dacct_${noteIndex}_${r}`)?.value ?? "").trim();
    const dm=num(document.getElementById(`Damt_${noteIndex}_${r}`)?.value);
    const ca=(document.getElementById(`Cacct_${noteIndex}_${r}`)?.value ?? "").trim();
    const cm=num(document.getElementById(`Camt_${noteIndex}_${r}`)?.value);

    if(da && dm>0) D.push({acct:da, amt:dm});
    if(ca && cm>0) C.push({acct:ca, amt:cm});
  }
  return {D,C};
}

/* マルチセット一致 */
function ms(list){
  const m = new Map();
  list.forEach(x=>{
    const k = x.acct + "\n" + x.amt;
    m.set(k, (m.get(k) ?? 0) + 1);
  });
  return m;
}
function equalMulti(a,b){
  const A=ms(a), B=ms(b);
  if(A.size !== B.size) return false;
  for(const [k,v] of A) if(B.get(k) !== v) return false;
  return true;
}
function markBlock(noteIndex, ok){
  const blocks = document.querySelectorAll(".note-block");
  const b = blocks[noteIndex];
  if(!b) return;
  b.classList.remove("ok","ng");
  b.classList.add(ok ? "ok" : "ng");
}
function lockAdjustmentInputs(){
  document.querySelectorAll("#adjInputArea select, #adjInputArea input").forEach(el=>el.disabled=true);
}

/* =========================================================
  Phase1：仕訳採点 → 正解なら Phase2（整理後PL入力）
========================================================= */
function gradeAdjustments(fromGiveUp=false){
  if(phase !== 1) return;

  const notes = SEIRI.filter(x=>x.id===currentId);
  let allOk = true;

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);
    const user = collectUser(idx, rowCount);

    const ok = equalMulti(user.D, correct.D) && equalMulti(user.C, correct.C);
    markBlock(idx, ok);
    if(!ok) allOk = false;
  });

  const res = document.getElementById("result");
  if(!allOk){
    if(res){
      res.className = "";
      res.textContent = "× 仕訳に誤りがあります。赤枠の箇所を見直して、もう一度「仕訳採点」を押してください。";
    }
    return;
  }

  // 正解 → 整理記入を作成してPhase2へ
  currentAdjMap = buildAdjMapFromInputs();
  phase = 2;

  if(fromGiveUp){
    alert("📌 決算整理仕訳の正解を表示しました。\nこの仕訳をもとにして、損益計算書は自力で解いてみましょう！");
  }else{
    alert("✅ 決算整理仕訳はすべて正解です！\n\n整理記入を反映した損益計算書に進みます。");
  }

  lockAdjustmentInputs();

  // 残高試算表はそのまま表示（必要なら「整理後残高一覧」を別表示に拡張可）
  // Phase2：整理後PL（入力）
  renderPLAfter();

  // 答え合わせボタンを表示
  document.getElementById("plCheckWrap")?.classList.remove("hidden");

  if(res){
    res.className = "";
    res.textContent = "〇 仕訳は全て正解です。次は「決算整理後の損益計算書」を完成させて、答え合わせを押しましょう。";
  }

  warnUnknownExtraAccounts();
}

/* ギブアップ：正解を入力して Phase2 */
function giveUp(){
  if(phase !== 1) return;

  const ok = confirm("ギブアップすると、決算整理仕訳に正解を入力して次のフェーズへ進みます。\nよろしいですか？");
  if(!ok) return;

  const notes = SEIRI.filter(x=>x.id===currentId);

  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const d = correct.D[r];
      const da = document.getElementById(`Dacct_${idx}_${r}`);
      const dm = document.getElementById(`Damt_${idx}_${r}`);
      if(da) da.value = d ? d.acct : "";
      if(dm) dm.value = d ? fmt(d.amt) : "";
    }
    for(let r=0;r<rowCount;r++){
      const c = correct.C[r];
      const ca = document.getElementById(`Cacct_${idx}_${r}`);
      const cm = document.getElementById(`Camt_${idx}_${r}`);
      if(ca) ca.value = c ? c.acct : "";
      if(cm) cm.value = c ? fmt(c.amt) : "";
    }
  });

  gradeAdjustments(true);
}

/* 整理記入map */
function buildAdjMapFromInputs(){
  const adjMap = {};
  const ensure = a => { if(!adjMap[a]) adjMap[a] = {d:0, c:0}; };

  const notes = SEIRI.filter(x=>x.id===currentId);
  notes.forEach((n, idx)=>{
    const correct = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(correct.D.length, correct.C.length, 1);

    for(let r=0;r<rowCount;r++){
      const da=(document.getElementById(`Dacct_${idx}_${r}`)?.value ?? "").trim();
      const dm=num(document.getElementById(`Damt_${idx}_${r}`)?.value);
      const ca=(document.getElementById(`Cacct_${idx}_${r}`)?.value ?? "").trim();
      const cm=num(document.getElementById(`Camt_${idx}_${r}`)?.value);

      if(da && dm>0){
        ensure(da); adjMap[da].d += dm;
        if(!baseAccounts.includes(da)) extraAccounts.add(da);
      }
      if(ca && cm>0){
        ensure(ca); adjMap[ca].c += cm;
        if(!baseAccounts.includes(ca)) extraAccounts.add(ca);
      }
    }
  });

  // 新規科目の分類補完
  [...extraAccounts].forEach(a=>{
    if(!acctClass[a]){
      const m = MAP.find(x=>x.acct===a);
      if(m) acctClass[a] = m.cls;
    }
    if(!acctLabel[a]) acctLabel[a] = a;
  });

  return adjMap;
}

function warnUnknownExtraAccounts(){
  const unknown = [...extraAccounts].filter(a=>!acctClass[a]);
  if(unknown.length===0) return;

  const res = document.getElementById("result");
  if(res){
    res.textContent +=
      `\n※注意：分類が不明な新規科目があり、PLに表示できない可能性があります：${unknown.join("、")}\n（seisan2_map.csv に分類を追加してください）`;
  }
}

/* =========================================================
  PL描画（整理前 / 整理後）
========================================================= */

/* 整理後残高（借-貸 + 整理借-整理貸） */
function adjustedNetForPL(acct){
  const tb = TB.find(x=>x.id===currentId && x.acct===acct);
  const base = tb ? (tb.debit - tb.credit) : 0;
  const adj = currentAdjMap?.[acct] ?? {d:0, c:0};
  return base + (adj.d - adj.c);
}

/* 表示名：PLのみ売上/仕入を変換（必要なら拡張） */
function displayNamePL(acct){
  if(acct === "売上") return "売上高";
  if(acct === "仕入") return "売上原価";
  return acctLabel[acct] || acct;
}

/* PLの並び順：TB.csv順 + 新規科目 */
function orderedAccounts(){
  const ordered = TB.filter(r=>r.id===currentId).map(r=>r.acct);
  [...extraAccounts].forEach(a=>{ if(!ordered.includes(a)) ordered.push(a); });
  return ordered;
}

/* Phase1：整理前PL（表示専用） */
function renderPLBefore(){
  const body = document.getElementById("plWorksheetBody");
  if(!body) return;
  body.innerHTML = "";

  const ordered = orderedAccounts();
  const expenses = ordered.filter(a=>acctClass[a]==="費用");
  const revenues = ordered.filter(a=>acctClass[a]==="収益");
  const rows = Math.max(expenses.length, revenues.length, 1);

  for(let i=0;i<rows;i++){
    const e = expenses[i];
    const r = revenues[i];

    const eAmt = e ? (TB.find(x=>x.id===currentId && x.acct===e)?.debit ?? 0) : 0;
    const rAmt = r ? (TB.find(x=>x.id===currentId && x.acct===r)?.credit ?? 0) : 0;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="name">${e ? escapeHtml(displayNamePL(e)) : ""}</td>
      <td>${eAmt ? fmt(eAmt) : ""}</td>
      <td class="name">${r ? escapeHtml(displayNamePL(r)) : ""}</td>
      <td>${rAmt ? fmt(rAmt) : ""}</td>
    `;
    body.appendChild(tr);
  }

  // ✅ Phase1では「当期純利益・合計」は表示しない
}

/* Phase2：整理後PL（入力） */
function renderPLAfter(){
  const body = document.getElementById("plWorksheetBody");
  if(!body) return;
  body.innerHTML = "";

  const ordered = orderedAccounts();
  const expenses = ordered.filter(a=>acctClass[a]==="費用");
  const revenues = ordered.filter(a=>acctClass[a]==="収益");
  const rows = Math.max(expenses.length, revenues.length, 1);

  for(let i=0;i<rows;i++){
    const e = expenses[i];
    const r = revenues[i];

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="name">${e ? escapeHtml(displayNamePL(e)) : ""}</td>
      <td>${e ? `<input class="money" data-role="pl" data-acct="${escapeHtml(e)}" data-kind="expense" inputmode="numeric">` : ""}</td>
      <td class="name">${r ? escapeHtml(displayNamePL(r)) : ""}</td>
      <td>${r ? `<input class="money" data-role="pl" data-acct="${escapeHtml(r)}" data-kind="revenue" inputmode="numeric">` : ""}</td>
    `;
    body.appendChild(tr);
  }

  const trNI = document.createElement("tr");
  trNI.innerHTML = `
    <td class="name">当期純利益（または純損失）</td>
    <td><input class="money" id="plNI_left" inputmode="numeric"></td>
    <td class="name">当期純利益（または純損失）</td>
    <td><input class="money" id="plNI_right" inputmode="numeric"></td>
  `;
  body.appendChild(trNI);

const trTot = document.createElement("tr");
trTot.innerHTML = `
  <td class="name" style="text-align:right;font-weight:bold;">合計</td>
  <td><input class="money" id="plTotalLeft" inputmode="numeric"></td>
  <td class="name" style="text-align:right;font-weight:bold;">合計</td>
  <td><input class="money" id="plTotalRight" inputmode="numeric"></td>
`;
body.appendChild(trTot);
}

/* =========================================================
  Phase2：PL答え合わせ（赤枠＋褒め）
========================================================= */
function clearWrong(){
  document.querySelectorAll("input.wrong").forEach(x=>x.classList.remove("wrong"));
}

function checkPLWorksheet(){
  if(phase !== 2) return;
  clearWrong();

  const inputs = [...document.querySelectorAll('input[data-role="pl"]')];
  let allOk = true;

  let expE = 0, expR = 0;

  inputs.forEach(inp=>{
    const acct = inp.dataset.acct;
    const kind = inp.dataset.kind;
    const v = num(inp.value);
    const exp = Math.abs(adjustedNetForPL(acct));

    if(v !== exp){
      inp.classList.add("wrong");
      allOk = false;
    }
    if(kind==="expense") expE += exp;
    if(kind==="revenue") expR += exp;
  });

  // 当期純利益（収益-費用）
  const net = expR - expE;
  const expectedNI = Math.abs(net);

  const left = document.getElementById("plNI_left");
  const right = document.getElementById("plNI_right");

  function filled(el){ return el && String(el.value).trim() !== ""; }

  if(net > 0){
    if(num(left.value) !== expectedNI){ left.classList.add("wrong"); allOk=false; }
    if(filled(right)){ right.classList.add("wrong"); allOk=false; }
  }else if(net < 0){
    if(num(right.value) !== expectedNI){ right.classList.add("wrong"); allOk=false; }
    if(filled(left)){ left.classList.add("wrong"); allOk=false; }
  }else{
    if(filled(left)){ left.classList.add("wrong"); allOk=false; }
    if(filled(right)){ right.classList.add("wrong"); allOk=false; }
  }

  // === 合計金額の判定 ===
  const plTotalLeft  = document.getElementById("plTotalLeft");
  const plTotalRight = document.getElementById("plTotalRight");

  // 期待合計
  const expectedLeftTotal  = expE + (net > 0 ? expectedNI : 0);
  const expectedRightTotal = expR + (net < 0 ? expectedNI : 0);

  function checkTotal(el, expected){
    if(!el) return;
    if(num(el.value) !== expected){
      el.classList.add("wrong");
      allOk = false;
    }
  }

  checkTotal(plTotalLeft,  expectedLeftTotal);
  checkTotal(plTotalRight, expectedRightTotal);

  const res = document.getElementById("result");
  if(!res) return;

  if(allOk){
    res.className = "praise";
    res.innerHTML =
      "🎉 損益計算書、全問正解！！ 🎉<br>" +
      "決算整理の影響まで理解できています。最高です！";
  }else{
    res.className = "";
    res.textContent =
      "× 間違いがあります。赤枠の欄を見直しましょう。\n" +
      "ポイント：費用は左（借方）、収益は右（貸方）。当期純利益（損失）で左右が一致します。";
  }
}

/* =========================================================
  カンマ補助（money入力）
========================================================= */
document.addEventListener("input", (e)=>{
  const t = e.target;
  if(!t || !t.classList) return;
  if(!t.classList.contains("money")) return;

  const raw = t.value.replace(/,/g,"");
  if(raw === "" || isNaN(raw)) return;
  t.value = Number(raw).toLocaleString();
});

/* =========================================================
  CSV読込（../data固定）＋ローディング最低1秒
  ※現状は seisan2 と同じ CSV を使う前提（必要ならファイル名だけ変えてOK）
========================================================= */
(async function initAll(){
  try{
    const [tbText, seiriText, mapText] = await Promise.all([
      fetch("../data/seisan2_TB.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_TB.csv が見つかりません"); return r.text(); }),
      fetch("../data/seisan2_seiri.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_seiri.csv が見つかりません"); return r.text(); }),
      fetch("../data/seisan2_map.csv").then(r=>{ if(!r.ok) throw new Error("seisan2_map.csv が見つかりません"); return r.text(); })
    ]);

    TB = parseCSV(tbText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]??"").trim(),
        acct:(c[1]??"").trim(),
        cls:(c[2]??"").trim(),
        debit:num(c[3]),
        credit:num(c[4])
      }));

    SEIRI = parseCSV(seiriText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        id:(c[0]??"").trim(),
        q:(c[1]??"").trim(),
        candidates: splitCandidates(c[2]??""),
        answerRaw:(c[3]??"").trim()
      }));

    MAP = parseCSV(mapText).slice(1)
      .filter(r=>r.join("").trim()!=="")
      .map(c=>({
        acct:(c[0]??"").trim(),
        cls:(c[1]??"").trim(),
        label:(c[2]??"").trim()
      }));

    problemIds = [...new Set(TB.map(x=>x.id))].sort();
    setupProblemSelect();
    resetView();

  }catch(e){
    console.error(e);
    alert("CSV読み込みエラー：" + (e.message ?? e));
  }finally{
    const elapsed = Date.now() - loadStartTime;
    const remain = 1000 - elapsed;

    const show = ()=>{
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainCard").classList.remove("hidden");
    };

    if(remain > 0) setTimeout(show, remain);
    else show();
  }
})();
</script>
