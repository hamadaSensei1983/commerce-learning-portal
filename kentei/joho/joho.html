<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>情報処理検定 用語問題</title>
  <link rel="stylesheet" href="../../css/common.css">
</head>
<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title" id="examLevel"></div>
    </div>
  </div>
</header>

<!-- =====================
  ローディング画面
===================== -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold">
      問題を読み込み中...
    </p>
  </div>
</div>

<!-- =====================
  初期設定画面
===================== -->
<div class="card hidden" id="setupArea">
  <h3>生徒名</h3>
  <input id="studentNameInput" style="width:100%;padding:8px">
  <button class="control-btn" onclick="saveStudent()">保存</button>
  <div id="studentStats"></div>

  <h3>分野選択</h3>
  <div id="fieldArea" class="field-grid"></div>
  <button class="control-btn" onclick="selectAll()">全選択</button>
  <button class="control-btn" onclick="clearAll()">全解除</button>

  <h3>モード選択</h3>
  <select id="modeSelect" style="width:100%;padding:10px">
    <option value="normal">通常モード</option>
    <option value="challenge">チャレンジモード</option>
    <option value="review">復習モード</option>
    <option value="study">学習モード</option>
  </select>
  <div id="modeDescription"></div>
  <button class="main-btn" onclick="startQuiz()">開始</button>

  <h3>弱点ランキング</h3>
  <div id="weakRanking"></div>

  <h3>分野別正答率</h3>
  <div id="fieldRates"></div>
</div>

<!-- =====================
  クイズ画面
===================== -->
<div class="card hidden" id="quizArea">
  <div class="progress-wrapper">
    <div id="progressText"></div>
    <div class="progress-bar">
      <div id="progressBar" class="progress-bar-fill"></div>
    </div>
  </div>

  <h3 id="question"></h3>

  <!-- 連続正解数表示 -->
  <p id="streakInfo" style="text-align:center;font-weight:bold;margin-bottom:8px;">
    連続正解数：0問
  </p>

  <div id="choices"></div>
  <p id="result"></p>
  <button id="nextBtn" class="main-btn hidden" onclick="nextQuestion()">次へ</button>
</div>

<!-- =====================
  結果画面
===================== -->
<div class="card hidden" id="resultArea">
  <h2>結果</h2>
  <p id="scoreText"></p>
  <p id="rateText"></p>
  <p id="rankText"></p>
  <button class="main-btn" onclick="location.reload()">もう一度</button>
  <button class="control-btn" onclick="retryWrong()">復習する</button>
  <button class="control-btn" onclick="backToSetup()">分野選択に戻る</button>
</div>

<!-- =====================
  学習モード
===================== -->
<div class="card hidden" id="studyArea">
  <div class="study-container">
    <div class="study-row" id="studyCard">
      <button class="nav-square" onclick="prevCard()">◀</button>
      <div>
        <h2 id="studyTerm"></h2>
        <div id="cardPosition"></div>
      </div>
      <button class="nav-square" onclick="nextCard()">▶</button>
    </div>
    <!-- 説明表示エリア（元のJSが参照していたがHTMLに無かったので追加） -->
    <div class="study-meaning-box" style="margin-top:10px;">
      <span id="studyMeaning"></span>
    </div>
  </div>
</div>

<h3>CSVテスト（ローカル用）</h3>
<input type="file" accept=".csv" onchange="loadLocalCSV(this.files[0])">

<a href="index.html" class="portal-btn exam-btn">
  検定トップ
</a>
<a href="../../index.html" class="portal-btn portal-main">
  ポータルへ戻る
</a>

<script>
/* =====================
   グローバル変数
===================== */
let questions = [];
let filtered  = [];
let wrong     = [];
let current   = 0;
let score     = 0;
let mode      = "";
let streak    = 0;   // ★連続正解数
const quizState = {
  pool:  [],
  queue: [],
  wrong: [],
  index: 0,
  score: 0,
  mode:  ""
};

// ★ ローディング開始時刻（1秒ルール用）
const loadStartTime = Date.now();

/* =====================
   モード説明
===================== */
const modeDesc = {
  normal:   "5問出題されます",
  challenge:"全問題出題。1問でも間違えると終了",
  review:   "間違えた問題を再出題",
  study:    "カード形式で学習"
};

/* =====================
   レベル判定
===================== */
const params = new URLSearchParams(location.search);
const level  = params.get("level");

if (level === "3") {
  document.getElementById("examLevel").innerText = "情報処理検定 3級";
  loadCSV("data/data3.csv");
}
if (level === "2") {
  document.getElementById("examLevel").innerText = "情報処理検定 2級";
  loadCSV("data/data2.csv");
}

/* =====================
   CSV読み込み
===================== */

/* ローカルCSVテスト用 */
function loadLocalCSV(file){
  let reader = new FileReader();
  reader.onload = function(e){
    let text = e.target.result;
    questions = parseCSV(text);
    createFieldList();
    showWeakRanking();
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("setupArea").classList.remove("hidden");
  };
  reader.readAsText(file);
}

// オンライン用CSV読み込み（1秒ルール適用）
async function loadCSV(path){
  try{
    let res = await fetch(path);
    if(!res.ok){
      throw new Error("CSVが見つかりません: " + path);
    }
    let text = await res.text();
    text = text.replace(/^\uFEFF/, "");
    questions = parseCSV(text);
    createFieldList();
    showWeakRanking();

    // ▼ 最低1秒ローディング表示
    const elapsed     = Date.now() - loadStartTime;
    const minDuration = 1000;

    const showSetup = () => {
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("setupArea").classList.remove("hidden");
    };

    if(elapsed >= minDuration){
      showSetup();
    }else{
      setTimeout(showSetup, minDuration - elapsed);
    }
    // ▲ ここまで 1秒ルール
  }catch(e){
    console.warn("CSV読み込み失敗", e);
    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("setupArea").classList.remove("hidden");
  }
}

/* =====================
   CSVパーサー
===================== */
function parseCSV(text){
  let rows   = text.trim().split(/\r?\n/);
  let result = [];
  for(let i=1;i<rows.length;i++){
    let line = rows[i].trim();
    if(!line) continue;
    let cols     = [];
    let current  = "";
    let inQuotes = false;
    for(let c of line){
      if(c === '"'){
        inQuotes = !inQuotes;
        continue;
      }
      if(c === "," && !inQuotes){
        cols.push(current);
        current = "";
      }else{
        current += c;
      }
    }
    cols.push(current);
    if(cols.length < 3) continue;
    result.push({
      field:   cols[0].trim(),
      term:    cols[1].trim(),
      meaning: cols.slice(2).join(",").trim(),
      index:   i-1
    });
  }
  return result;
}

/* =====================
   分野リスト作成
===================== */
function createFieldList(){
  let counts = {};
  questions.forEach(q=>{
    if(!counts[q.field]) counts[q.field] = 0;
    counts[q.field]++;
  });
  let area = document.getElementById("fieldArea");
  area.innerHTML = "";
  Object.keys(counts).sort().forEach(field=>{
    let label = document.createElement("label");
    label.innerHTML =
      '<input type="checkbox" value="'+field+'"> ' +
      field+' ('+counts[field]+')';
    area.appendChild(label);
  });
}

/* =====================
   分野選択操作
===================== */
function selectAll(){
  document.querySelectorAll("#fieldArea input").forEach(c=>c.checked = true);
}
function clearAll(){
  document.querySelectorAll("#fieldArea input").forEach(c=>c.checked = false);
}

/* =====================
   モード説明
===================== */
document.getElementById("modeSelect").addEventListener("change", updateModeDesc);
function updateModeDesc(){
  let m = document.getElementById("modeSelect").value;
  document.getElementById("modeDescription").innerText = modeDesc[m];
}
updateModeDesc();

/* =====================
   連続正解数の表示更新
===================== */
function updateStreakDisplay(){
  const elm = document.getElementById("streakInfo");
  if(!elm) return;
  elm.innerText = "連続正解数：" + streak + "問";
}

/* =====================
   クイズ開始
===================== */
function startQuiz(){
  const selected = [...document.querySelectorAll("#fieldArea input:checked")]
                    .map(c=>c.value);
  if(selected.length === 0){
    alert("分野を1つ以上選択してください");
    return;
  }

  quizState.mode  = document.getElementById("modeSelect").value;
  quizState.pool  = questions.filter(q=>selected.includes(q.field));
  shuffle(quizState.pool);
  quizState.index = 0;
  quizState.score = 0;
  quizState.wrong = [];

  // 連続正解数リセット
  streak = 0;
  updateStreakDisplay();

  if(quizState.mode === "study"){
    filtered = [...quizState.pool];
    document.getElementById("setupArea").classList.add("hidden");
    document.getElementById("studyArea").classList.remove("hidden");
    startStudy();
    return;
  }

  if(quizState.mode === "normal"){
    quizState.queue = quizState.pool.slice(0,5);
  }else if(quizState.mode === "challenge"){
    quizState.queue = [...quizState.pool];
  }else if(quizState.mode === "review"){
    if(quizState.wrong.length === 0){
      alert("復習問題がありません");
      return;
    }
    quizState.queue = [...quizState.wrong];
  }

  document.getElementById("setupArea").classList.add("hidden");
  document.getElementById("quizArea").classList.remove("hidden");
  nextQuestion();
}

/* =====================
   問題表示
===================== */
function nextQuestion(){
  const total = quizState.queue.length;
  if(quizState.index >= total){
    showResult();
    return;
  }
  const q = quizState.queue[quizState.index];

  document.getElementById("progressText").innerText =
    (quizState.index+1) + " / " + total + " 問目";
  document.getElementById("progressBar").style.width =
    ((quizState.index+1)/total*100) + "%";

  document.getElementById("result").innerText  = "";
  document.getElementById("question").innerText = q.meaning;

  const area = document.getElementById("choices");
  area.innerHTML = "";
  const choices = generateChoices(q);
  choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.className = "quiz-btn";
    btn.innerText = c.term;
    btn.onclick   = ()=>checkAnswer(c.term, q.term, btn);
    area.appendChild(btn);
  });

  // 毎回「次へ」ボタンは隠しておく（不正解のときだけ表示）
  document.getElementById("nextBtn").classList.add("hidden");
}

/* =====================
   選択肢生成
===================== */
function generateChoices(q){
  let arr = [q];
  // 同じ分野の問題だけ取得
  let sameField = questions.filter(x =>
    x.field === q.field && x.term !== q.term
  );
  shuffle(sameField);
  for(let i=0;i<sameField.length && arr.length<4;i++){
    arr.push(sameField[i]);
  }
  // もし分野問題が足りなければ他分野から補充
  while(arr.length < 4){
    let r = questions[Math.floor(Math.random()*questions.length)];
    if(!arr.includes(r)){
      arr.push(r);
    }
  }
  shuffle(arr);
  return arr;
}

/* =====================
   正解判定
===================== */
function checkAnswer(selected, correct, btn){
  const buttons = document.querySelectorAll("#choices button");
  buttons.forEach(b=>b.disabled = true);

  const q = quizState.queue[quizState.index];

  if(selected === correct){
    // ★ 正解時
    btn.classList.add("correct-answer");
    quizState.score++;
    document.getElementById("result").innerText = "正解！";
    updateFieldStats(q.field, true);

    // 連続正解数＋1
    streak++;
    updateStreakDisplay();

    quizState.index++;
    // 正解時はテンポ良く：1秒後に自動で次の問題へ
