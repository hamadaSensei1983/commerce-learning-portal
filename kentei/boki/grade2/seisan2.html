<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 精算表（8桁）トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
  .card{
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
  }
  .hidden{ display:none !important; }

  /* 上部タブ（今回は精算表＋PLだけ） */
  .tab-row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
    flex-wrap:wrap;
  }
  .tab-btn{
    border:none;
    border-radius:999px;
    padding:8px 16px;
    font-size:14px;
    background:#e2f5ea;
    color:#2e7d32;
    cursor:pointer;
    min-width:140px;
  }
  .tab-btn.active{
    background:#72b48a;
    color:#fff;
  }

  /* 操作バー */
  #controlBar{
    text-align:center;
    margin-bottom:10px;
  }
  #problemSelect{
    padding:8px;
    font-size:16px;
    border-radius:8px;
    border:2px solid var(--main-green);
  }

  /* 見出し */
  .section-title{
    margin-top:12px;
    margin-bottom:6px;
    padding-left:8px;
    border-left:4px solid #e53935;
    font-size:15px;
    font-weight:bold;
  }

  /* 決算整理事項（付記事項） */
  #notesArea{
    margin:6px 0 10px;
    padding:10px;
    background:#f7f7f7;
    border-left:4px solid #66bb6a;
    white-space:pre-line;
    font-size:14px;
    line-height:1.4;
  }

  /* 決算整理仕訳入力エリア */
  .adj-wrap{
    border:2px solid #d8ead8;
    background:#f9fdf9;
    border-radius:10px;
    padding:10px;
  }
  .note-block{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin:10px 0;
  }
  .note-q{
    font-weight:bold;
    margin-bottom:8px;
    white-space:pre-line;
  }
  .adj-grid{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .adj-row{
    display:grid;
    grid-template-columns: 70px 1fr 140px 90px;
    gap:8px;
    align-items:center;
  }
  .adj-row select, .adj-row input{
    padding:6px;
    font-size:14px;
  }
  .adj-row input{
    text-align:right;
  }
  .mini-btns{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:6px;
  }
  .mini-btn{
    width:auto;
    padding:6px 10px;
    font-size:13px;
    border-radius:8px;
    cursor:pointer;
  }

  /* 精算表（8桁：TB/整理/PL/BS の借貸＝8列） */
  table.seisan8{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:14px;
  }
  table.seisan8 th, table.seisan8 td{
    border:1px solid #e53935;
    padding:6px;
    vertical-align:middle;
  }
  table.seisan8 th{
    background:#ffebee;
    text-align:center;
  }
  table.seisan8 td{
    text-align:right;
  }
  table.seisan8 td:first-child{
    text-align:left;
    width:18%;
  }
  .money{
    width:100%;
    box-sizing:border-box;
    padding:4px;
    text-align:right;
    font-size:14px;
  }

  /* 新規追加行（TBに無い科目） */
  tr.added-row td:first-child{
    background:#f3f8ff;
    font-weight:bold;
  }

  /* 当期純利益・合計行 */
  tr.profit-row td, tr.total-row td{
    font-weight:bold;
    background:#fff7f7;
  }

  /* 画面下の結果 */
  #result{
    margin-top:10px;
    font-weight:bold;
    white-space:pre-line;
    text-align:center;
  }

  /* PL（元帳残高形式：今回は表示だけの器） */
  .pl-wrap{
    max-width:760px;
    margin:0 auto;
    border:2px solid #e53935;
    border-radius:10px;
    padding:12px;
    background:#fffdfd;
  }
  .pl-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
  }
  .pl-item{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px dotted #ccc;
  }

  /* ===== 決算整理仕訳（左右入力） ===== */
  .jrnl{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:8px;
  }
  .jrnl-side{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
  }
  .jrnl-title{
    font-weight:bold;
    text-align:center;
    padding:4px 0;
    background:#f7f7f7;
    border-radius:8px;
    margin-bottom:8px;
  }
  .jrnl-row{
    display:grid;
    grid-template-columns: 1fr 120px;
    gap:8px;
    margin:6px 0;
  }
  .jrnl-row select, .jrnl-row input{
    padding:6px;
    font-size:14px;
  }
  .jrnl-row input{
    text-align:right;
  }
  @media (max-width: 720px){
    .jrnl{ grid-template-columns:1fr; }
  }

  /* スマホ */
  @media (max-width: 720px){
    .adj-row{ grid-template-columns: 60px 1fr 110px 80px; }
    table.seisan8{ font-size:13px; }
  }
</style>
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記2級 精算表（8桁）トレーニング</div>
    </div>
  </div>
</header>

<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">読み込み中...</p>
  </div>
</div>

<div class="card hidden" id="mainCard">

  <div class="tab-row">
    <button class="tab-btn active" id="tabSeisan" onclick="showTab('seisan')">精算表</button>
    <button class="tab-btn" id="tabPL" onclick="showTab('pl')">損益計算書</button>
  </div>

  <div id="controlBar">
    <select id="problemSelect"></select>
    <button class="main-btn" style="width:auto" onclick="start()">開始</button>
  </div>

  <div class="section-title">決算整理事項</div>
  <div id="notesArea"></div>

  <div class="section-title">決算整理仕訳（入力）</div>
  <div class="adj-wrap" id="adjInputArea">
    <!-- JSで付記事項ごとの入力欄を生成 -->
  </div>

  <div class="section-title">精算表（8桁）</div>
  <div id="area_seisan">
    <table class="seisan8">
      <thead>
        <tr>
          <th rowspan="2">勘定科目</th>
          <th colspan="2">残高試算表</th>
          <th colspan="2">整理記入</th>
          <th colspan="2">損益計算書</th>
          <th colspan="2">貸借対照表</th>
        </tr>
        <tr>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
          <th>借方</th><th>貸方</th>
        </tr>
      </thead>
      <tbody id="seisanBody"></tbody>
    </table>

    <div style="text-align:center;margin-top:10px;">
      <button class="control-btn" style="width:auto" onclick="applyAdjustments()">精算表に反映</button>
      <button class="control-btn" style="width:auto" onclick="checkStub()">答え合わせ（準備中）</button>
    </div>

    <p id="result"></p>
  </div>

  <div id="area_pl" class="hidden">
    <div class="pl-wrap">
      <div class="pl-title">損益計算書（元帳残高形式）</div>
      <div id="plBody"></div>
      <div style="text-align:center;margin-top:8px;color:#666;font-size:13px;">
        ※このサンプルではPLは表示のみ（次段階で自動計算に発展します）
      </div>
    </div>
  </div>

</div>

<script>
/* =========================================================
  seisan2.html（左右仕訳＋正解仕訳から初期行数を決定）
  CSV:
   - ../data/seisan2_TB.csv  (問題ID,勘定科目,分類,借方残高,貸方残高)
   - ../data/seisan2_seiri.csv (問題ID,問題,勘定科目,正解仕訳)      
========================================================= */

let TB = [];      // {id, acct, cls, debit, credit}
let SEIRI = [];   // {id, q, candidates[], answerRaw}
let problemIds = [];
let currentId = null;

let baseAccounts = [];
let extraAccounts = new Set();

/* ---------- CSVパーサ（クォート対応） ---------- */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = [];
  let row = [];
  let cur = "";
  let inQ = false;

  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === "," && !inQ){ row.push(cur); cur=""; continue; }
    if((c === "\n" || c === "\r") && !inQ){
      if(c === "\r" && text[i+1] === "\n") i++;
      row.push(cur);
      if(row.join("").trim() !== "") out.push(row);
      row=[]; cur="";
      continue;
    }
    cur += c;
  }
  row.push(cur);
  if(row.join("").trim() !== "") out.push(row);
  return out;
}

function num(v){
  const s = String(v||"").replace(/,/g,"").trim();
  if(s==="") return 0;
  const n = Number(s);
  return isNaN(n) ? 0 : n;
}
function fmt(n){ return n ? Number(n).toLocaleString() : ""; }

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* ---------- 付記事項本文：| を改行に ---------- */
function normalizeText(s){
  return String(s||"")
    .replace(/\\\r?\n/g,"\n")
    .replace(/\r?\n/g,"\n")
    .replace(/\|/g,"\n")
    .trim();
}

/* ---------- 候補：|区切り吸収 ---------- */
function splitCandidates(s){
  return String(s||"")
    .replace(/\\\r?\n/g,"|")
    .replace(/\r?\n/g,"|")
    .replace(/｜/g,"|")
    .split("|")
    .map(x=>x.trim())
    .filter(Boolean);
}

/* ---------- 正解仕訳のパース（行数決定用） ----------
   answerRaw は journal2 形式：
   借方行|借方行;貸方行|貸方行   （行は 科目:金額）
----------------------------------------------------- */
function parseAnswerRaw(raw){
  raw = String(raw||"")
    .replace(/\\\r?\n/g,"|")
    .replace(/\r?\n/g,"|")
    .replace(/｜/g,"|")
    .trim();

  const parts = raw.split(";");
  const dPart = (parts[0]||"").trim();
  const cPart = (parts[1]||"").trim();

  function parseSide(str){
    if(!str) return [];
    return str.split("|")
      .map(x=>x.trim())
      .filter(Boolean)
      .map(line=>{
        const [a,m] = line.split(":").map(z=>z.trim());
        return { acct:a, amt:num(m) };
      })
      .filter(x=>x.acct);
  }

  return { D: parseSide(dPart), C: parseSide(cPart) };
}

/* ---------- タブ切替（精算表/PL） ---------- */
function showTab(t){
  document.getElementById("area_seisan")?.classList.add("hidden");
  document.getElementById("area_pl")?.classList.add("hidden");
  document.getElementById("tabSeisan")?.classList.remove("active");
  document.getElementById("tabPL")?.classList.remove("active");

  document.getElementById("area_"+t)?.classList.remove("hidden");
  if(t==="seisan") document.getElementById("tabSeisan")?.classList.add("active");
  if(t==="pl") document.getElementById("tabPL")?.classList.add("active");
}

/* ---------- 問題選択 ---------- */
function setupProblemSelect(){
  const sel = document.getElementById("problemSelect");
  if(!sel) return;

  sel.innerHTML = "";
  problemIds.forEach(id=>{
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = "問題 " + id;
    sel.appendChild(opt);
  });

  sel.onchange = ()=>{ currentId = sel.value; };
  currentId = problemIds[0] || null;
}

/* ---------- 開始：描画 ---------- */
function start(){
  if(!currentId) return;

  const tbRows = TB.filter(x=>x.id===currentId);
  baseAccounts = tbRows.map(x=>x.acct);
  extraAccounts = new Set();

  // 上部の一覧は不要 → 空にする（先生の要望）
  const notesArea = document.getElementById("notesArea");
  if(notesArea) notesArea.textContent = "";

  renderAdjInputs();     // 付記事項を見ながら仕訳入力（左右）
  renderSeisanTable();   // TBの表示

  // PL（元帳残高形式）
  renderPL();

  const res = document.getElementById("result");
  if(res) res.textContent = "";
}

/* ---------- 決算整理仕訳入力（付記事項ごと・左右） ---------- */
function renderAdjInputs(){
  const area = document.getElementById("adjInputArea");
  if(!area) return;
  area.innerHTML = "";

  const notes = SEIRI.filter(x=>x.id===currentId);
  const abc = "abcdefghijklmnopqrstuvwxyz";

  notes.forEach((n, idx)=>{
    const parsed = parseAnswerRaw(n.answerRaw);
    const rowCount = Math.max(parsed.D.length, parsed.C.length, 1); // 正解から初期行数

    const block = document.createElement("div");
    block.className = "note-block";

    // 問題文（この形式なら上部一覧不要）
    const q = document.createElement("div");
    q.className = "note-q";
    q.textContent = `${abc[idx]}. ${normalizeText(n.q)}`;
    block.appendChild(q);

    // 左右（借方/貸方）
    const jrnl = document.createElement("div");
    jrnl.className = "jrnl";
    jrnl.innerHTML = `
      <div class="jrnl-side">
        <div class="jrnl-title">借方</div>
        <div id="dBox_${idx}"></div>
      </div>
      <div class="jrnl-side">
        <div class="jrnl-title">貸方</div>
        <div id="cBox_${idx}"></div>
      </div>
    `;
    block.appendChild(jrnl);

    // 行生成（候補は共通で使用）
    buildSideRows(idx, "D", n.candidates, rowCount);
    buildSideRows(idx, "C", n.candidates, rowCount);

    // 行追加/削除（左右同時に増減）
    const btns = document.createElement("div");
    btns.className = "mini-btns";
    btns.innerHTML = `
      <button class="control-btn mini-btn" type="button" onclick="addPairRow(${idx})">＋行</button>
      <button class="control-btn mini-btn" type="button" onclick="removePairRow(${idx})">－行</button>
    `;
    block.appendChild(btns);

    area.appendChild(block);
  });
}

/* 借方/貸方の行を作る */
function buildSideRows(noteIndex, side, candidates, rowCount){
  const box = document.getElementById(`${side==="D" ? "dBox" : "cBox"}_${noteIndex}`);
  if(!box) return;

  // 既存をクリアして rowCount 行作り直す（整合性維持）
  box.innerHTML = "";

  const optHtml = (candidates||[]).map(a =>
    `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`
  ).join("");

  for(let r=0; r<rowCount; r++){
    const row = document.createElement("div");
    row.className = "jrnl-row";
    row.innerHTML = `
      <select id="${side}acct_${noteIndex}_${r}">
        <option value=""></option>
        ${optHtml}
      </select>
      <input id="${side}amt_${noteIndex}_${r}" class="money" inputmode="numeric">
    `;
    box.appendChild(row);

    // カンマ補助
    const inp = row.querySelector("input");
    inp.addEventListener("input", ()=>{
      let v = inp.value.replace(/,/g,"");
      if(!isNaN(v) && v!=="") inp.value = Number(v).toLocaleString();
    });
  }
}

/* 行追加：左右ともに +1 */
function addPairRow(noteIndex){
  const dBox = document.getElementById(`dBox_${noteIndex}`);
  const cBox = document.getElementById(`cBox_${noteIndex}`);
  if(!dBox || !cBox) return;

  const currentRows = dBox.querySelectorAll(".jrnl-row").length;
  const nextRows = currentRows + 1;

  const note = SEIRI.filter(x=>x.id===currentId)[noteIndex];
  const candidates = note ? note.candidates : [];

  buildSideRows(noteIndex, "D", candidates, nextRows);
  buildSideRows(noteIndex, "C", candidates, nextRows);
}

/* 行削除：左右ともに -1（最低1行） */
function removePairRow(noteIndex){
  const dBox = document.getElementById(`dBox_${noteIndex}`);
  const cBox = document.getElementById(`cBox_${noteIndex}`);
  if(!dBox || !cBox) return;

  const currentRows = dBox.querySelectorAll(".jrnl-row").length;
  if(currentRows <= 1) return;

  const nextRows = currentRows - 1;

  const note = SEIRI.filter(x=>x.id===currentId)[noteIndex];
  const candidates = note ? note.candidates : [];

  buildSideRows(noteIndex, "D", candidates, nextRows);
  buildSideRows(noteIndex, "C", candidates, nextRows);
}

/* ---------- 精算表（TB表示） ---------- */
function renderSeisanTable(){
  const tbody = document.getElementById("seisanBody");
  if(!tbody) return;
  tbody.innerHTML = "";

  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    if(!r) return;
    tbody.appendChild(makeSeisanRow(acct, r.debit, r.credit, false));
  });
}

/* 8桁精算表の行 */
function makeSeisanRow(acct, tbD, tbC, added){
  const tr = document.createElement("tr");
  if(added) tr.classList.add("added-row");
  tr.dataset.acct = acct;

  tr.innerHTML = `
    <td>${escapeHtml(acct)}</td>
    <td>${fmt(tbD)}</td>
    <td>${fmt(tbC)}</td>
    <td class="adjD"></td>
    <td class="adjC"></td>
    <td class="plD"></td>
    <td class="plC"></td>
    <td class="bsD"></td>
    <td class="bsC"></td>
  `;
  return tr;
}

/* ---------- 反映：入力した仕訳を整理記入列へ（新科目追加＋利益/合計行） ---------- */
function applyAdjustments(){
  if(!currentId) return;

  const adjMap = {}; // acct -> {d,c}
  const ensure = a=>{ if(!adjMap[a]) adjMap[a]={d:0,c:0}; };

  const notes = SEIRI.filter(x=>x.id===currentId);

  // 入力を集計
  for(let idx=0; idx<notes.length; idx++){
    const note = notes[idx];
    const candidates = note ? note.candidates : [];

    const dBox = document.getElementById(`dBox_${idx}`);
    const cBox = document.getElementById(`cBox_${idx}`);
    if(!dBox || !cBox) continue;

    const rows = Math.max(
      dBox.querySelectorAll(".jrnl-row").length,
      cBox.querySelectorAll(".jrnl-row").length
    );

    for(let r=0; r<rows; r++){
      const dAcct = (document.getElementById(`Dacct_${idx}_${r}`)?.value || "").trim();
      const dAmt  = num(document.getElementById(`Damt_${idx}_${r}`)?.value);
      const cAcct = (document.getElementById(`Cacct_${idx}_${r}`)?.value || "").trim();
      const cAmt  = num(document.getElementById(`Camt_${idx}_${r}`)?.value);

      if(dAcct && dAmt>0){
        ensure(dAcct);
        adjMap[dAcct].d += dAmt;
        if(!baseAccounts.includes(dAcct)) extraAccounts.add(dAcct);
      }
      if(cAcct && cAmt>0){
        ensure(cAcct);
        adjMap[cAcct].c += cAmt;
        if(!baseAccounts.includes(cAcct)) extraAccounts.add(cAcct);
      }
    }
  }

  // 精算表を再構築（TB行＋新規行＋当期純利益＋合計）
  const tbody = document.getElementById("seisanBody");
  if(!tbody) return;
  tbody.innerHTML = "";

  baseAccounts.forEach(acct=>{
    const r = TB.find(x=>x.id===currentId && x.acct===acct);
    if(!r) return;

    const tr = makeSeisanRow(acct, r.debit, r.credit, false);
    const adj = adjMap[acct] || {d:0,c:0};
    tr.querySelector(".adjD").textContent = fmt(adj.d);
    tr.querySelector(".adjC").textContent = fmt(adj.c);
    tbody.appendChild(tr);
  });

  [...extraAccounts].forEach(acct=>{
    const tr = makeSeisanRow(acct, 0, 0, true);
    const adj = adjMap[acct] || {d:0,c:0};
    tr.querySelector(".adjD").textContent = fmt(adj.d);
    tr.querySelector(".adjC").textContent = fmt(adj.c);
    tbody.appendChild(tr);
  });

  // 当期純利益（行だけ）
  const trProfit = document.createElement("tr");
  trProfit.className = "profit-row";
  trProfit.innerHTML = `
    <td>当期純利益</td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
  `;
  tbody.appendChild(trProfit);

  // 合計（行だけ）
  const trTotal = document.createElement("tr");
  trTotal.className = "total-row";
  trTotal.innerHTML = `
    <td style="text-align:right;">合計</td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
    <td></td><td></td>
  `;
  tbody.appendChild(trTotal);

  document.getElementById("result").textContent =
    "整理記入を精算表へ反映しました（新規科目行・当期純利益行・合計行を追加）。";
}

/* ---------- PL（元帳残高形式：分類=費用/収益のみ、仕入→売上原価） ---------- */
function renderPL(){
  const pl = document.getElementById("plBody");
  if(!pl) return;
  pl.innerHTML = "";

  TB.filter(r=>r.id===currentId)
    .filter(r=>r.cls==="費用" || r.cls==="収益")
    .forEach(r=>{
      const name = (r.acct==="仕入") ? "売上原価" : r.acct;
      const amt = (r.cls==="費用") ? r.debit : r.credit;
      if(amt===0) return;

      pl.innerHTML += `
        <div class="pl-item">
          <span>${escapeHtml(name)}</span>
          <span>${fmt(amt)}</span>
        </div>
      `;
    });
}

/* ---------- 読み込み ---------- */
(async function initAll(){
  try{
    const [tbText, seiriText] = await Promise.all([
      fetch("../data/seisan2_TB.csv").then(r=>{
        if(!r.ok) throw new Error("seisan2_TB.csv が見つかりません");
        return r.text();
      }),
      fetch("../data/seisan2_seiri.csv").then(r=>{
        if(!r.ok) throw new Error("seisan2_seiri.csv が見つかりません");
        return r.text();
      })
    ]);

    // TB（5列）[1](https://chinzeigakuinedjp01-my.sharepoint.com/personal/hirotoshi_hamada_chinzeigakuinedjp01_onmicrosoft_com/_layouts/15/Doc.aspx?sourcedoc=%7BD13B18BC-CC06-4C89-9611-2570D08156AF%7D&file=seisan2_TB.csv&action=default&mobileredirect=true)
    const tbRows = parseCSV(tbText);
    TB = tbRows.slice(1).filter(r=>r.join("").trim()!=="").map(c=>({
      id: (c[0]||"").trim(),
      acct: (c[1]||"").trim(),
      cls: (c[2]||"").trim(),
      debit: num(c[3]),
      credit: num(c[4])
    }));

    // SEIRI（4列）[2](https://chinzeigakuinedjp01-my.sharepoint.com/personal/hirotoshi_hamada_chinzeigakuinedjp01_onmicrosoft_com/Documents/Microsoft%20Copilot%20Chat%20%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB/seisan2.html)
    const sRows = parseCSV(seiriText);
    SEIRI = sRows.slice(1).filter(r=>r.join("").trim()!=="").map(c=>({
      id: (c[0]||"").trim(),
      q: (c[1]||"").trim(),
      candidates: splitCandidates(c[2]||""),
      answerRaw: (c[3]||"").trim()
    }));

    problemIds = [...new Set(TB.map(x=>x.id))].sort();

    setupProblemSelect();
    start();

  }catch(e){
    console.error(e);
    alert("CSV読み込みエラー：" + (e.message || e));
  }finally{
    document.getElementById("loadingScreen")?.style && (document.getElementById("loadingScreen").style.display="none");
    document.getElementById("mainCard")?.classList.remove("hidden");
  }
})();
</script>
