<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理3級 用語学習</title>
<link rel="stylesheet" href="../../css/common.css">
</head>
<body>

<header>
<h1 id="pageTitle"></h1>
</header>

<div id="loadingScreen">
  <div class="loaderBox">
    <div class="spinner"></div>
    <p>読み込み中...</p>
  </div>
</div>

<!-- 分野選択 -->
<div class="card hidden" id="fieldScreen">
<h2>分野選択</h2>
<div id="fieldCheckboxes" class="field-grid"></div>
<button class="control-btn" onclick="selectAllFields()">全選択</button>
<button class="main-btn" onclick="goModeSelect()">次へ</button>
</div>

<!-- モード選択 -->
<div class="card hidden" id="menuScreen">
<h2>モード選択</h2>
<div class="grid-2">
<button onclick="setMode('normal')">通常モード</button>
<button onclick="setMode('review')">復習モード</button>
<button onclick="setMode('challenge')">チャレンジ</button>
<button onclick="startStudyMode()">学習モード</button>
</div>
</div>
<!-- モード説明画面 -->
<div class="card hidden" id="modeInfoScreen">
  <h2 id="modeTitle"></h2>
  <p id="modeDescription"></p>
  <button class="control-btn" onclick="startQuiz()">開始する</button>
  <button class="control-btn" onclick="backToMenu()">戻る</button>
</div>

<!-- クイズ画面 -->
<div class="card hidden" id="quizScreen">
<div id="timerBox">残り10秒</div>
<div class="progress-wrapper">
    <div id="progressText" class="progress-text"></div>
    <div class="progress-bar">
        <div id="progressBarFill" class="progress-bar-fill"></div>
    </div>
</div>
<h3 id="questionText"></h3>
<div id="choices"></div>
<p id="resultMessage"></p>
<button class="control-btn" onclick="nextQuestion()">次へ</button>
</div>

<!-- 学習画面 -->
<div class="card hidden" id="studyScreen">
<h3 id="studyTerm"></h3>
<p id="studyMeaning"></p>
<button id="studyBtn" class="control-btn" onclick="nextStudy()">説明を見る</button>
</div>

<a href="../../index.html" class="control-btn floating-btn">
  ポータルへ戻る
</a>

<script>

let allQuestions = [];
let filteredQuestions = [];
let selectedFields = [];
let currentIndex = 0;
let score = 0;
let mode = "";
let timer;
let timeLeft;
let totalTime = 0;
let studyStep = 0;
let answered = false;

const params = new URLSearchParams(window.location.search);
const level = params.get("level");

document.getElementById("pageTitle").innerText =
"情報処理検定 " + level + "級";


async function loadCSV(){
    const csvFile = "data" + level + ".csv";
    const response = await fetch(csvFile);    let text = await response.text();
    text = text.replace(/^\uFEFF/, "");
    const lines = text.split(/\r?\n/);

    for(let i=1;i<lines.length;i++){
        const cols = lines[i].split(",");
        if(cols.length>=3){
            allQuestions.push({
                field: cols[0].trim(),
                term: cols[1].trim(),
                meaning: cols.slice(2).join(",").trim()
            });
        }
    }

    createFieldSelection();
    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("fieldScreen").classList.remove("hidden");
}

window.addEventListener("load", loadCSV);

function createFieldSelection(){
    const fields = [...new Set(allQuestions.map(q=>q.field))];
    const container = document.getElementById("fieldCheckboxes");
    container.innerHTML="";

    fields.forEach(f=>{
        const label=document.createElement("label");
        const cb=document.createElement("input");
        cb.type="checkbox";
        cb.value=f;
        label.appendChild(cb);
        label.append(" "+f);
        container.appendChild(label);
    });
}

function selectAllFields(){
    document.querySelectorAll("#fieldCheckboxes input")
    .forEach(cb=>cb.checked=true);
}

function goModeSelect(){
    selectedFields=[];
    document.querySelectorAll("#fieldCheckboxes input:checked")
    .forEach(cb=>selectedFields.push(cb.value));

    if(selectedFields.length===0){
        alert("分野を選択してください");
        return;
    }

    filteredQuestions = allQuestions.filter(q=>selectedFields.includes(q.field));

    document.getElementById("fieldScreen").classList.add("hidden");
    document.getElementById("menuScreen").classList.remove("hidden");
}

function setMode(m){
    mode = m;
    showModeInfo();
}

function showModeInfo(){

    let title="";
    let description="";

    if(mode==="normal"){
        title="通常モード";
        description="10問出題されます。最後に正解数と合計時間が表示されます。落ち着いて取り組みましょう。";
    }
    else if(mode==="review"){
        title="復習モード";
        description="10問解いたあと、間違えた問題をすべて正解するまで続きます。完全理解を目指します。";
    }
    else if(mode==="challenge"){
        title="チャレンジモード";
        description="1問でも間違えるとその時点で終了です。緊張感をもって挑戦しましょう。";
    }

    document.getElementById("modeTitle").innerText=title;
    document.getElementById("modeDescription").innerText=description;

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("modeInfoScreen").classList.remove("hidden");
}

function startQuiz(){
    document.getElementById("modeInfoScreen").classList.add("hidden");
    shuffle(filteredQuestions);
    currentIndex=0;
    score=0;
    totalTime=0;

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");

    showQuestion();
}

function showQuestion(){
    clearInterval(timer);
    timeLeft=10;
    document.getElementById("resultMessage").innerText="";
    document.getElementById("timerBox").innerText="残り10秒";

    const q=filteredQuestions[currentIndex];

    // ===== 進捗表示更新 =====
    const totalQuestions = filteredQuestions.length;
    const currentNumber = currentIndex + 1;

    document.getElementById("progressText").innerText =
        currentNumber + " / " + totalQuestions + " 問";

    const percent = (currentNumber / totalQuestions) * 100;
    document.getElementById("progressBarFill").style.width = percent + "%";

    document.getElementById("questionText").innerText=q.term;

    const sameField = filteredQuestions.filter(x=>x.field===q.field && x.meaning!==q.meaning);
    let choices=[q.meaning];

    while(choices.length<4 && sameField.length>0){
        let rand=sameField[Math.floor(Math.random()*sameField.length)].meaning;
        if(!choices.includes(rand)){
            choices.push(rand);
        }
    }

    shuffle(choices);

    const div=document.getElementById("choices");
    div.innerHTML="";
    choices.forEach(c=>{
        const btn=document.createElement("button");
        btn.innerText=c;
        btn.onclick=function(){checkAnswer(c)};
        div.appendChild(btn);
    });

    timer=setInterval(()=>{
        timeLeft--;
        totalTime++;
        document.getElementById("timerBox").innerText="残り"+timeLeft+"秒";

        if(timeLeft<=0){
            clearInterval(timer);

            if(!answered){
                timeUp();
            }
        }
    },1000);
    answered = false;
}

function timeUp(){

    answered = true;

    const correctAnswer = filteredQuestions[currentIndex].meaning;
    const buttons = document.querySelectorAll("#choices button");

    buttons.forEach(btn=>{
        if(btn.innerText === correctAnswer){
            btn.classList.add("correct");
        }
        btn.disabled = true;
    });

    document.getElementById("resultMessage").innerText="時間切れです";

    if(mode==="challenge"){
        setTimeout(endQuiz,800);
    }
}

function checkAnswer(choice){

    if(answered) return;
    answered = true;

    clearInterval(timer);

    const correctAnswer = filteredQuestions[currentIndex].meaning;

    const buttons = document.querySelectorAll("#choices button");

    buttons.forEach(btn=>{
        if(btn.innerText === correctAnswer){
            btn.classList.add("correct");
        }else if(btn.innerText === choice){
            btn.classList.add("wrong");
        }
        btn.disabled = true;
    });

    if(choice === correctAnswer){
        score++;
        document.getElementById("resultMessage").innerText="正解です！";
    }else{
        document.getElementById("resultMessage").innerText="不正解です";
        if(mode==="challenge"){
            setTimeout(endQuiz,800);
            return;
        }
    }
    if(mode === "challenge"){
        if(choice === correctAnswer){
            if(currentIndex === filteredQuestions.length - 1){
                setTimeout(endQuiz,800);
            }
        }
    }

}

function nextQuestion(){

    if(!answered){
        alert("答えを選択してください");
        return;
    }

    currentIndex++;

    if(currentIndex >= filteredQuestions.length){
        endQuiz();
    }else{
        showQuestion();
    }
}

function endQuiz(){
    const totalQuestions = filteredQuestions.length;

    alert("終了！ 正解数："+score+"/"+totalQuestions+
          "\n合計時間："+totalTime+"秒");
    location.reload();
}

/* 学習モード */

function startStudyMode(){
    shuffle(filteredQuestions);
    currentIndex=0;
    studyStep=0;

    document.getElementById("menuScreen").classList.add("hidden");
    document.getElementById("studyScreen").classList.remove("hidden");

    showStudy();
}

function showStudy(){
    const q=filteredQuestions[currentIndex];

    if(studyStep===0){
        document.getElementById("studyTerm").innerText=q.term;
        document.getElementById("studyMeaning").innerText="";
        document.getElementById("studyBtn").innerText="説明を見る";
    }else{
        document.getElementById("studyMeaning").innerText=q.meaning;
        document.getElementById("studyBtn").innerText="次の用語へ";
    }
}

function nextStudy(){
    if(studyStep===0){
        studyStep=1;
        showStudy();
    }else{
        studyStep=0;
        currentIndex++;
        if(currentIndex>=filteredQuestions.length){
            location.reload();
        }else{
            showStudy();
        }
    }
}

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function backToMenu(){
    document.getElementById("modeInfoScreen").classList.add("hidden");
    document.getElementById("menuScreen").classList.remove("hidden");
}

</script>
</body>
</html>
