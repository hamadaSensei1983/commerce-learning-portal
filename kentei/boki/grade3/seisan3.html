<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>全商簿記3級 精算表トレーニング</title>
  <link rel="stylesheet" href="../../../css/common.css">

  <style>
    /* 全体カード */
    .card{
      max-width:950px;
      margin:20px auto;
      padding:20px;
      background:white;
      border-radius:10px;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
    }

    .hidden{ display:none !important; }

    /* 整理事項 */
    #notesArea{
      padding:10px;
      background:#f8f8f8;
      border-left:4px solid #66bb6a;
      margin:10px 0;
      white-space:pre-line;
      font-size:14px;
    }

    /* ================================
      精算表（赤罫線＋右寄せ）
    ================================ */
    table.seisan{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
      table-layout:fixed;
    }

    /* まず一旦、すべての枠線を消す */
    table.seisan th,
    table.seisan td{
      border:none !important;
      padding:4px;
      text-align:right !important;
      vertical-align:middle;
    }

    /* 見出し（2行目）の下線は実線 */
    table.seisan thead tr:nth-child(2) th{
      border-bottom:1px solid #e53935 !important;
    }

    /* 科目列は左寄せ＋少し狭く（8%） */
    table.seisan th:first-child,
    table.seisan td:first-child{
      width:8% !important;
      text-align:left !important;
    }

    /* その他の列は均等（残りを8列で割る） */
    table.seisan th:not(:first-child),
    table.seisan td:not(:first-child){
      width:11.5% !important;
    }

    /* 入力ボックスは右寄せ＆精算表になじませる */
    .money{
      width:100% !important;
      text-align:right !important;
      padding:3px;
      box-sizing:border-box;
      border:1px solid #aaa;
      background:white;
      font-size:14px;
    }

    /* 正解：薄緑 */
    .correct{
      background:#e8f5e9 !important;
    }

    /* 不正解：薄赤 */
    .wrong{
      background:#ffebee !important;
      position:relative;
    }

    /* 正解表示（赤字）：セル直下に表示 */
    .correct-answer{
      font-size:14px;
      color:#b71c1c;
      font-weight:bold;
      position:absolute;
      right:2px;
      top: calc(100% - 15px);
      z-index:9999;
      background:transparent;
      pointer-events:none;
    }

    #result{
      margin-top:12px;
      font-weight:bold;
      white-space:pre-line;
    }

    /* 見出し1行目（科目〜貸借対照表）にも下線を付ける */
    table.seisan thead tr:nth-child(1) th{
      border-bottom:1px solid #e53935 !important;
    }

    /* tbody（科目行）は「下線だけ破線」にする */
    table.seisan tbody tr td{
      border-bottom:1px dashed #e53935 !important;
    }

    /* 合計行だけは、破線を実線に戻す（とりあえず普通の実線） */
    table.seisan tbody tr.total-row td{
      border-bottom:2px double #e53935 !important;
    }

    /* 見出し行は必ずセンタリング（最強指定） */
    table.seisan thead th{
      text-align:center !important;
    }

  </style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 精算表トレーニング</div>
    </div>
  </div>
</header>

<!-- ローディング画面 -->
<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">問題を読み込み中...</p>
  </div>
</div>

<div class="card">

  <h2>精算表トレーニング</h2>
  <p>
    8桁精算表の「整理記入 → 損益計算書 → 貸借対照表」を完成させましょう。<br>
    わからないところは先生や友達に相談しながら進めてもOKです。
  </p>

  <!-- 問題文 -->
  <h3 id="problemText"></h3>

  <!-- 決算整理事項 -->
  <div id="notesArea" class="hidden"></div>

  <!-- 精算表 -->
  <table class="seisan hidden" id="seisanTable">
    <thead>
      <tr>
        <th rowspan="2">科目</th>
        <th colspan="2">残高試算表</th>
        <th colspan="2">整理記入</th>
        <th colspan="2">損益計算書</th>
        <th colspan="2">貸借対照表</th>
      </tr>
      <tr>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
      </tr>
    </thead>
    <tbody id="seisanBody"></tbody>
  </table>

  <div style="text-align:center;margin-top:15px;">
    <button id="checkBtn" class="main-btn hidden" onclick="checkAnswer()">答え合わせ</button>
    <button id="nextBtn" class="main-btn hidden" onclick="nextProblem()">次の問題</button>
  </div>

  <p id="result"></p>

</div>

<div style="text-align:center;margin-top:20px;">
  <a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
  <a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>
</div>

<script>
/* ==========================================
   fetch版：CSV読み込み（1秒ローディング付き）
========================================== */
let problems = [];
let currentIndex = 0;

window.addEventListener("DOMContentLoaded", ()=>{
  loadCSV("../data/seisan3.csv");
});

async function loadCSV(path){
  const startTime = Date.now();
  try{
    const res = await fetch(path);
    if(!res.ok) throw new Error("CSVが見つかりません: " + path);
    let text = await res.text();
    text = text.replace(/^\uFEFF/,""); // BOM除去
    const rows = parseCSV(text);
    buildProblems(rows);
  }catch(e){
    document.getElementById("problemText").textContent =
      "CSV読み込みエラー：" + (e.message || e);
  }finally{
    const elapsed = Date.now() - startTime;
    const remain  = 1000 - elapsed;
    const finish = ()=>{
      const loading = document.getElementById("loadingScreen");
      if(loading) loading.style.display = "none";
      if(problems.length > 0){
        showProblem(0);
        document.getElementById("seisanTable").classList.remove("hidden");
        document.getElementById("checkBtn").classList.remove("hidden");
      }else{
        document.getElementById("problemText").textContent =
          "有効な問題がありません。";
      }
    };
    if(remain > 0) setTimeout(finish, remain); else finish();
  }
}

/* ==========================================
   CSVパーサ："..."内の改行・カンマにも対応
========================================== */
function parseCSV(text){
  const lines = text.split(/\r?\n/);
  const recs  = [];
  let buffer  = "";
  let inQ     = false;

  for(let line of lines){
    if(!line && !buffer) continue;
    buffer += (buffer ? "\n" : "") + line;

    const qcount = (line.match(/"/g) || []).length;
    if(qcount % 2 !== 0) inQ = !inQ;

    if(!inQ){
      recs.push(buffer);
      buffer = "";
    }
  }

  const data = [];
  for(let row of recs){
    if(!row.trim()) continue;

    let cols=[], cur="", q=false;
    for(let c of row){
      if(c === '"'){ q = !q; continue; }
      if(c === "," && !q){
        cols.push(cur);
        cur = "";
      }else{
        cur += c;
      }
    }
    cols.push(cur);
    data.push(cols);
  }
  return data;
}

/* 数値変換（空欄→0） */
function num(s){
  s = (s || "").replace(/,/g,"").trim();
  return s==="" ? 0 : Number(s);
}

/* ==========================================
   CSV → 問題構造へ
   問題ID,問題文,整理事項,科目,残高借方...
========================================== */
function buildProblems(rows){
  const map = {};
  for(let i=1;i<rows.length;i++){
    const c = rows[i];
    if(c.length < 12) continue;

    const pid   = (c[0] || "").trim();
    const pText = (c[1] || "").trim();
    const notes = (c[2] || "").trim();
    const subj  = (c[3] || "").trim();

    const row = {
      subject: subj,
      tbD:  num(c[4]),
      tbC:  num(c[5]),
      adjD: num(c[6]),
      adjC: num(c[7]),
      plD:  num(c[8]),
      plC:  num(c[9]),
      bsD:  num(c[10]),
      bsC:  num(c[11])
    };

    if(!map[pid]){
      map[pid] = { id:pid, text:pText, notes:notes, rows:[] };
    }else{
      if(!map[pid].text  && pText) map[pid].text  = pText;
      if(!map[pid].notes && notes) map[pid].notes = notes;
    }
    map[pid].rows.push(row);
  }
  problems = Object.values(map);
}

/* ==========================================
   問題表示
========================================== */
function showProblem(idx){
  currentIndex = idx;
  const p = problems[idx];
  if(!p) return;

  // 問題文
  document.getElementById("problemText").textContent = p.text || "";

  // 整理事項（'|'区切り → a., b., c.）
  const notesArea = document.getElementById("notesArea");
  if(p.notes){
    const arr = p.notes.split("|").map(x=>x.trim()).filter(x=>x);
    const abc = "abcdefghijklmnopqrstuvwxyz";
    notesArea.innerHTML = arr.map((n,i)=> `${abc[i]}. ${n}`).join("\n");
    notesArea.classList.remove("hidden");
  }else{
    notesArea.classList.add("hidden");
  }

  renderTable(p);

  document.getElementById("checkBtn").classList.remove("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("result").textContent = "";
}

/* ==========================================
   精算表描画
========================================== */
function renderTable(p){
  const tbody = document.getElementById("seisanBody");
  tbody.innerHTML = "";

  p.rows.forEach((r,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.subject}</td>
      <td>${fmt(r.tbD)}</td>
      <td>${fmt(r.tbC)}</td>
      <td><input class="money" id="adjD_${i}"></td>
      <td><input class="money" id="adjC_${i}"></td>
      <td><input class="money" id="plD_${i}"></td>
      <td><input class="money" id="plC_${i}"></td>
      <td><input class="money" id="bsD_${i}"></td>
      <td><input class="money" id="bsC_${i}"></td>
    `;
    tbody.appendChild(tr);
  });

  // 合計行（正解値で表示）
  const t = {tbD:0,tbC:0,adjD:0,adjC:0,plD:0,plC:0,bsD:0,bsC:0};
  p.rows.forEach(r=>{
    t.tbD+=r.tbD; t.tbC+=r.tbC;
    t.adjD+=r.adjD; t.adjC+=r.adjC;
    t.plD+=r.plD;  t.plC+=r.plC;
    t.bsD+=r.bsD;  t.bsC+=r.bsC;
  });

  const tr = document.createElement("tr");
  tr.className = "total-row";
  tr.innerHTML = `
    <td><b>合計</b></td>
    <td><b>${fmt(t.tbD)}</b></td>
    <td><b>${fmt(t.tbC)}</b></td>
    <td><b>${fmt(t.adjD)}</b></td>
    <td><b>${fmt(t.adjC)}</b></td>
    <td><b>${fmt(t.plD)}</b></td>
    <td><b>${fmt(t.plC)}</b></td>
    <td><b>${fmt(t.bsD)}</b></td>
    <td><b>${fmt(t.bsC)}</b></td>
  `;
  tbody.appendChild(tr);


  // テーブル表示
  document.getElementById("seisanTable").classList.remove("hidden");
}

/* 表示用フォーマット */
function fmt(n){ return n ? n.toLocaleString() : ""; }

/* カンマ補助 */
document.addEventListener("input", e=>{
  if(e.target.classList.contains("money")){
    const v=e.target.value.replace(/,/g,"");
    if(!isNaN(v)&&v!==""){
      e.target.value=Number(v).toLocaleString();
    }
  }
});

/* 入力値取得 */
function getNumber(id){
  const el = document.getElementById(id);
  if(!el) return 0;
  const v = el.value.replace(/,/g,"").trim();
  return v==="" ? 0 : Number(v);
}

/* ==========================================
   採点
========================================== */
function checkAnswer(){
  const p = problems[currentIndex];
  if(!p) return;

  // 前回表示リセット
  document.querySelectorAll(".correct-answer").forEach(e=>e.remove());
  document.querySelectorAll(".money")
    .forEach(e=>e.classList.remove("correct","wrong"));

  let allOk = true;

  p.rows.forEach((r,i)=>{
    allOk &= mark(`adjD_${i}`, getNumber(`adjD_${i}`), r.adjD);
    allOk &= mark(`adjC_${i}`, getNumber(`adjC_${i}`), r.adjC);
    allOk &= mark(`plD_${i}`,  getNumber(`plD_${i}`),  r.plD);
    allOk &= mark(`plC_${i}`,  getNumber(`plC_${i}`),  r.plC);
    allOk &= mark(`bsD_${i}`,  getNumber(`bsD_${i}`),  r.bsD);
    allOk &= mark(`bsC_${i}`,  getNumber(`bsC_${i}`),  r.bsC);
  });

  const res = document.getElementById("result");
  if(allOk){
    res.textContent = "〇 全て正解です！よくできました。";
  }else{
    res.textContent = "× 正解は赤い金額で表示しています。";
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

/* 不正解セルに正解表示（赤字） */
function mark(id,user,correct){
  const el = document.getElementById(id);
  if(!el) return true;

  el.classList.remove("correct","wrong");
  const old = el.parentNode.querySelector(".correct-answer");
  if(old) old.remove();

  if(user === correct){
    el.classList.add("correct");
    return true;
  }else{
    el.classList.add("wrong");

    const ans = document.createElement("div");
    ans.className  = "correct-answer";
    ans.textContent= correct.toLocaleString();

    el.parentNode.style.position = "relative";
    el.parentNode.appendChild(ans);
    return false;
  }
}

/* 次の問題へ */
function nextProblem(){
  currentIndex++;
  if(currentIndex >= problems.length) currentIndex = 0;
  showProblem(currentIndex);
}
</script>
</body>
</html>
