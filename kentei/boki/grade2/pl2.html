<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全商簿記2級 損益計算書トレーニング</title>
<link rel="stylesheet" href="../../../css/common.css">

<style>
.card{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
.hidden{ display:none !important; }

#controlBar{
  text-align:center;
  margin-bottom:10px;
}
#problemSelect{
  padding:8px;
  font-size:16px;
  border-radius:8px;
  border:2px solid var(--main-green);
}

.section-title{
  margin-top:12px;
  margin-bottom:6px;
  padding-left:8px;
  border-left:4px solid #e53935;
  font-size:15px;
  font-weight:bold;
}

/* 残高試算表 */
.balance-grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:6px 18px;
  max-width:1100px;
  margin:0 auto;
  border:2px solid #ffd0d0;
  border-radius:10px;
  padding:12px;
  background:#fffdfd;
}
.bal-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px dotted #ddd;
  padding:4px 0;
  font-size:14px;
}

/* PL */
table.pl-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:14px;
  max-width:920px;
  margin:0 auto;
}
table.pl-table th, table.pl-table td{
  border:1px solid #e53935;
  padding:6px;
}
table.pl-table th{ background:#ffebee; text-align:center; }
table.pl-table td{ text-align:right; }
table.pl-table td.name{ text-align:left; }

.money{
  width:100%;
  text-align:right;
}

.note-block.ok{ border:2px solid #2e7d32; background:#e8f5e9; }
.note-block.ng{ border:2px solid #c62828; background:#ffebee; }

.wrong{ outline:3px solid #e53935; }
.praise{
  background:#e8f5e9;
  border:2px solid #66bb6a;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>
<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記2級 損益計算書トレーニング</div>
    </div>
  </div>
</header>

<div id="loadingScreen">
  <div style="text-align:center">
    <img src="../../../images/logo.png" style="width:90px;margin-bottom:20px">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:bold;">読み込み中...</p>
  </div>
</div>

<div class="card hidden" id="mainCard">
  <div id="controlBar">
    <select id="problemSelect"></select>
    <button class="main-btn" style="width:auto" onclick="start()">開始</button>
  </div>

  <div id="workArea" class="hidden">

    <h2>下記の決算整理仕訳を示しなさい。</h2>
    <div id="adjInputArea"></div>

    <div style="text-align:center;margin:10px 0;">
      <button class="main-btn" onclick="gradeAdjustments()">仕訳採点</button>
      <button class="control-btn" onclick="giveUp()">ギブアップ</button>
    </div>

    <div class="section-title">残高試算表</div>
    <div id="tbBalanceList" class="balance-grid"></div>

    <div class="section-title">損益計算書</div>
    <table class="pl-table">
      <thead>
        <tr>
          <th colspan="2">費用（借方）</th>
          <th colspan="2">収益（貸方）</th>
        </tr>
      </thead>
      <tbody id="plWorksheetBody"></tbody>
    </table>

    <div id="plCheckWrap" class="hidden" style="text-align:center;margin-top:10px;">
      <button class="control-btn" onclick="checkPLWorksheet()">答え合わせ</button>
    </div>

    <p id="result"></p>
  </div>
</div>

<script>
/* ここに JS（次のステップ） */
</script>
</body>
</html>
