```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理検定 用語問題</title>

<link rel="stylesheet" href="../../css/common.css">

</head>

<body>

<header class="app-header">
<div class="header-left">
<img src="../../img/icon.png" class="header-icon">
<div>
<h1 class="site-title">検定対策システム</h1>
<div class="exam-title" id="examLevel"></div>
</div>
</div>
</header>

<div id="loadingScreen">
<div class="spinner"></div>
</div>

<div class="card hidden" id="setupArea">

<h3>分野選択</h3>

<div id="fieldArea" class="field-grid"></div>

<button class="control-btn" onclick="selectAll()">全選択</button>
<button class="control-btn" onclick="clearAll()">全解除</button>

<h3>モード</h3>

<select id="mode" style="width:100%;padding:10px;margin-bottom:15px;">
<option value="normal">通常モード（5問）</option>
<option value="challenge">チャレンジモード</option>
<option value="review">復習モード</option>
<option value="study">学習モード</option>
</select>

<button class="main-btn" onclick="startQuiz()">開始</button>

</div>

<div class="card hidden" id="quizArea">

<div id="question"></div>

<div id="choices"></div>

<p id="result"></p>

<button id="nextBtn" class="main-btn hidden" onclick="nextQuestion()">次へ</button>

</div>

<div class="card hidden" id="studyArea">

<div class="study-row">

<button class="nav-square" onclick="prevCard()">◀</button>

<div class="study-center">

<h2 id="studyTerm"></h2>
<div class="study-position" id="cardPosition"></div>

</div>

<button class="nav-square" onclick="nextCard()">▶</button>

</div>

<div class="study-meaning-box" id="studyMeaning"></div>

</div>

<a href="../../index.html" class="portal-btn">ポータルへ</a>

<script>

let questions=[]
let filtered=[]
let wrong=[]
let current=0
let score=0
let mode=""

const params=new URLSearchParams(location.search)
const level=params.get("level")

if(level==="3"){
document.getElementById("examLevel").innerText="情報処理検定 3級"
loadCSV("data/data3.csv")
}

if(level==="2"){
document.getElementById("examLevel").innerText="情報処理検定 2級"
loadCSV("data/data2.csv")
}

async function loadCSV(path){

try{

let res=await fetch(path)

if(!res.ok) throw "CSV取得失敗"

let text=await res.text()

text=text.replace(/^\uFEFF/,"")

parseCSV(text)

createFieldList()

document.getElementById("loadingScreen").style.display="none"
document.getElementById("setupArea").classList.remove("hidden")

}catch(e){

alert("CSV読み込みエラー")

}

}

function parseCSV(data){

let lines=data.trim().split(/\r?\n/)

for(let i=1;i<lines.length;i++){

let cols=lines[i].split(",")

questions.push({
field:cols[0],
term:cols[1],
meaning:cols.slice(2).join(","),
index:i-1
})

}

}

function createFieldList(){

let fields=[...new Set(questions.map(q=>q.field))]

let area=document.getElementById("fieldArea")

fields.forEach(f=>{

let label=document.createElement("label")

label.innerHTML='<input type="checkbox" value="'+f+'"> '+f

area.appendChild(label)

})

}

function selectAll(){

document.querySelectorAll("#fieldArea input")
.forEach(c=>c.checked=true)

}

function clearAll(){

document.querySelectorAll("#fieldArea input")
.forEach(c=>c.checked=false)

}

function startQuiz(){

mode=document.getElementById("mode").value

let selected=[...document.querySelectorAll("#fieldArea input:checked")]
.map(c=>c.value)

filtered=questions.filter(q=>selected.includes(q.field))

shuffle(filtered)

current=0
score=0
wrong=[]

if(mode==="study"){

document.getElementById("setupArea").classList.add("hidden")
document.getElementById("studyArea").classList.remove("hidden")

showCard()

return

}

if(mode==="normal"){
filtered=filtered.slice(0,5)
}

document.getElementById("setupArea").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

nextQuestion()

}

function nextQuestion(){

document.getElementById("result").innerText=""
document.getElementById("nextBtn").classList.add("hidden")

if(current>=filtered.length){

if(mode==="review" && wrong.length>0){

filtered=[...wrong]
wrong=[]
current=0

alert("間違えた問題を復習します")

}else{

document.getElementById("question").innerText=
"終了！ "+score+" / "+filtered.length

document.getElementById("choices").innerHTML=""

return

}

}

let q=filtered[current]

document.getElementById("question").innerText=q.meaning

let choices=generateChoices(q)

let area=document.getElementById("choices")

area.innerHTML=""

choices.forEach(c=>{

let btn=document.createElement("button")

btn.className="quiz-btn"

btn.innerText=c.term

btn.onclick=function(){
checkAnswer(c.term,q.term,btn)
}

area.appendChild(btn)

})

}

function generateChoices(q){

let arr=[q]

let i=q.index

if(questions[i-1]) arr.push(questions[i-1])
if(questions[i+1]) arr.push(questions[i+1])

while(arr.length<4){

let r=questions[Math.floor(Math.random()*questions.length)]

if(!arr.includes(r)) arr.push(r)

}

shuffle(arr)

return arr

}

function checkAnswer(answer,correct,btn){

let buttons=document.querySelectorAll(".quiz-btn")

buttons.forEach(b=>b.disabled=true)

if(answer===correct){

btn.classList.add("correct")

score++

document.getElementById("result").innerText="正解"

}else{

btn.classList.add("incorrect")

document.getElementById("result").innerText="不正解"

wrong.push(filtered[current])

buttons.forEach(b=>{
if(b.innerText===correct){
b.classList.add("correct")
}
})

if(mode==="challenge"){
alert("不正解！チャレンジ終了")
location.reload()
return
}

}

current++

document.getElementById("nextBtn").classList.remove("hidden")

}

function showCard(){

let q=filtered[current]

document.getElementById("studyTerm").innerText=q.term
document.getElementById("studyMeaning").innerText=q.meaning
document.getElementById("cardPosition").innerText=(current+1)+" / "+filtered.length

}

function nextCard(){

current++

if(current>=filtered.length){
current=0
}

showCard()

}

function prevCard(){

current--

if(current<0){
current=filtered.length-1
}

showCard()

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=a[i]
a[i]=a[j]
a[j]=t

}

}

</script>

</body>
</html>
