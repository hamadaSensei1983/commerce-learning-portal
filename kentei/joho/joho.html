<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../css/common.css">

<title>情報処理 用語問題</title>

</head>

<body>

<header class="app-header">

<div class="header-left">

<img src="../../images/logo.png" class="header-icon">

<div>
<h1 class="site-title">情報処理検定</h1>
<div id="examLevel" class="exam-title"></div>
</div>

</div>

</header>

<div class="card">

<div id="loadingScreen">
<div class="spinner"></div>
</div>

<div id="setupArea" class="hidden">

<h3>出題分野を選択</h3>

<div id="fieldArea" class="field-grid"></div>

<button class="main-btn" onclick="startQuiz()">
問題開始
</button>

</div>

<div id="quizArea" class="hidden">

<div class="progress-wrapper">

<div class="progress-text" id="progressText"></div>

<div class="progress-bar">
<div class="progress-bar-fill" id="progressBar"></div>
</div>

</div>

<h2 id="question"></h2>

<div id="choices"></div>

<div id="result"></div>

<button id="nextBtn" class="control-btn hidden" onclick="nextQuestion()">
次の問題
</button>

</div>

<button class="control-btn"
onclick="location.href='index.html'">
級選択へ戻る
</button>

</div>

<script>

let questions=[]
let filtered=[]
let current=0
let score=0
let level=""

const params = new URLSearchParams(location.search)
level = params.get("level")

if(level==="3"){
document.getElementById("examLevel").innerText="3級 用語問題"
loadCSV("data/data3.csv")
}

if(level==="2"){
document.getElementById("examLevel").innerText="2級 用語問題"
loadCSV("data/data2.csv")
}

async function loadCSV(file){

const response = await fetch(file)
const text = await response.text()

parseCSV(text)

createFieldList()

document.getElementById("loadingScreen").classList.add("hidden")
document.getElementById("setupArea").classList.remove("hidden")

}

function parseCSV(data){

const lines=data.trim().split(/\r?\n/)

for(let i=1;i<lines.length;i++){

const cols=lines[i].split(",")

questions.push({
field:cols[0],
term:cols[1],
meaning:cols[2]
})

}

}

function createFieldList(){

let fields=[...new Set(questions.map(q=>q.field))]

const area=document.getElementById("fieldArea")

fields.forEach(f=>{

let label=document.createElement("label")

label.innerHTML=
'<input type="checkbox" value="'+f+'" checked> '+f

area.appendChild(label)

})

}

function startQuiz(){

const checks=document.querySelectorAll("#fieldArea input:checked")

let selected=[...checks].map(c=>c.value)

filtered=questions.filter(q=>selected.includes(q.field))

shuffle(filtered)

current=0
score=0

document.getElementById("setupArea").classList.add("hidden")
document.getElementById("quizArea").classList.remove("hidden")

nextQuestion()

}

function nextQuestion(){

document.getElementById("result").innerText=""
document.getElementById("nextBtn").classList.add("hidden")

if(current>=filtered.length){

document.getElementById("question").innerText=
"終了！ "+score+" / "+filtered.length

document.getElementById("choices").innerHTML=""

return

}

updateProgress()

let q=filtered[current]

document.getElementById("question").innerText=q.term

let choices=generateChoices(q.meaning)

const area=document.getElementById("choices")

area.innerHTML=""

choices.forEach(c=>{

let btn=document.createElement("button")

btn.className="quiz-btn"

btn.innerText=c

btn.onclick=function(){
checkAnswer(c,q.meaning,btn)
}

area.appendChild(btn)

})

}

function generateChoices(correct){

let arr=[correct]

while(arr.length<4){

let r=questions[Math.floor(Math.random()*questions.length)].meaning

if(!arr.includes(r)) arr.push(r)

}

shuffle(arr)

return arr

}

function checkAnswer(answer,correct,btn){

let buttons=document.querySelectorAll(".quiz-btn")

buttons.forEach(b=>b.disabled=true)

if(answer===correct){

btn.classList.add("correct")

score++

document.getElementById("result").innerText="正解"

}else{

btn.classList.add("incorrect")

document.getElementById("result").innerText="不正解"

buttons.forEach(b=>{
if(b.innerText===correct){
b.classList.add("correct")
}
})

}

current++

document.getElementById("nextBtn").classList.remove("hidden")

}

function updateProgress(){

let percent=(current/filtered.length)*100

document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("progressText").innerText=
(current+1)+" / "+filtered.length

}

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=a[i]

a[i]=a[j]

a[j]=t

}

}

</script>

</body>
</html>
