<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>全商簿記3級 精算表トレーニング</title>
  <link rel="stylesheet" href="../../../css/common.css">

<style>

/* 全体カード */
.card{
  max-width:950px;
  margin:20px auto;
  padding:20px;
  background:white;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.hidden{ display:none !important; }

/* 整理事項枠 */
#notesArea{
  padding:10px;
  background:#f8f8f8;
  border-left:4px solid #66bb6a;
  margin:10px 0;
  white-space:pre-line;
  font-size:14px;
}

/* ================================
   精算表（赤罫線 + 外枠なし）
================================ */
table.seisan{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  table-layout:fixed;
}

/* セル共通：赤罫線・右寄せ */
table.seisan th,
table.seisan td{
  border:1px solid #e53935 !important;
  padding:4px;
  text-align:right !important;
  vertical-align:middle;
}

/* 外枠（左右）だけ無色に */
table.seisan tr th:first-child,
table.seisan tr td:first-child{
  border-left:none !important;
}

table.seisan tr th:last-child,
table.seisan tr td:last-child{
  border-right:none !important;
}

/* 見出しセンタリング */
table.seisan th{
  background:#ffebee !important;
  font-weight:bold;
  text-align:center !important;
}

/* 科目列：さらに狭く 8% */
table.seisan th:first-child,
table.seisan td:first-child{
  width:8% !important;
  text-align:left !important;
}

/* 他の8列を均等割り（92% → 約11.5%） */
table.seisan th:not(:first-child),
table.seisan td:not(:first-child){
  width:11.5% !important;
}

/* 入力欄 */
.money{
  width:100% !important;
  text-align:right !important;
  padding:3px;
  box-sizing:border-box;
  border:1px solid #aaa;
  background:white;
  font-size:14px;
}

/* 正解：緑 */
.correct{
  background:#e8f5e9 !important;
}

/* 不正解：赤 */
.wrong{
  background:#ffebee !important;
  position:relative;
}

/* 正解表示（赤字） */
.correct-answer{
  font-size:14px;
  color:#b71c1c;
  font-weight:bold;
  position:absolute;
  right:2px;

  /* ★ 先生調整版：セルの直下にぴったり */
  top: calc(100% - 15px);

  z-index:9999;
  background:transparent;
  pointer-events:none;
}

/* メッセージ */
#result{
  margin-top:12px;
  font-weight:bold;
  white-space:pre-line;
}

</style>
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="../../../images/logo.png" class="header-icon">
    <div>
      <h1 class="site-title">検定対策システム</h1>
      <div class="exam-title">全商簿記3級 精算表トレーニング</div>
    </div>
  </div>
</header>

<div class="card">

  <h2>精算表トレーニング</h2>
  <p>整理記入 → 損益計算書 → 貸借対照表 の各列を完成させよう。</p>

  <!-- 問題文 -->
  <h3 id="problemText"></h3>

  <!-- 整理事項 -->
  <div id="notesArea" class="hidden"></div>

  <!-- 精算表 -->
  <table class="seisan hidden" id="seisanTable">
    <thead>
      <tr>
        <th rowspan="2">科目</th>
        <th colspan="2">残高試算表</th>
        <th colspan="2">整理記入</th>
        <th colspan="2">損益計算書</th>
        <th colspan="2">貸借対照表</th>
      </tr>
      <tr>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
        <th>借方</th><th>貸方</th>
      </tr>
    </thead>
    <tbody id="seisanBody"></tbody>
  </table>

  <div style="text-align:center;margin-top:15px;">
    <button id="checkBtn" class="main-btn hidden" onclick="checkAnswer()">答え合わせ</button>
    <button id="nextBtn" class="main-btn hidden" onclick="nextProblem()">次の問題</button>
  </div>

  <p id="result"></p>

</div>

<div style="text-align:center;margin-top:20px;">
  <a href="../index.html" class="portal-btn exam-btn">簿記トップ</a>
  <a href="../../../index.html" class="portal-btn portal-main">ポータルへ戻る</a>
</div>

<script>
/* ==========================================
   fetch版 CSV ローダー
========================================== */
window.addEventListener("DOMContentLoaded", ()=>{
  loadCSV("../data/seisan3.csv");
});

/* CSV読み込み */
async function loadCSV(path){
  const res = await fetch(path);
  let text = await res.text();
  text = text.replace(/^\uFEFF/,"");  // BOM除去
  const rows = parseCSV(text);
  buildProblems(rows);
  showProblem(0);
}

/* ==========================================
   CSVパーサ（改行・クォート完全対応）
========================================== */
function parseCSV(text){
  const lines = text.split(/\r?\n/);
  const recs = [];

  let buf = "";
  let inQ = false;

  for(let line of lines){
    if(buf) buf += "\n" + line;
    else buf = line;

    const q = (line.match(/"/g) || []).length;
    if(q % 2 !== 0) inQ = !inQ;

    if(!inQ){
      recs.push(buf);
      buf = "";
    }
  }

  const data = [];
  for(let i=0; i<recs.length; i++){
    const row = recs[i];
    if(!row.trim()) continue;

    let cols=[], cur="", q2=false;
    for(let c of row){
      if(c === '"'){ q2 = !q2; continue; }
      if(c === "," && !q2){
        cols.push(cur);
        cur="";
      }else cur += c;
    }
    cols.push(cur);
    data.push(cols);
  }
  return data;
}

/* ==========================================
   問題データ整形
========================================== */
let problems=[];
let current=0;

function buildProblems(rows){
  const map={};  // 問題ID → データ構造

  for(let i=1; i<rows.length; i++){
    const c = rows[i];
    if(c.length < 12) continue;

    const pid  = c[0].trim();
    const ptxt = c[1].trim();
    const note = c[2].trim();

    const row = {
      subject:c[3].trim(),
      tbD: num(c[4]),
      tbC: num(c[5]),
      adjD:num(c[6]),
      adjC:num(c[7]),
      plD: num(c[8]),
      plC: num(c[9]),
      bsD: num(c[10]),
      bsC: num(c[11])
    };

    if(!map[pid]){
      map[pid] = { id:pid, text:ptxt, notes:note, rows:[] };
    }
    map[pid].rows.push(row);

    if(ptxt) map[pid].text = ptxt;
    if(note) map[pid].notes = note;
  }

  problems = Object.values(map);
}

function num(s){
  s = (s||"").replace(/,/g,"").trim();
  return s==="" ? 0 : Number(s);
}

/* ==========================================
   問題表示
========================================== */
function showProblem(idx){
  current = idx;
  const p = problems[idx];

  document.getElementById("problemText").textContent = p.text;

  const notes = p.notes ? p.notes.split("|").map(x=>x.trim()) : [];
  const area  = document.getElementById("notesArea");

  if(notes.length){
    const abc="abcdefghijklmnopqrstuvwxyz";
    area.innerHTML = notes.map((n,i)=>`${abc[i]}. ${n}`).join("\n");
    area.classList.remove("hidden");
  }else area.classList.add("hidden");

  renderTable(p);

  document.getElementById("checkBtn").classList.remove("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("result").textContent = "";
}

/* ==========================================
   表描画
========================================== */
function renderTable(p){
  const tbody = document.getElementById("seisanBody");
  tbody.innerHTML = "";

  p.rows.forEach((r,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML = `
      <td>${r.subject}</td>
      <td>${fmt(r.tbD)}</td>
      <td>${fmt(r.tbC)}</td>
      <td><input class="money" id="adjD_${i}"></td>
      <td><input class="money" id="adjC_${i}"></td>
      <td><input class="money" id="plD_${i}"></td>
      <td><input class="money" id="plC_${i}"></td>
      <td><input class="money" id="bsD_${i}"></td>
      <td><input class="money" id="bsC_${i}"></td>
    `;
    tbody.appendChild(tr);
  });

  // 合計行
  const t={tbD:0,tbC:0,adjD:0,adjC:0,plD:0,plC:0,bsD:0,bsC:0};
  p.rows.forEach(r=>{
    t.tbD+=r.tbD; t.tbC+=r.tbC;
    t.adjD+=r.adjD; t.adjC+=r.adjC;
    t.plD+=r.plD; t.plC+=r.plC;
    t.bsD+=r.bsD; t.bsC+=r.bsC;
  });

  const tr=document.createElement("tr");
  tr.innerHTML = `
    <td><b>合計</b></td>
    <td><b>${fmt(t.tbD)}</b></td>
    <td><b>${fmt(t.tbC)}</b></td>
    <td><b>${fmt(t.adjD)}</b></td>
    <td><b>${fmt(t.adjC)}</b></td>
    <td><b>${fmt(t.plD)}</b></td>
    <td><b>${fmt(t.plC)}</b></td>
    <td><b>${fmt(t.bsD)}</b></td>
    <td><b>${fmt(t.bsC)}</b></td>
  `;
  tbody.appendChild(tr);
}

/* ==========================================
   カンマ補助
========================================== */
document.addEventListener("input", e=>{
  if(e.target.classList.contains("money")){
    const v=e.target.value.replace(/,/g,"");
    if(!isNaN(v)&&v!=="") e.target.value=Number(v).toLocaleString();
  }
});

/* 数値取得 */
function getNumber(id){
  const el=document.getElementById(id);
  if(!el) return 0;
  const v=el.value.replace(/,/g,"").trim();
  return v==="" ? 0 : Number(v);
}

/* ==========================================
   採点
========================================== */
function checkAnswer(){
  const p = problems[current];
  let allOk = true;

  // 全セルの正解/不正解表示をリセット
  document.querySelectorAll(".correct-answer").forEach(e=>e.remove());
  document.querySelectorAll(".money").forEach(e=>e.classList.remove("correct","wrong"));

  p.rows.forEach((r,i)=>{
    allOk &= mark(`adjD_${i}`, getNumber(`adjD_${i}`), r.adjD);
    allOk &= mark(`adjC_${i}`, getNumber(`adjC_${i}`), r.adjC);
    allOk &= mark(`plD_${i}`,  getNumber(`plD_${i}`),  r.plD);
    allOk &= mark(`plC_${i}`,  getNumber(`plC_${i}`),  r.plC);
    allOk &= mark(`bsD_${i}`,  getNumber(`bsD_${i}`),  r.bsD);
    allOk &= mark(`bsC_${i}`,  getNumber(`bsC_${i}`),  r.bsC);
  });

  const res=document.getElementById("result");
  if(allOk){
    res.textContent="〇 全て正解です！よくできました。";
  }else{
    res.textContent="× 正解は赤い金額で表示しています。";
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

/* 不正解セルの赤文字正解表示 */
function mark(id,user,correct){
  const el=document.getElementById(id);
  if(!el) return true;

  el.classList.remove("correct","wrong");
  const old = el.parentNode.querySelector(".correct-answer");
  if(old) old.remove();

  if(user===correct){
    el.classList.add("correct");
    return true;
  }else{
    el.classList.add("wrong");

    const a=document.createElement("div");
    a.className="correct-answer";
    a.textContent=correct.toLocaleString();

    el.parentNode.style.position="relative";
    el.parentNode.appendChild(a);
    return false;
  }
}

function fmt(n){ return n? n.toLocaleString():""; }

/* ==========================================
   次の問題
========================================== */
function nextProblem(){
  current++;
  if(current >= problems.length) current=0;
  showProblem(current);
}

</script>
</body>
</html>
