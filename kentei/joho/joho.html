<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>情報処理検定 用語問題</title>

<link rel="stylesheet" href="../../css/common.css">

</head>

<body>

<header class="app-header">
<div class="header-left">
<img src="../../images/logo.png" class="header-icon">
<div>
<h1 class="site-title">検定対策システム</h1>
<div class="exam-title" id="examLevel"></div>
</div>
</div>
</header>

<div id="loadingScreen">
<div style="text-align:center">
<img src="../../images/logo.png" style="width:90px;margin-bottom:20px">
<div class="spinner"></div>
<p style="margin-top:15px;font-weight:bold">
問題を読み込み中...
</p>
</div>
</div>

<div class="card hidden" id="setupArea">

<h3>分野選択</h3>

<div id="fieldArea" class="field-grid"></div>

<button class="control-btn" onclick="selectAll()">全選択</button>
<button class="control-btn" onclick="clearAll()">全解除</button>

<h3>モード選択</h3>

<select id="modeSelect" style="width:100%;padding:10px;">
<option value="normal">通常モード</option>
<option value="challenge">チャレンジモード</option>
<option value="review">復習モード</option>
<option value="study">学習モード</option>
</select>

<div id="modeDescription" style="margin:10px 0;font-size:14px;color:#444"></div>

<button class="main-btn" onclick="startQuiz()">開始</button>

</div>

<div class="card hidden" id="quizArea">

<div class="progress-wrapper">
<div class="progress-text" id="progressText"></div>
<div class="progress-bar">
<div class="progress-bar-fill" id="progressBar"></div>
</div>
</div>

<h3 id="question"></h3>

<div id="choices"></div>

<p id="result"></p>

<button id="nextBtn" class="main-btn hidden" onclick="nextQuestion()">次へ</button>

</div>

<div class="card hidden" id="resultArea">

<h2>結果</h2>

<p id="scoreText"></p>
<p id="rateText"></p>
<p id="rankText"></p>

<button class="main-btn" onclick="location.reload()">もう一度</button>
<button class="control-btn" onclick="retryWrong()">復習する</button>

</div>

<div class="card hidden" id="studyArea">

<div class="study-row">

<button class="nav-square" onclick="prevCard()">◀</button>

<div class="study-center">
<h2 id="studyTerm"></h2>
<div class="study-position" id="cardPosition"></div>
</div>

<button class="nav-square" onclick="nextCard()">▶</button>

</div>

<div class="study-meaning-box" id="studyMeaning"></div>

</div>

<a href="index.html" class="portal-btn exam-btn">
検定トップ
</a>

<a href="../../index.html" class="portal-btn portal-main">
ポータルへ戻る
</a>

<script>

let questions=[]
let filtered=[]
let wrong=[]
let current=0
let score=0
let mode=""

const modeDesc={
    normal:"5問出題されます",
    challenge:"全問題出題。1問でも間違えると終了",
    review:"全問題出題。間違えた問題を再度出題",
    study:"カード形式で用語を学習"
}

const params=new URLSearchParams(location.search)
const level=params.get("level")

document.getElementById("modeSelect").onchange=updateModeDesc

function updateModeDesc(){
    let m=document.getElementById("modeSelect").value
    document.getElementById("modeDescription").innerText=modeDesc[m]
}

updateModeDesc()

if(level==="3"){
    document.getElementById("examLevel").innerText="情報処理検定 3級"
    loadCSV("data/data3.csv")
}

if(level==="2"){
document.getElementById("examLevel").innerText="情報処理検定 2級"
loadCSV("data/data2.csv")
}

async function loadCSV(path){

    let res=await fetch(path)
    let text=await res.text()

    text=text.replace(/^\uFEFF/,"")

    questions=parseCSV(text)

    createFieldList()

    setTimeout(()=>{
    loadingScreen.style.display="none"
    setupArea.classList.remove("hidden")
    },600)

}

function parseCSV(text){

    let rows=[]
    let row=[]
    let cell=""
    let quote=false

    for(let c of text){

        if(c=='"'){quote=!quote;continue}

        if(c==","&&!quote){row.push(cell);cell="";continue}

        if(c=="\n"&&!quote){row.push(cell);rows.push(row);row=[];cell="";continue}

        cell+=c

    }

    row.push(cell)
    rows.push(row)

    let result=[]

    for(let i=1;i<rows.length;i++){

        let r=rows[i]

        if(!r[0] || !r[1] || !r[2]) continue

        result.push({
        field:r[0].trim(),
        term:r[1].trim(),
        meaning:r[2].trim(),
        index:i-1
        })
    }

    return result

}


function createFieldList(){

let fieldCounts={}
let fieldCorrect=getFieldStats()

questions.forEach(q=>{
if(!fieldCounts[q.field]) fieldCounts[q.field]=0
fieldCounts[q.field]++
})

let area=document.getElementById("fieldArea")
area.innerHTML=""

Object.keys(fieldCounts).forEach(field=>{

let total=fieldCounts[field]

let correct=fieldCorrect[field]?.correct || 0
let attempts=fieldCorrect[field]?.attempts || 0

let rate=attempts>0 ? Math.round(correct/attempts*100) : "-"

let label=document.createElement("label")

label.innerHTML=
'<input type="checkbox" value="'+field+'"> '
+ field
+ ' ('+total+') '
+ '<span style="font-size:12px;color:#666">'
+ '正解率:'+rate+'%'
+ '</span>'

area.appendChild(label)

})

}

function selectAll(){
    document.querySelectorAll("#fieldArea input").forEach(c=>c.checked=true)
}

function clearAll(){
    document.querySelectorAll("#fieldArea input").forEach(c=>c.checked=false)
}

function startQuiz(){

let selected=[...document.querySelectorAll("#fieldArea input:checked")].map(c=>c.value)

if(selected.length===0){
alert("分野を1つ以上選択してください")
return
}

mode=document.getElementById("modeSelect").value

let selected=[...document.querySelectorAll("#fieldArea input:checked")].map(c=>c.value)

filtered=questions.filter(q=>selected.includes(q.field))

shuffle(filtered)

current=0
score=0
wrong=[]

if(mode==="study"){

setupArea.classList.add("hidden")
studyArea.classList.remove("hidden")

showCard()

return

}

if(mode==="normal") filtered=filtered.slice(0,5)

setupArea.classList.add("hidden")
quizArea.classList.remove("hidden")

nextQuestion()

}

function nextQuestion(){

result.innerText=""
nextBtn.classList.add("hidden")

if(current>=filtered.length){
showResult()
return
}

updateProgress()

let q=filtered[current]

document.getElementById("question").innerText=q.meaning

let choices=generateChoices(q)

let area=document.getElementById("choices")

area.innerHTML=""

choices.forEach(c=>{

let btn=document.createElement("button")

btn.className="quiz-btn"

btn.innerText=c.term

btn.onclick=function(){
checkAnswer(c.term,q.term,btn)
}

area.appendChild(btn)

})

}

function updateProgress(){

progressText.innerText="問題 "+(current+1)+" / "+filtered.length

progressBar.style.width=((current)/filtered.length*100)+"%"

}

function generateChoices(q){

let arr=[q]

let i=q.index

if(questions[i-1]) arr.push(questions[i-1])
if(questions[i+1]) arr.push(questions[i+1])

while(arr.length<4){

let r=questions[Math.floor(Math.random()*questions.length)]

if(!arr.includes(r)) arr.push(r)

}

shuffle(arr)

return arr

}

function checkAnswer(answer,correct,btn){

let q=filtered[current]

let stats=getFieldStats()

if(!stats[q.field]){

stats[q.field]={
correct:0,
attempts:0
}

}

stats[q.field].attempts++

let buttons=document.querySelectorAll(".quiz-btn")
buttons.forEach(b=>b.disabled=true)

if(answer===correct){

btn.classList.add("correct")

document.getElementById("result").innerText="正解！"

score++

stats[q.field].correct++

}else{

btn.classList.add("incorrect")

document.getElementById("result").innerText="不正解"

wrong.push(filtered[current])

buttons.forEach(b=>{
if(b.innerText===correct){
b.classList.add("correct")
}
})

}

localStorage.setItem("fieldStats",JSON.stringify(stats))

current++

document.getElementById("nextBtn").classList.remove("hidden")

}

function showResult(){

quizArea.classList.add("hidden")
resultArea.classList.remove("hidden")

let rate=Math.round(score/filtered.length*100)

scoreText.innerText="正解数 "+score+" / "+filtered.length
rateText.innerText="正答率 "+rate+"%"

let rank="D"

if(rate>=90) rank="S"
else if(rate>=80) rank="A"
else if(rate>=70) rank="B"
else if(rate>=60) rank="C"

rankText.innerText="ランク "+rank

}

function retryWrong(){

filtered=[...wrong]

wrong=[]

current=0
score=0

resultArea.classList.add("hidden")
quizArea.classList.remove("hidden")

nextQuestion()

}

function showCard(){

let q=filtered[current]

studyTerm.innerText=q.term
studyMeaning.innerText=q.meaning
cardPosition.innerText=(current+1)+" / "+filtered.length

}

function nextCard(){

current++

if(current>=filtered.length) current=0

showCard()

}

function prevCard(){

current--

if(current<0) current=filtered.length-1

showCard()

}

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(endX-startX>80) prevCard()
if(startX-endX>80) nextCard()

})

function shuffle(a){

for(let i=a.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let t=a[i]
a[i]=a[j]
a[j]=t

}

}

function getFieldStats(){

let data=localStorage.getItem("fieldStats")

if(!data) return {}

return JSON.parse(data)

}


</script>

</body>
</html>
```
